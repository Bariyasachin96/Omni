                                      }, selEngPkg)
                                  } else { availableLocales = listOf(); tempTts?.shutdown(); tempTts = null }
                              }
                              Column(modifier = Modifier.padding(16.dp).verticalScroll(rememberScrollState())) {
                                  Text("Omni Native TTS", style = MaterialTheme.typography.headlineMedium)
                                  Spacer(modifier = Modifier.height(8.dp))
                                  Text("v16.0 — Zero-Copy Native Engine", style = MaterialTheme.typography.bodySmall)
                                  Spacer(modifier = Modifier.height(24.dp))
                                  AccessibleDropdown("Reading Mode", readingModeOptions[readingModeKeys.indexOf(readingMode).coerceAtLeast(0)], readingModeOptions) { idx ->
                                      readingMode = readingModeKeys[idx]; prefs.setReadingMode(readingMode)
                                  }
                                  Spacer(modifier = Modifier.height(8.dp))
                                  AccessibleDropdown("Select ISO Language", "${Languages.map[selLangIso]} ($selLangIso)", Languages.displayNames) { idx ->
                                      selLangIso = Languages.isoCodes[idx]; prefs.setString("pref_lang", selLangIso)
                                      selEngPkg = prefs.getEngineForLanguage(selLangIso)
                                      selLocTag = prefs.getLocaleForLangPkg(selLangIso, selEngPkg)
                                  }
                                  AccessibleDropdown("Select TTS Engine", engines.find { it.pkg == selEngPkg }?.name ?: "Not Set", engines.map { it.name }) { idx ->
                                      selEngPkg = engines[idx].pkg; prefs.setString("engine_$selLangIso", selEngPkg)
                                      selLocTag = prefs.getLocaleForLangPkg(selLangIso, selEngPkg)
                                  }
                                  val locNames = availableLocales.map { it.displayName }.ifEmpty { listOf("Default System Voice") }
                                  AccessibleDropdown("Voice / Locale", availableLocales.find { it.toLanguageTag() == selLocTag }?.displayName ?: "Default System Voice", locNames) { idx ->
                                      if (availableLocales.isNotEmpty()) { selLocTag = availableLocales[idx].toLanguageTag(); prefs.setLocaleForLangPkg(selLangIso, selEngPkg, selLocTag) }
                                  }
                                  Spacer(modifier = Modifier.height(24.dp))
                                  Button(onClick = { context.startActivity(Intent(context, LanguageSettingsActivity::class.java).putExtra("key", "${selLangIso}_${selEngPkg}")) }, modifier = Modifier.fillMaxWidth()) { Text("LANGUAGE SPEED / PITCH SETTINGS") }
                                  Spacer(modifier = Modifier.height(12.dp))
                                  Button(onClick = { startActivity(Intent("com.android.settings.TTS_SETTINGS")) }, modifier = Modifier.fillMaxWidth()) { Text("OPEN SYSTEM TTS SETTINGS") }
                                  Spacer(modifier = Modifier.height(12.dp))
                                  Button(onClick = { startActivity(Intent(context, AdvancedSettingsActivity::class.java)) }, modifier = Modifier.fillMaxWidth()) { Text("ADVANCED SETTINGS") }
                                  Spacer(modifier = Modifier.height(32.dp))
                                  Button(onClick = {
                                      try {
                                          val logFile = VhLogger.exportToFile()
                                          val uri = FileProvider.getUriForFile(context, "${context.packageName}.provider", logFile)
                                          context.startActivity(Intent.createChooser(Intent(Intent.ACTION_SEND).apply { type="text/plain"; putExtra(Intent.EXTRA_STREAM,uri); putExtra(Intent.EXTRA_SUBJECT,"Omni Log"); addFlags(Intent.FLAG_GRANT_READ_URI_PERMISSION) }, "Share Log"))
                                      } catch (e: Exception) { Toast.makeText(context, "Log export failed: ${e.message}", Toast.LENGTH_SHORT).show() }
                                  }, modifier = Modifier.fillMaxWidth(), colors = ButtonDefaults.buttonColors(containerColor = MaterialTheme.colorScheme.error)) { Text("EXPORT DEBUG LOG") }
                              }
                          }
                      }
                  }
              }
              override fun onDestroy() { tempTts?.shutdown(); super.onDestroy() }
          }
          """)

