name: Build Omni Ultra Max Full
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    - name: Install NDK and CMake
      run: |
        echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;25.1.8937393" "cmake;3.22.1" --sdk_root=$ANDROID_HOME
    - name: Clone CLD2
      run: |
        mkdir -p app/src/main/cpp
        git clone --depth 1 https://github.com/CLD2Owners/cld2.git app/src/main/cpp/cld2_src
    - name: Generate Project Files Part 1
      run: |
        mkdir -p app/src/main/kotlin/com/omni/tts
        mkdir -p app/src/main/res/xml
        mkdir -p app/src/main/res/values
        cat > gradle.properties << 'EOF'
        android.useAndroidX=true
        android.enableJetifier=true
        org.gradle.jvmargs=-Xmx3096m -Dfile.encoding=UTF-8
        org.gradle.daemon=false
        EOF
        cat > settings.gradle.kts << 'EOF'
        pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
        dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }
        rootProject.name = "Omni"
        include(":app")
        EOF
        cat > build.gradle.kts << 'EOF'
        plugins { id("com.android.application") version "8.2.2" apply false; id("org.jetbrains.kotlin.android") version "1.9.22" apply false }
        EOF
        cat > app/build.gradle.kts << 'EOF'
        plugins { id("com.android.application"); id("org.jetbrains.kotlin.android") }
        android {
            namespace = "com.omni.tts"
            compileSdk = 34
            ndkVersion = "25.1.8937393"
            defaultConfig {
                applicationId = "com.omni.tts"
                minSdk = 24
                targetSdk = 34
                versionCode = 1
                versionName = "5.0"
                externalNativeBuild { cmake { cppFlags += listOf("-std=c++17", "-Wno-narrowing", "-O3"); arguments += listOf("-DANDROID_STL=c++_shared") } }
                ndk { abiFilters.addAll(listOf("armeabi-v7a", "arm64-v8a", "x86", "x86_64")) }
            }
            buildFeatures { compose = true }
            composeOptions { kotlinCompilerExtensionVersion = "1.5.8" }
            externalNativeBuild { cmake { path = file("src/main/cpp/CMakeLists.txt"); version = "3.22.1" } }
            compileOptions { sourceCompatibility = JavaVersion.VERSION_17; targetCompatibility = JavaVersion.VERSION_17 }
            kotlinOptions { jvmTarget = "17" }
            packaging { resources { pickFirsts.add("**/libc++_shared.so") } }
        }
        dependencies {
            implementation("androidx.core:core-ktx:1.12.0")
            implementation("androidx.lifecycle:lifecycle-runtime-ktx:2.7.0")
            implementation("androidx.activity:activity-compose:1.8.2")
            val composeBom = platform("androidx.compose:compose-bom:2024.01.00")
            implementation(composeBom)
            implementation("androidx.compose.ui:ui")
            implementation("androidx.compose.ui:ui-graphics")
            implementation("androidx.compose.material3:material3")
            implementation("org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3")
        }
        EOF
        cat > app/src/main/cpp/CMakeLists.txt << 'EOF'
        cmake_minimum_required(VERSION 3.18.1)
        project("omni_native")
        set(CLD2_DIR ${CMAKE_CURRENT_SOURCE_DIR}/cld2_src/internal)
        add_library(omni_engine SHARED tts_engine_core.cpp ${CLD2_DIR}/cldutil.cc ${CLD2_DIR}/cldutil_shared.cc ${CLD2_DIR}/compact_lang_det.cc ${CLD2_DIR}/compact_lang_det_hint_code.cc ${CLD2_DIR}/compact_lang_det_impl.cc ${CLD2_DIR}/debug.cc ${CLD2_DIR}/fixunicodevalue.cc ${CLD2_DIR}/generated_entities.cc ${CLD2_DIR}/generated_language.cc ${CLD2_DIR}/generated_ulscript.cc ${CLD2_DIR}/getonescriptspan.cc ${CLD2_DIR}/lang_script.cc ${CLD2_DIR}/offsetmap.cc ${CLD2_DIR}/scoreonescriptspan.cc ${CLD2_DIR}/tote.cc ${CLD2_DIR}/utf8statetable.cc ${CLD2_DIR}/cld_generated_cjk_uni_prop_80.cc ${CLD2_DIR}/cld2_generated_cjk_compatible.cc ${CLD2_DIR}/cld_generated_cjk_delta_bi_4.cc ${CLD2_DIR}/generated_distinct_bi_0.cc ${CLD2_DIR}/cld2_generated_quadchrome_2.cc ${CLD2_DIR}/cld2_generated_deltaoctachrome.cc ${CLD2_DIR}/cld2_generated_distinctoctachrome.cc ${CLD2_DIR}/cld_generated_score_quad_octa_2.cc)
        target_include_directories(omni_engine PRIVATE ${CLD2_DIR}/../public ${CLD2_DIR})
        find_library(log-lib log)
        target_link_libraries(omni_engine ${log-lib})
        EOF
        cat > app/src/main/cpp/tts_engine_core.cpp << 'EOF'
        #include <jni.h>
        #include <string>
        #include <cstring>
        #include <vector>
        #include <unordered_map>
        #include "compact_lang_det.h"
        int utf8ToCodepoint(const unsigned char* p, int& len) {
            if (p[0] < 0x80) { len = 1; return p[0]; }
            if ((p[0] & 0xE0) == 0xC0) { len = 2; return ((p[0] & 0x1F) << 6) | (p[1] & 0x3F); }
            if ((p[0] & 0xF0) == 0xE0) { len = 3; return ((p[0] & 0x0F) << 12) | ((p[1] & 0x3F) << 6) | (p[2] & 0x3F); }
            if ((p[0] & 0xF8) == 0xF0) { len = 4; return ((p[0] & 0x07) << 18) | ((p[1] & 0x3F) << 12) | ((p[2] & 0x3F) << 6) | (p[3] & 0x3F); }
            len = 1; return p[0];
        }
        void codepointToUtf8(int cp, std::string& out) {
            if (cp <= 0x7F) { out += static_cast<char>(cp); }
            else if (cp <= 0x7FF) { out += static_cast<char>((cp >> 6) | 0xC0); out += static_cast<char>((cp & 0x3F) | 0x80); }
            else if (cp <= 0xFFFF) { out += static_cast<char>((cp >> 12) | 0xE0); out += static_cast<char>(((cp >> 6) & 0x3F) | 0x80); out += static_cast<char>((cp & 0x3F) | 0x80); }
            else if (cp <= 0x10FFFF) { out += static_cast<char>((cp >> 18) | 0xF0); out += static_cast<char>(((cp >> 12) & 0x3F) | 0x80); out += static_cast<char>(((cp >> 6) & 0x3F) | 0x80); out += static_cast<char>((cp & 0x3F) | 0x80); }
        }
        char mathUnicodeToAscii(int cp) {
            if (cp >= 0x1D400 && cp <= 0x1D419) return 'A' + (cp - 0x1D400);
            if (cp >= 0x1D434 && cp <= 0x1D44D) return 'A' + (cp - 0x1D434);
            if (cp >= 0x1D468 && cp <= 0x1D481) return 'A' + (cp - 0x1D468);
            if (cp >= 0x1D5A0 && cp <= 0x1D5B9) return 'A' + (cp - 0x1D5A0);
            if (cp >= 0x1D670 && cp <= 0x1D689) return 'A' + (cp - 0x1D670);
            if (cp >= 0x1D41A && cp <= 0x1D433) return 'a' + (cp - 0x1D41A);
            if (cp >= 0x1D44E && cp <= 0x1D467) return 'a' + (cp - 0x1D44E);
            if (cp >= 0x1D482 && cp <= 0x1D49B) return 'a' + (cp - 0x1D482);
            if (cp >= 0x1D5BA && cp <= 0x1D5D3) return 'a' + (cp - 0x1D5BA);
            if (cp >= 0x1D68A && cp <= 0x1D6A3) return 'a' + (cp - 0x1D68A);
            if (cp >= 0xFF21 && cp <= 0xFF3A) return 'A' + (cp - 0xFF21);
            if (cp >= 0xFF41 && cp <= 0xFF5A) return 'a' + (cp - 0xFF41);
            return 0;
        }
        bool isEmoji(int cp) { return cp > 0xFFFF || (cp >= 0x2600 && cp <= 0x27BF) || (cp >= 0x1F300 && cp <= 0x1FAFF) || (cp >= 0xFE00 && cp <= 0xFE0F); }
        bool isPunct(int cp) { return cp == '.' || cp == '!' || cp == '?' || cp == ',' || cp == ';' || cp == ':' || cp == '-' || cp == '*' || cp == '_'; }
        std::string normalizeText(const std::string& input, bool keepEmoji, bool countEmoji, bool countPunct) {
            std::string result;
            int i = 0;
            int len = input.length();
            while (i < len) {
                int clen = 0;
                int cp = utf8ToCodepoint(reinterpret_cast<const unsigned char*>(&input[i]), clen);
                char ascii = mathUnicodeToAscii(cp);
                if (ascii != 0) { result += ascii; i += clen; continue; }
                if (isEmoji(cp)) {
                    if (!keepEmoji) { i += clen; continue; }
                    int eCount = 1;
                    int j = i + clen;
                    while (j < len) {
                        int nlen = 0;
                        int ncp = utf8ToCodepoint(reinterpret_cast<const unsigned char*>(&input[j]), nlen);
                        if (ncp == cp) { eCount++; j += nlen; } else break;
                    }
                    if (countEmoji && eCount > 1) { result += std::to_string(eCount) + " "; }
                    codepointToUtf8(cp, result);
                    i = j; continue;
                }
                if (isPunct(cp) && countPunct) {
                    int pCount = 1;
                    int j = i + clen;
                    while (j < len) {
                        int nlen = 0;
                        int ncp = utf8ToCodepoint(reinterpret_cast<const unsigned char*>(&input[j]), nlen);
                        if (ncp == cp) { pCount++; j += nlen; } else break;
                    }
                    if (pCount > 1) { result += std::to_string(pCount) + " "; }
                    codepointToUtf8(cp, result);
                    i = j; continue;
                }
                codepointToUtf8(cp, result);
                i += clen;
            }
            return result;
        }
        std::string applyDictionary(std::string text, const std::vector<std::string>& keys, const std::vector<std::string>& vals) {
            for (size_t i = 0; i < keys.size(); i++) {
                size_t start_pos = 0;
                while((start_pos = text.find(keys[i], start_pos)) != std::string::npos) {
                    text.replace(start_pos, keys[i].length(), vals[i]);
                    start_pos += vals[i].length();
                }
            }
            return text;
        }
        struct BlockDef { int start; int end; std::string lang; };
        std::vector<BlockDef> blocks = {
            {0x0900, 0x097F, "hi"}, {0x0980, 0x09FF, "bn"}, {0x0A00, 0x0A7F, "pa"}, {0x0A80, 0x0AFF, "gu"},
            {0x0B00, 0x0B7F, "or"}, {0x0B80, 0x0BFF, "ta"}, {0x0C00, 0x0C7F, "te"}, {0x0C80, 0x0CFF, "kn"},
            {0x0D00, 0x0D7F, "ml"}, {0x0D80, 0x0DFF, "si"}, {0x0E00, 0x0E7F, "th"}, {0x0600, 0x06FF, "ar"},
            {0x3040, 0x309F, "ja"}, {0x1100, 0x11FF, "ko"}, {0x4E00, 0x9FFF, "zh"}
        };
        std::string detectLang(const std::string& text, const std::string& latFall, const std::string& nonLatFall) {
            bool is_rel = false;
            CLD2::Language lang = CLD2::DetectLanguage(text.c_str(), text.length(), true, &is_rel);
            const char* code = CLD2::LanguageCode(lang);
            if (code != nullptr && strlen(code) >= 2 && strcmp(code, "un") != 0) return std::string(code);
            int i = 0;
            int len = text.length();
            bool hasNonLatin = false;
            while (i < len) {
                int clen = 0;
                int cp = utf8ToCodepoint(reinterpret_cast<const unsigned char*>(&text[i]), clen);
                if (cp > 0x02AF) {
                    hasNonLatin = true;
                    for (const auto& b : blocks) { if (cp >= b.start && cp <= b.end) return b.lang; }
                }
                i += clen;
            }
            return hasNonLatin ? nonLatFall : latFall;
        }
        extern "C" JNIEXPORT jstring JNICALL Java_com_omni_tts_NativeEngine_processAll(JNIEnv* env, jobject, jstring jtext, jobjectArray jKeys, jobjectArray jVals, jboolean keepEmoji, jboolean countEmoji, jboolean countPunct, jstring jLat, jstring jNonLat) {
            if (jtext == nullptr) return env->NewStringUTF("");
            const char* utf8 = env->GetStringUTFChars(jtext, nullptr);
            std::string text(utf8);
            env->ReleaseStringUTFChars(jtext, utf8);
            const char* latStr = env->GetStringUTFChars(jLat, nullptr); std::string latFall(latStr); env->ReleaseStringUTFChars(jLat, latStr);
            const char* nonLatStr = env->GetStringUTFChars(jNonLat, nullptr); std::string nonLatFall(nonLatStr); env->ReleaseStringUTFChars(jNonLat, nonLatStr);
            std::vector<std::string> keys, vals;
            int dictSize = env->GetArrayLength(jKeys);
            for (int i = 0; i < dictSize; i++) {
                jstring jk = (jstring) env->GetObjectArrayElement(jKeys, i);
                const char* kc = env->GetStringUTFChars(jk, nullptr); keys.push_back(std::string(kc)); env->ReleaseStringUTFChars(jk, kc);
                jstring jv = (jstring) env->GetObjectArrayElement(jVals, i);
                const char* vc = env->GetStringUTFChars(jv, nullptr); vals.push_back(std::string(vc)); env->ReleaseStringUTFChars(jv, vc);
            }
            text = applyDictionary(text, keys, vals);
            text = normalizeText(text, keepEmoji, countEmoji, countPunct);
            std::vector<std::string> sentences;
            std::string current;
            for (size_t i = 0; i < text.length(); i++) {
                current += text[i];
                if (text[i] == '.' || text[i] == '?' || text[i] == '!' || text[i] == '\n') {
                    if (!current.empty()) { sentences.push_back(current); current.clear(); }
                }
            }
            if (!current.empty()) sentences.push_back(current);
            std::string resultChunks;
            std::string currentLang = "";
            std::string batch = "";
            for (const auto& s : sentences) {
                std::string sLang = detectLang(s, latFall, nonLatFall);
                if (currentLang.empty()) currentLang = sLang;
                if (sLang != currentLang) {
                    if (!batch.empty()) { resultChunks += currentLang + "|" + batch + "||"; }
                    batch = s; currentLang = sLang;
                } else {
                    if (!batch.empty() && batch.back() != ' ') batch += " ";
                    batch += s;
                }
            }
            if (!batch.empty()) resultChunks += currentLang + "|" + batch;
            return env->NewStringUTF(resultChunks.c_str());
        }
        EOF
        cat > app/src/main/kotlin/com/omni/tts/NativeEngine.kt << 'EOF'
        package com.omni.tts
        object NativeEngine {
            init { System.loadLibrary("omni_engine") }
            external fun processAll(text: String, keys: Array<String>, vals: Array<String>, keepEmoji: Boolean, countEmoji: Boolean, countPunct: Boolean, latFall: String, nonLatFall: String): String
        }
        EOF
        cat > app/src/main/kotlin/com/omni/tts/SharedPrefsManager.kt << 'EOF'
        package com.omni.tts
        import android.content.Context
        import android.content.SharedPreferences
        class SharedPrefsManager(context: Context) {
            private val prefs: SharedPreferences = context.getSharedPreferences("OMNI_PREFS", Context.MODE_PRIVATE)
            fun getEngineForLanguage(lang: String): String {
                val sysLang = java.util.Locale.getDefault().getDisplayLanguage(java.util.Locale.ENGLISH)
                var defEngine = "NOT_SET"
                if (lang.equals(sysLang, ignoreCase = true)) defEngine = "com.google.android.tts"
                return prefs.getString("engine_$lang", defEngine) ?: defEngine
            }
            fun getLocaleForLangPkg(lang: String, pkg: String): String = prefs.getString("locale_${lang}_${pkg}", "") ?: ""
            fun setLocaleForLangPkg(lang: String, pkg: String, localeTag: String) = prefs.edit().putString("locale_${lang}_${pkg}", localeTag).apply()
            fun setString(key: String, valStr: String) = prefs.edit().putString(key, valStr).apply()
            fun getString(key: String, def: String): String = prefs.getString(key, def) ?: def
            fun setInt(key: String, valInt: Int) = prefs.edit().putInt(key, valInt).apply()
            fun getInt(key: String, def: Int): Int = prefs.getInt(key, def)
            fun setBoolean(key: String, valBool: Boolean) = prefs.edit().putBoolean(key, valBool).apply()
            fun getBoolean(key: String, def: Boolean): Boolean = prefs.getBoolean(key, def)
            fun getFloat(key: String, def: Float): Float = prefs.getFloat(key, def)
            fun setFloat(key: String, value: Float) = prefs.edit().putFloat(key, value).apply()
            fun addDict(from: String, to: String) = prefs.edit().putString("dict_$from", to).apply()
            fun removeDict(from: String) = prefs.edit().remove("dict_$from").apply()
            fun clearDict() { val e = prefs.edit(); prefs.all.keys.filter { it.startsWith("dict_") }.forEach { e.remove(it) }; e.apply() }
            fun getDict(): Map<String, String> = prefs.all.filterKeys { it.startsWith("dict_") }.mapKeys { it.key.substring(5) }.mapValues { it.value.toString() }
        }
        EOF
        cat > app/src/main/kotlin/com/omni/tts/EngineFinder.kt << 'EOF'
        package com.omni.tts
        import android.content.Context
        import android.content.Intent
        import android.speech.tts.TextToSpeech
        object EngineFinder {
            data class TTSInfo(val pkg: String, val name: String)
            fun getEngines(context: Context): List<TTSInfo> {
                val pm = context.packageManager
                val list = pm.queryIntentServices(Intent(TextToSpeech.Engine.INTENT_ACTION_TTS_SERVICE), 0).map { TTSInfo(it.serviceInfo.packageName, it.serviceInfo.applicationInfo.loadLabel(pm).toString()) }
                return if (list.isEmpty()) listOf(TTSInfo("com.google.android.tts", "Google TTS")) else list
            }
        }
        EOF
        cat > app/src/main/kotlin/com/omni/tts/WavUtils.kt << 'EOF'
        package com.omni.tts
        import java.io.EOFException
        import java.io.InputStream
        object WavUtils {
            class WavInfo { var sampleRate=16000; var channels:Short=1; var bitsPerSample:Short=16; var dataOffset=0 }
            fun parse(dis: InputStream): WavInfo {
                val info = WavInfo()
                readFully(dis, ByteArray(4)); readInt(dis); readFully(dis, ByteArray(4)); var offset = 12
                while (true) {
                    val chunkId = ByteArray(4); readFully(dis, chunkId)
                    val chunkSize = Integer.reverseBytes(readInt(dis)); offset += 8
                    val id = String(chunkId)
                    if (id == "fmt ") {
                        readShort(dis); info.channels = java.lang.Short.reverseBytes(readShort(dis))
                        info.sampleRate = Integer.reverseBytes(readInt(dis)); readInt(dis); readShort(dis)
                        info.bitsPerSample = java.lang.Short.reverseBytes(readShort(dis))
                        val rem = chunkSize - 16; if (rem > 0) skipFully(dis, rem); offset += chunkSize
                    } else if (id == "data") { info.dataOffset = offset; break } else { skipFully(dis, chunkSize); offset += chunkSize }
                }
                return info
            }
            private fun readFully(i: InputStream, b: ByteArray) { var n=0; while(n<b.size){ val c=i.read(b,n,b.size-n); if(c<0)throw EOFException(); n+=c } }
            private fun readInt(i: InputStream): Int { val c1=i.read();val c2=i.read();val c3=i.read();val c4=i.read(); if((c1 or c2 or c3 or c4)<0)throw EOFException(); return (c1 shl 24)+(c2 shl 16)+(c3 shl 8)+c4 }
            private fun readShort(i: InputStream): Short { val c1=i.read();val c2=i.read(); if((c1 or c2)<0)throw EOFException(); return ((c1 shl 8)+c2).toShort() }
            private fun skipFully(i: InputStream, n: Int) { var t=0; while(t<n){ var s=i.skip((n-t).toLong()); if(s==0L){if(i.read()<0)throw EOFException();s=1}; t+=s.toInt() } }
        }
        EOF
    - name: Generate Project Files Part 2
      run: |
        cat > app/src/main/kotlin/com/omni/tts/VhLogger.kt << 'EOF'
        package com.omni.tts
        import android.content.Context
        import android.util.Log
        import java.io.BufferedWriter
        import java.io.File
        import java.io.FileWriter
        import java.io.IOException
        import java.text.SimpleDateFormat
        import java.util.Date
        import java.util.LinkedList
        import java.util.Locale
        import java.util.concurrent.atomic.AtomicLong
        object VhLogger {
            private const val TAG = "OMNI-TTS"
            private const val MAX_LINES = 5000
            private val buffer = LinkedList<String>()
            private val sdf = SimpleDateFormat("MM-dd HH:mm:ss.SSS", Locale.US)
            private var appContext: Context? = null
            private val lastSynthStart = AtomicLong(0)
            private val lastFirstAudio = AtomicLong(0)
            fun init(ctx: Context) { appContext = ctx.applicationContext }
            @Synchronized private fun write(level: String, msg: String) {
                val line = "${sdf.format(Date())} $level/$TAG: $msg"
                Log.d(TAG, msg); buffer.addLast(line); if (buffer.size > MAX_LINES) buffer.removeFirst()
            }
            fun d(msg: String) = write("D", msg)
            fun w(msg: String) = write("W", msg)
            fun e(msg: String) = write("E", msg)
            fun i(msg: String) = write("I", msg)
            fun markSynthStart(chunkText: String, lang: String, chunkIndex: Int): Long {
                val t = System.currentTimeMillis(); lastSynthStart.set(t); lastFirstAudio.set(0)
                write("D", "[CHUNK-$chunkIndex] lang=$lang len=${chunkText.length} text=${chunkText.substring(0, Math.min(50, chunkText.length))}")
                write("D", "[CHUNK-$chunkIndex] synthesizeToFile START")
                return t
            }
            fun markSynthEnd(chunkIndex: Int, startTime: Long) { write("D", "[CHUNK-$chunkIndex] synthesizeToFile DONE in ${System.currentTimeMillis() - startTime}ms") }
            fun markHeaderFound(chunkIndex: Int) {
                val t = System.currentTimeMillis(); val synthStart = lastSynthStart.get()
                val ms = if (synthStart > 0) t - synthStart else -1L
                write("D", "[CHUNK-$chunkIndex] WAV header found, time-to-header=${ms}ms")
            }
            fun markFirstAudio(chunkIndex: Int) {
                val t = System.currentTimeMillis(); val synthStart = lastSynthStart.get()
                if (lastFirstAudio.compareAndSet(0, t)) {
                    val ms = if (synthStart > 0) t - synthStart else -1L
                    write("D", "[CHUNK-$chunkIndex] FIRST AUDIO BYTE sent, latency=${ms}ms")
                }
            }
            fun markChunkDone(chunkIndex: Int, startTime: Long, totalBytes: Long) { write("D", "[CHUNK-$chunkIndex] DONE totalBytes=$totalBytes totalTime=${System.currentTimeMillis() - startTime}ms") }
            fun markSynthError(chunkIndex: Int, reason: String) { write("E", "[CHUNK-$chunkIndex] SYNTH ERROR: $reason") }
            fun markEngineInit(lang: String, pkg: String, ms: Long) { write("D", "[ENGINE] init lang=$lang pkg=$pkg time=${ms}ms") }
            fun markEngineReused(lang: String) { write("D", "[ENGINE] reused lang=$lang") }
            fun markRequest(text: String, totalChunks: Int) { write("D", "[REQUEST] length=${text.length} chunks=$totalChunks text=${text.substring(0, Math.min(80, text.length))}") }
            fun markStop() { write("D", "[STOP] onStop called — interrupting current synthesis") }
            fun markFallback(detectedLang: String, fallbackLang: String) { write("W", "[FALLBACK] detected=$detectedLang -> using=$fallbackLang") }
            fun markSkipped(reason: String) { write("W", "[SKIPPED] $reason") }
            @Synchronized @Throws(IOException::class) fun exportToFile(): File {
                val ctx = appContext ?: throw IOException("VhLogger not initialized")
                val f = File(ctx.cacheDir, "omni_tts_debug.txt")
                val bw = BufferedWriter(FileWriter(f, false))
                bw.write("=== Omni Full Debug Log ===\nTime: ${Date()}\nDevice: ${android.os.Build.MODEL}\nAndroid: ${android.os.Build.VERSION.RELEASE}\nEntries: ${buffer.size}\n============================\n\n")
                buffer.forEach { bw.write(it); bw.newLine() }; bw.close(); return f
            }
            @Synchronized fun clear() { buffer.clear() }
        }
