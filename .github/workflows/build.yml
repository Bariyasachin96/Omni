package com.omni.tts
import android.content.Intent
import android.os.Bundle
import android.provider.Settings
import android.widget.Toast
import androidx.activity.ComponentActivity
import androidx.activity.compose.setContent
import androidx.compose.foundation.layout.*
import androidx.compose.foundation.rememberScrollState
import androidx.compose.foundation.verticalScroll
import androidx.compose.material3.*
import androidx.compose.runtime.*
import androidx.compose.ui.Modifier
import androidx.compose.ui.platform.LocalContext
import androidx.compose.ui.unit.dp
import androidx.core.content.FileProvider
import java.util.Locale
class MainActivity : ComponentActivity() {
    private var tempTts: android.speech.tts.TextToSpeech? = null
    @OptIn(ExperimentalMaterial3Api::class)
    override fun onCreate(savedInstanceState: Bundle?) {
        super.onCreate(savedInstanceState)
        val prefs = SharedPrefsManager(this)
        setContent {
            MaterialTheme {
                Surface(modifier = Modifier.fillMaxSize()) {
                    val context = LocalContext.current
                    val engines = EngineFinder.getEngines(context).toMutableList()
                    engines.add(0, EngineFinder.TTSInfo("NOT_SET", "--- Not Set ---"))
                    val isoCodes = Languages.isoCodes
                    val displayNames = Languages.displayNames
                    val langsMap = Languages.map
                    var isInitLang by remember { mutableStateOf(true) }
                    var isInitEng by remember { mutableStateOf(true) }
                    var selLangIso by remember { mutableStateOf(prefs.getString("pref_lang", "en")) }
                    val selLangDisplay = "${langsMap[selLangIso]} ($selLangIso)"
                    var selEngPkg by remember { mutableStateOf(prefs.getEngineForLanguage(selLangIso)) }
                    val selEngName = engines.find { it.pkg == selEngPkg }?.name ?: "Not Set"
                    var availableLocales by remember { mutableStateOf(listOf<Locale>()) }
                    var selLocTag by remember { mutableStateOf(prefs.getLocaleForLangPkg(selLangIso, selEngPkg)) }
                    LaunchedEffect(selEngPkg, selLangIso) {
                        if (selEngPkg != "NOT_SET") {
                            tempTts?.shutdown()
                            tempTts = android.speech.tts.TextToSpeech(context, { status ->
                                if (status == android.speech.tts.TextToSpeech.SUCCESS) {
                                    val voices = try { tempTts?.voices?.map { it.locale }?.filter { it.language.equals(selLangIso, true) } } catch (e: Exception) { null }
                                    availableLocales = voices?.distinctBy { it.toLanguageTag() }?.sortedBy { it.displayName } ?: listOf()
                                }
                            }, selEngPkg)
                        } else { availableLocales = listOf(); tempTts?.shutdown(); tempTts = null }
                    }
                    Column(modifier = Modifier.padding(16.dp).verticalScroll(rememberScrollState())) {
                        Text("Omni Native Setup", style = MaterialTheme.typography.headlineMedium)
                        Spacer(modifier = Modifier.height(24.dp))
                        AccessibleDropdown("Select ISO Language", selLangDisplay, displayNames) { idx ->
                            isInitLang = false
                            selLangIso = isoCodes[idx]
                            prefs.setString("pref_lang", selLangIso)
                            selEngPkg = prefs.getEngineForLanguage(selLangIso)
                            selLocTag = prefs.getLocaleForLangPkg(selLangIso, selEngPkg)
                        }
                        val engineNames = engines.map { it.name }
                        AccessibleDropdown("Select TTS Engine", selEngName, engineNames) { idx ->
                            isInitEng = false; selEngPkg = engines[idx].pkg; prefs.setString("engine_$selLangIso", selEngPkg)
                            selLocTag = prefs.getLocaleForLangPkg(selLangIso, selEngPkg)
                        }
                        val locNames = availableLocales.map { it.displayName }.ifEmpty { listOf("Default System Voice") }
                        val displaySelectedLoc = availableLocales.find { it.toLanguageTag() == selLocTag }?.displayName ?: "Default System Voice"
                        AccessibleDropdown("Voice / Locale", displaySelectedLoc, locNames) { idx ->
                            if (availableLocales.isNotEmpty()) {
                                selLocTag = availableLocales[idx].toLanguageTag()
                                prefs.setLocaleForLangPkg(selLangIso, selEngPkg, selLocTag)
                            }
                        }
                        Spacer(modifier = Modifier.height(24.dp))
                        Button(onClick = {
                            val intent = Intent(context, LanguageSettingsActivity::class.java)
                            intent.putExtra("key", "${selLangIso}_${selEngPkg}")
                            context.startActivity(intent)
                        }, modifier = Modifier.fillMaxWidth()) { Text("LANGUAGE SPEED / PITCH SETTINGS") }
                        Spacer(modifier = Modifier.height(12.dp))
                        Button(onClick = { startActivity(Intent("com.android.settings.TTS_SETTINGS")) }, modifier = Modifier.fillMaxWidth()) { Text("OPEN SYSTEM TTS SETTINGS") }
                        Spacer(modifier = Modifier.height(12.dp))
                        Button(onClick = { startActivity(Intent(context, AdvancedSettingsActivity::class.java)) }, modifier = Modifier.fillMaxWidth()) { Text("ADVANCED SETTINGS") }
                        Spacer(modifier = Modifier.height(12.dp))
                        Button(onClick = {
                            val intent = Intent(Settings.ACTION_ACCESSIBILITY_SETTINGS)
                            context.startActivity(intent)
                        }, modifier = Modifier.fillMaxWidth()) { Text("ENABLE AUTO READER (ACCESSIBILITY)") }
                        Spacer(modifier = Modifier.height(32.dp))
                        Button(onClick = {
                            try {
                                val logFile = VhLogger.exportToFile()
                                val uri = FileProvider.getUriForFile(context, "${context.packageName}.provider", logFile)
                                val shareIntent = Intent(Intent.ACTION_SEND).apply { type = "text/plain"; putExtra(Intent.EXTRA_STREAM, uri); putExtra(Intent.EXTRA_SUBJECT, "Omni Native Log"); addFlags(Intent.FLAG_GRANT_READ_URI_PERMISSION) }
                                context.startActivity(Intent.createChooser(shareIntent, "Share Log"))
                            } catch (e: Exception) { Toast.makeText(context, "Log export failed: ${e.message}", Toast.LENGTH_SHORT).show() }
                        }, modifier = Modifier.fillMaxWidth(), colors = ButtonDefaults.buttonColors(containerColor = MaterialTheme.colorScheme.error)) { Text("EXPORT DEBUG LOG") }
                    }
                }
            }
        }
    }
    override fun onDestroy() { tempTts?.shutdown(); super.onDestroy() }
}
