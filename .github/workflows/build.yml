          # ── WavUtils.kt ──────────────────────────────────────────────────────
          w("app/src/main/java/com/omni/tts/WavUtils.kt", """package com.omni.tts
          import java.io.EOFException
          import java.io.InputStream
          object WavUtils {
              class WavInfo { var sampleRate = 16000; var channels: Short = 1; var bitsPerSample: Short = 16; var dataOffset = 0 }
              fun parse(dis: InputStream): WavInfo {
                  val info = WavInfo()
                  readFully(dis, ByteArray(4)); readIntLE(dis); readFully(dis, ByteArray(4))
                  var offset = 12
                  while (true) {
                      val chunkId = ByteArray(4); readFully(dis, chunkId)
                      val chunkSize = readIntLE(dis); offset += 8
                      when (String(chunkId)) {
                          "fmt " -> {
                              readShortLE(dis)
                              info.channels = readShortLE(dis)
                              info.sampleRate = readIntLE(dis)
                              readIntLE(dis); readShortLE(dis)
                              info.bitsPerSample = readShortLE(dis)
                              val rem = chunkSize - 16; if (rem > 0) skipFully(dis, rem); offset += chunkSize
                          }
                          "data" -> { info.dataOffset = offset; break }
                          else   -> { skipFully(dis, chunkSize); offset += chunkSize }
                      }
                  }
                  if (info.sampleRate <= 0) info.sampleRate = 16000
                  if (info.channels <= 0) info.channels = 1
                  if (info.bitsPerSample <= 0) info.bitsPerSample = 16
                  return info
              }
              private fun readFully(i: InputStream, b: ByteArray) { var n=0; while(n<b.size){ val c=i.read(b,n,b.size-n); if(c<0)throw EOFException(); n+=c } }
              private fun readIntLE(i: InputStream): Int { val a=i.read();val b=i.read();val c=i.read();val d=i.read(); if((a or b or c or d)<0)throw EOFException(); return (d shl 24)+(c shl 16)+(b shl 8)+a }
              private fun readShortLE(i: InputStream): Short { val a=i.read();val b=i.read(); if((a or b)<0)throw EOFException(); return ((b shl 8)+a).toShort() }
              private fun skipFully(i: InputStream, n: Int) { var t=0L; while(t<n){ var s=i.skip(n-t); if(s==0L){if(i.read()<0)throw EOFException();s=1}; t+=s } }
          }
          """)

