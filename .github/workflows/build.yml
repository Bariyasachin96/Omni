        cat > app/src/main/kotlin/com/omni/tts/LiveStreamProcessor.kt << 'EOF'
        package com.omni.tts
        import android.content.Context
        import android.os.Bundle
        import android.os.Process
        import android.speech.tts.TextToSpeech
        import android.speech.tts.SynthesisCallback
        import android.speech.tts.UtteranceProgressListener
        import java.io.File
        import java.io.FileInputStream
        import java.util.concurrent.CountDownLatch
        import java.util.concurrent.atomic.AtomicBoolean
        object LiveStreamProcessor {
            fun process(context: Context, tts: TextToSpeech, text: String, lang: String, volume: Float, callback: SynthesisCallback, cbStarted: BooleanArray, isStopped: AtomicBoolean, chunkIndex: Int): Boolean {
                Process.setThreadPriority(Process.THREAD_PRIORITY_URGENT_AUDIO)
                val tmp = File(context.cacheDir, "omni_live_${System.nanoTime()}.wav")
                var pipeStream: FileInputStream? = null
                val synthStart = VhLogger.markSynthStart(text, lang, chunkIndex)
                var totalBytes = 0L
                try {
                    val latch = CountDownLatch(1)
                    val synthError = BooleanArray(1) { false }
                    tts.setOnUtteranceProgressListener(object : UtteranceProgressListener() {
                        override fun onStart(id: String) {}
                        override fun onDone(id: String) { VhLogger.markSynthEnd(chunkIndex, synthStart); latch.countDown() }
                        override fun onError(id: String) { synthError[0] = true; latch.countDown() }
                        override fun onError(id: String, errorCode: Int) { synthError[0] = true; latch.countDown() }
                    })
                    val params = Bundle(); params.putFloat(TextToSpeech.Engine.KEY_PARAM_VOLUME, volume)
                    if (tts.synthesizeToFile(text, params, tmp, "omni_$lang") != TextToSpeech.SUCCESS) { synthError[0] = true; latch.countDown() }
                    if (synthError[0]) { VhLogger.markSynthError(chunkIndex, "synthesizeToFile returned error"); return isStopped.get() }
                    var headerParsed = false; var bytesRead = 0L
                    while (latch.count > 0 || tmp.length() > bytesRead) {
                        if (isStopped.get()) { tts.stop(); VhLogger.d("[CHUNK-$chunkIndex] STOPPED by user"); break }
                        if (!headerParsed) {
                            if (tmp.exists() && tmp.length() >= 44) {
                                try {
                                    pipeStream = FileInputStream(tmp)
                                    val wavInfo = WavUtils.parse(pipeStream)
                                    bytesRead = if(wavInfo.dataOffset > 0) wavInfo.dataOffset.toLong() else 44L
                                    pipeStream.channel.position(bytesRead)
                                    VhLogger.markHeaderFound(chunkIndex)
                                    if (!cbStarted[0]) {
                                        val enc = if(wavInfo.bitsPerSample.toInt() == 8) android.media.AudioFormat.ENCODING_PCM_8BIT else android.media.AudioFormat.ENCODING_PCM_16BIT
                                        callback.start(wavInfo.sampleRate, enc, wavInfo.channels.toInt()); cbStarted[0] = true
                                    }
                                    headerParsed = true
                                } catch (e: Exception) { pipeStream?.close(); pipeStream = null; Thread.sleep(1); continue }
                            } else { Thread.sleep(0); continue }
                        }
                        val currentLength = tmp.length()
                        if (currentLength > bytesRead && pipeStream != null) {
                            val buf = ByteArray(1024); val toRead = Math.min(buf.size.toLong(), currentLength - bytesRead).toInt()
                            if (toRead > 0) {
                                val r = pipeStream.read(buf, 0, toRead)
                                if (r > 0) { if (totalBytes == 0L) VhLogger.markFirstAudio(chunkIndex); callback.audioAvailable(buf, 0, r); bytesRead += r; totalBytes += r } else Thread.sleep(1)
                            } else Thread.sleep(1)
                        } else if (latch.count > 0L) Thread.sleep(1)
                    }
                } catch (e: Exception) { VhLogger.e("[CHUNK-$chunkIndex] Exception: ${e.message}") } finally { VhLogger.markChunkDone(chunkIndex, synthStart, totalBytes); pipeStream?.close(); if (tmp.exists()) tmp.delete() }
                return isStopped.get()
            }
        }
