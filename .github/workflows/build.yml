          # ── AccessibleDropdown.kt ────────────────────────────────────────────
          w("app/src/main/java/com/omni/tts/AccessibleDropdown.kt",
          "package com.omni.tts\n"
          "import androidx.compose.foundation.clickable\n"
          "import androidx.compose.foundation.layout.*\n"
          "import androidx.compose.foundation.lazy.LazyColumn\n"
          "import androidx.compose.material3.*\n"
          "import androidx.compose.runtime.*\n"
          "import androidx.compose.ui.Modifier\n"
          "import androidx.compose.ui.semantics.contentDescription\n"
          "import androidx.compose.ui.semantics.semantics\n"
          "import androidx.compose.ui.unit.dp\n"
          "@Composable\n"
          "fun AccessibleDropdown(label: String, selectedText: String, items: List<String>, onSelect: (Int) -> Unit) {\n"
          "    var showDialog by remember { mutableStateOf(false) }\n"
          "    Box(modifier = Modifier.fillMaxWidth().padding(vertical = 8.dp)) {\n"
          "        OutlinedTextField(\n"
          "            value = selectedText, onValueChange = {}, readOnly = true, label = { Text(label) },\n"
          "            modifier = Modifier.fillMaxWidth(), enabled = false,\n"
          "            colors = OutlinedTextFieldDefaults.colors(\n"
          "                disabledTextColor = MaterialTheme.colorScheme.onSurface,\n"
          "                disabledBorderColor = MaterialTheme.colorScheme.outline,\n"
          "                disabledLabelColor = MaterialTheme.colorScheme.onSurfaceVariant\n"
          "            )\n"
          "        )\n"
          "        Box(modifier = Modifier.matchParentSize().clickable { showDialog = true }.semantics { contentDescription = \"Select $label. Current is $selectedText. Double tap to change.\" })\n"
          "    }\n"
          "    if (showDialog) {\n"
          "        AlertDialog(\n"
          "            onDismissRequest = { showDialog = false },\n"
          "            title = { Text(label) },\n"
          "            text = {\n"
          "                LazyColumn {\n"
          "                    items(items.size) { i ->\n"
          "                        Text(items[i], modifier = Modifier.fillMaxWidth().clickable { onSelect(i); showDialog = false }.padding(vertical = 16.dp, horizontal = 8.dp))\n"
          "                    }\n"
          "                }\n"
          "            },\n"
          "            confirmButton = { TextButton(onClick = { showDialog = false }) { Text(\"Cancel\") } }\n"
          "        )\n"
          "    }\n"
          "}\n")

          # ── MainActivity.kt ──────────────────────────────────────────────────
          w("app/src/main/java/com/omni/tts/MainActivity.kt",
          "package com.omni.tts\n"
          "import android.content.Intent\n"
          "import android.os.Bundle\n"
          "import android.widget.Toast\n"
          "import androidx.activity.ComponentActivity\n"
          "import androidx.activity.compose.setContent\n"
          "import androidx.compose.foundation.layout.*\n"
          "import androidx.compose.foundation.rememberScrollState\n"
          "import androidx.compose.foundation.verticalScroll\n"
          "import androidx.compose.material3.*\n"
          "import androidx.compose.runtime.*\n"
          "import androidx.compose.ui.Modifier\n"
          "import androidx.compose.ui.platform.LocalContext\n"
          "import androidx.compose.ui.unit.dp\n"
          "import androidx.core.content.FileProvider\n"
          "import java.util.Locale\n"
          "class MainActivity : ComponentActivity() {\n"
          "    private var tempTts: android.speech.tts.TextToSpeech? = null\n"
          "    @OptIn(ExperimentalMaterial3Api::class)\n"
          "    override fun onCreate(savedInstanceState: Bundle?) {\n"
          "        super.onCreate(savedInstanceState)\n"
          "        val prefs = SharedPrefsManager(this)\n"
          "        setContent {\n"
          "            MaterialTheme {\n"
          "                Surface(modifier = Modifier.fillMaxSize()) {\n"
          "                    val context = LocalContext.current\n"
          "                    val engines = EngineFinder.getEngines(context).toMutableList().apply { add(0, EngineFinder.TTSInfo(\"NOT_SET\", \"--- Not Set ---\")) }\n"
          "                    var selLangIso by remember { mutableStateOf(prefs.getString(\"pref_lang\", \"en\")) }\n"
          "                    var selEngPkg by remember { mutableStateOf(prefs.getEngineForLanguage(selLangIso)) }\n"
          "                    var availableLocales by remember { mutableStateOf(listOf<Locale>()) }\n"
          "                    var selLocTag by remember { mutableStateOf(prefs.getLocaleForLangPkg(selLangIso, selEngPkg)) }\n"
          "                    var readingMode by remember { mutableStateOf(prefs.getReadingMode()) }\n"
          "                    val readingModeOptions = listOf(\"Single Mode\", \"Auto Mode\", \"Mix Language Mode\")\n"
          "                    val readingModeKeys = listOf(\"single\", \"auto\", \"mix\")\n"
          "                    LaunchedEffect(selEngPkg, selLangIso) {\n"
          "                        if (selEngPkg != \"NOT_SET\") {\n"
          "                            tempTts?.shutdown()\n"
          "                            tempTts = android.speech.tts.TextToSpeech(context, { status ->\n"
          "                                if (status == android.speech.tts.TextToSpeech.SUCCESS) {\n"
          "                                    val voices = try { tempTts?.voices?.map { it.locale }?.filter { it.language.equals(selLangIso, true) } } catch (_: Exception) { null }\n"
          "                                    availableLocales = voices?.distinctBy { it.toLanguageTag() }?.sortedBy { it.displayName } ?: listOf()\n"
          "                                }\n"
          "                            }, selEngPkg)\n"
          "                        } else { availableLocales = listOf(); tempTts?.shutdown(); tempTts = null }\n"
          "                    }\n"
          "                    Column(modifier = Modifier.padding(16.dp).verticalScroll(rememberScrollState())) {\n"
          "                        Text(\"Omni Native TTS\", style = MaterialTheme.typography.headlineMedium)\n"
          "                        Spacer(modifier = Modifier.height(8.dp))\n"
          "                        Text(\"v16.0 — Zero-Copy Native Engine\", style = MaterialTheme.typography.bodySmall)\n"
          "                        Spacer(modifier = Modifier.height(24.dp))\n"
          "                        AccessibleDropdown(\"Reading Mode\", readingModeOptions[readingModeKeys.indexOf(readingMode).coerceAtLeast(0)], readingModeOptions) { idx ->\n"
          "                            readingMode = readingModeKeys[idx]; prefs.setReadingMode(readingMode)\n"
          "                        }\n"
          "                        Spacer(modifier = Modifier.height(8.dp))\n"
          "                        AccessibleDropdown(\"Select ISO Language\", \"${Languages.map[selLangIso]} ($selLangIso)\", Languages.displayNames) { idx ->\n"
          "                            selLangIso = Languages.isoCodes[idx]; prefs.setString(\"pref_lang\", selLangIso)\n"
          "                            selEngPkg = prefs.getEngineForLanguage(selLangIso)\n"
          "                            selLocTag = prefs.getLocaleForLangPkg(selLangIso, selEngPkg)\n"
          "                        }\n"
          "                        AccessibleDropdown(\"Select TTS Engine\", engines.find { it.pkg == selEngPkg }?.name ?: \"Not Set\", engines.map { it.name }) { idx ->\n"
          "                            selEngPkg = engines[idx].pkg; prefs.setString(\"engine_$selLangIso\", selEngPkg)\n"
          "                            selLocTag = prefs.getLocaleForLangPkg(selLangIso, selEngPkg)\n"
          "                        }\n"
          "                        val locNames = availableLocales.map { it.displayName }.ifEmpty { listOf(\"Default System Voice\") }\n"
          "                        AccessibleDropdown(\"Voice / Locale\", availableLocales.find { it.toLanguageTag() == selLocTag }?.displayName ?: \"Default System Voice\", locNames) { idx ->\n"
          "                            if (availableLocales.isNotEmpty()) { selLocTag = availableLocales[idx].toLanguageTag(); prefs.setLocaleForLangPkg(selLangIso, selEngPkg, selLocTag) }\n"
          "                        }\n"
          "                        Spacer(modifier = Modifier.height(24.dp))\n"
          "                        Button(onClick = { context.startActivity(Intent(context, LanguageSettingsActivity::class.java).putExtra(\"key\", \"${selLangIso}_${selEngPkg}\")) }, modifier = Modifier.fillMaxWidth()) { Text(\"LANGUAGE SPEED / PITCH SETTINGS\") }\n"
          "                        Spacer(modifier = Modifier.height(12.dp))\n"
          "                        Button(onClick = { startActivity(Intent(\"com.android.settings.TTS_SETTINGS\")) }, modifier = Modifier.fillMaxWidth()) { Text(\"OPEN SYSTEM TTS SETTINGS\") }\n"
          "                        Spacer(modifier = Modifier.height(12.dp))\n"
          "                        Button(onClick = { startActivity(Intent(context, AdvancedSettingsActivity::class.java)) }, modifier = Modifier.fillMaxWidth()) { Text(\"ADVANCED SETTINGS\") }\n"
          "                        Spacer(modifier = Modifier.height(32.dp))\n"
          "                        Button(onClick = {\n"
          "                            try {\n"
          "                                val logFile = VhLogger.exportToFile()\n"
          "                                val uri = FileProvider.getUriForFile(context, \"${context.packageName}.provider\", logFile)\n"
          "                                context.startActivity(Intent.createChooser(Intent(Intent.ACTION_SEND).apply { type=\"text/plain\"; putExtra(Intent.EXTRA_STREAM,uri); putExtra(Intent.EXTRA_SUBJECT,\"Omni Log\"); addFlags(Intent.FLAG_GRANT_READ_URI_PERMISSION) }, \"Share Log\"))\n"
          "                            } catch (e: Exception) { Toast.makeText(context, \"Log export failed: ${e.message}\", Toast.LENGTH_SHORT).show() }\n"
          "                        }, modifier = Modifier.fillMaxWidth(), colors = ButtonDefaults.buttonColors(containerColor = MaterialTheme.colorScheme.error)) { Text(\"EXPORT DEBUG LOG\") }\n"
          "                    }\n"
          "                }\n"
          "            }\n"
          "        }\n"
          "    }\n"
          "    override fun onDestroy() { tempTts?.shutdown(); super.onDestroy() }\n"
          "}\n")

          # ── LanguageSettingsActivity.kt ──────────────────────────────────────
          w("app/src/main/java/com/omni/tts/LanguageSettingsActivity.kt",
          "package com.omni.tts\n"
          "import android.os.Bundle\n"
          "import androidx.activity.ComponentActivity\n"
          "import androidx.activity.compose.setContent\n"
          "import androidx.compose.foundation.layout.*\n"
          "import androidx.compose.material3.*\n"
          "import androidx.compose.runtime.*\n"
          "import androidx.compose.ui.Alignment\n"
          "import androidx.compose.ui.Modifier\n"
          "import androidx.compose.ui.platform.LocalContext\n"
          "import androidx.compose.ui.semantics.contentDescription\n"
          "import androidx.compose.ui.semantics.semantics\n"
          "import androidx.compose.ui.unit.dp\n"
          "class LanguageSettingsActivity : ComponentActivity() {\n"
          "    private var testTts: android.speech.tts.TextToSpeech? = null\n"
          "    override fun onCreate(savedInstanceState: Bundle?) {\n"
          "        super.onCreate(savedInstanceState)\n"
          "        val currentKey = intent.getStringExtra(\"key\") ?: \"en_NOT_SET\"\n"
          "        val prefs = SharedPrefsManager(this)\n"
          "        setContent {\n"
          "            MaterialTheme {\n"
          "                Surface(modifier = Modifier.fillMaxSize()) {\n"
          "                    val context = LocalContext.current\n"
          "                    var rate by remember { mutableIntStateOf(prefs.getInt(\"rate_$currentKey\", 100)) }\n"
          "                    var pitch by remember { mutableIntStateOf(prefs.getInt(\"pitch_$currentKey\", 100)) }\n"
          "                    var vol by remember { mutableIntStateOf(prefs.getInt(\"vol_$currentKey\", 100)) }\n"
          "                    Column(modifier = Modifier.padding(16.dp)) {\n"
          "                        Text(\"Language Settings [$currentKey]\", style = MaterialTheme.typography.headlineSmall)\n"
          "                        Spacer(modifier = Modifier.height(24.dp))\n"
          "                        Text(\"Speech Rate: ${if(rate==100) \"System Default\" else String.format(java.util.Locale.US,\"%.2fx\",rate/100f)}\")\n"
          "                        Row(verticalAlignment = Alignment.CenterVertically) {\n"
          "                            Button(onClick={rate=maxOf(0,rate-5)},modifier=Modifier.semantics{contentDescription=\"Decrease Speech Rate\"}){Text(\"-\")}\n"
          "                            Slider(value=rate.toFloat(),onValueChange={rate=it.toInt()},valueRange=0f..500f,modifier=Modifier.weight(1f).padding(horizontal=8.dp))\n"
          "                            Button(onClick={rate=minOf(500,rate+5)},modifier=Modifier.semantics{contentDescription=\"Increase Speech Rate\"}){Text(\"+\")}\n"
          "                        }\n"
          "                        Spacer(modifier = Modifier.height(16.dp))\n"
          "                        Text(\"Pitch: ${if(pitch==100) \"System Default\" else String.format(java.util.Locale.US,\"%.2fx\",pitch/100f)}\")\n"
          "                        Row(verticalAlignment = Alignment.CenterVertically) {\n"
          "                            Button(onClick={pitch=maxOf(0,pitch-5)},modifier=Modifier.semantics{contentDescription=\"Decrease Pitch\"}){Text(\"-\")}\n"
          "                            Slider(value=pitch.toFloat(),onValueChange={pitch=it.toInt()},valueRange=0f..500f,modifier=Modifier.weight(1f).padding(horizontal=8.dp))\n"
          "                            Button(onClick={pitch=minOf(500,pitch+5)},modifier=Modifier.semantics{contentDescription=\"Increase Pitch\"}){Text(\"+\")}\n"
          "                        }\n"
          "                        Spacer(modifier = Modifier.height(16.dp))\n"
          "                        Text(\"Volume: ${if(vol==100) \"System Default\" else \"$vol%\"}\")\n"
          "                        Row(verticalAlignment = Alignment.CenterVertically) {\n"
          "                            Button(onClick={vol=maxOf(0,vol-5)},modifier=Modifier.semantics{contentDescription=\"Decrease Volume\"}){Text(\"-\")}\n"
          "                            Slider(value=vol.toFloat(),onValueChange={vol=it.toInt()},valueRange=0f..100f,modifier=Modifier.weight(1f).padding(horizontal=8.dp))\n"
          "                            Button(onClick={vol=minOf(100,vol+5)},modifier=Modifier.semantics{contentDescription=\"Increase Volume\"}){Text(\"+\")}\n"
          "                        }\n"
          "                        Spacer(modifier = Modifier.height(32.dp))\n"
          "                        Button(onClick = {\n"
          "                            val pkg = if(currentKey.contains(\"_\")) currentKey.substring(currentKey.indexOf('_')+1) else \"com.google.android.tts\"\n"
          "                            testTts?.shutdown()\n"
          "                            testTts = android.speech.tts.TextToSpeech(context, { status ->\n"
          "                                if(status == android.speech.tts.TextToSpeech.SUCCESS){\n"
          "                                    testTts?.setSpeechRate(rate/100f); testTts?.setPitch(pitch/100f)\n"
          "                                    val p = android.os.Bundle(); p.putFloat(android.speech.tts.TextToSpeech.Engine.KEY_PARAM_VOLUME,vol/100f)\n"
          "                                    testTts?.speak(\"Testing audio settings\",android.speech.tts.TextToSpeech.QUEUE_FLUSH,p,\"test\")\n"
          "                                }\n"
          "                            }, if(pkg==\"NOT_SET\") null else pkg)\n"
          "                        }, modifier = Modifier.fillMaxWidth()) { Text(\"TEST AUDIO\") }\n"
          "                        Spacer(modifier = Modifier.height(12.dp))\n"
          "                        Button(onClick={prefs.setInt(\"rate_$currentKey\",rate);prefs.setInt(\"pitch_$currentKey\",pitch);prefs.setInt(\"vol_$currentKey\",vol);finish()},modifier=Modifier.fillMaxWidth(),colors=ButtonDefaults.buttonColors(containerColor=MaterialTheme.colorScheme.secondary)){Text(\"APPLY SETTINGS\")}\n"
