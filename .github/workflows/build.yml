        cat > app/src/main/kotlin/com/omni/tts/ComposeTtsService.kt << 'EOF'
        package com.omni.tts
        import android.speech.tts.SynthesisCallback
        import android.speech.tts.SynthesisRequest
        import android.speech.tts.TextToSpeech
        import android.speech.tts.TextToSpeechService
        import java.util.Locale
        import java.util.concurrent.ConcurrentHashMap
        import java.util.concurrent.CountDownLatch
        import java.util.concurrent.TimeUnit
        import java.util.concurrent.atomic.AtomicBoolean
        import java.util.concurrent.atomic.AtomicReference
        class ComposeTtsService : TextToSpeechService() {
            private val pool = ConcurrentHashMap<String, TextToSpeech>()
            private lateinit var prefs: SharedPrefsManager
            private val activeStop = AtomicReference(AtomicBoolean(true))
            class LangState { var localeTag = ""; var rate = -1f; var pitch = -1f }
            private val langStates = ConcurrentHashMap<String, LangState>()
            override fun onCreate() { super.onCreate(); VhLogger.init(this); VhLogger.i("[SERVICE] onCreate"); prefs = SharedPrefsManager(this) }
            override fun onGetLanguage(): Array<String> = arrayOf("eng", "USA", "")
            override fun onIsLanguageAvailable(l: String?, c: String?, v: String?): Int = TextToSpeech.LANG_AVAILABLE
            override fun onLoadLanguage(l: String?, c: String?, v: String?): Int = TextToSpeech.LANG_AVAILABLE
            override fun onStop() { VhLogger.markStop(); activeStop.get().set(true); pool.values.forEach { try { it.stop() } catch(e:Exception){} } }
            private fun initEngineForLang(lang: String): TextToSpeech? {
                val pkg = prefs.getEngineForLanguage(lang)
                if (pkg == "NOT_SET") return null
                if (pool.containsKey(lang)) return pool[lang]
                val latch = CountDownLatch(1)
                var tts: TextToSpeech? = null
                tts = TextToSpeech(this, { status ->
                    if(status == TextToSpeech.SUCCESS) {
                        var tag = prefs.getLocaleForLangPkg(lang, pkg)
                        if(tag.isEmpty()) tag = Locale(lang).toLanguageTag()
                        try { tts?.language = Locale.forLanguageTag(tag) } catch(e:Exception){ tts?.language = Locale(lang) }
                    }
                    latch.countDown()
                }, pkg)
                latch.await(5, TimeUnit.SECONDS)
                pool[lang] = tts
                return tts
            }
            override fun onSynthesizeText(request: SynthesisRequest?, callback: SynthesisCallback?) {
                activeStop.get().set(true)
                val myStop = AtomicBoolean(false)
                activeStop.set(myStop)
                var text = request?.charSequenceText?.toString() ?: return
                if (text.isEmpty() || myStop.get()) { callback?.done(); return }
                text = text.replace('\u00A0', ' ').replace('\u200B', ' ').replace('\u200C', ' ').replace('\u200D', ' ').replace('\uFEFF', ' ')
                val dict = if (prefs.getBoolean("dict_enabled", false)) prefs.getDict() else emptyMap()
                val keys = dict.keys.toTypedArray()
                val vals = dict.values.toTypedArray()
                val keepEmoji = prefs.getBoolean("emoji_reading", true)
                val countEmoji = prefs.getBoolean("emoji_count", false)
                val countPunct = prefs.getBoolean("punct_count", false)
                val latFall = prefs.getString("mixed_mode_latin_language", "en")
                val nonLatFall = prefs.getString("mixed_mode_non_latin_language", "hi")
                val nativeOutput = NativeEngine.processAll(text, keys, vals, keepEmoji, countEmoji, countPunct, latFall, nonLatFall)
                val chunkStrings = nativeOutput.split("||").filter { it.isNotBlank() }
                val cbStarted = BooleanArray(1) { false }
                VhLogger.markRequest(text, chunkStrings.size)
                var chunkIndex = 0
                for (chunkStr in chunkStrings) {
                    if (myStop.get()) break
                    val parts = chunkStr.split("|", limit = 2)
                    if (parts.size < 2 || parts[1].trim().isEmpty()) continue
                    chunkIndex++
                    var effectiveLang = parts[0]
                    val chunkText = parts[1]
                    var pkg = prefs.getEngineForLanguage(effectiveLang)
                    if (pkg == "NOT_SET") { VhLogger.markFallback(effectiveLang, latFall); effectiveLang = latFall; pkg = prefs.getEngineForLanguage(effectiveLang) }
                    if (pkg == "NOT_SET") { VhLogger.markSkipped("no engine for lang=$effectiveLang"); continue }
                    val key = "${effectiveLang}_${pkg}"
                    val appRate = Math.max(0.1f, (prefs.getFloat("rate_$key", 1.0f)))
                    val appPitch = Math.max(0.1f, (prefs.getFloat("pitch_$key", 1.0f)))
                    val appVolume = prefs.getFloat("vol_$key", 1.0f)
                    val sysRate = Math.max(0.1f, request.speechRate / 100.0f)
                    val sysPitch = Math.max(0.1f, request.pitch / 100.0f)
                    val finalRate = Math.max(0.1f, Math.min(6.0f, sysRate * appRate))
                    val finalPitch = Math.max(0.1f, Math.min(6.0f, sysPitch * appPitch))
                    val engineExists = pool.containsKey(effectiveLang)
                    val initStart = System.currentTimeMillis()
                    val tts = initEngineForLang(effectiveLang) ?: continue
                    if (!engineExists) VhLogger.markEngineInit(effectiveLang, pkg, System.currentTimeMillis() - initStart) else VhLogger.markEngineReused(effectiveLang)
                    val state = langStates.getOrPut(effectiveLang) { LangState() }
                    if (Math.abs(state.rate - finalRate) > 0.01f) { tts.setSpeechRate(finalRate); state.rate = finalRate }
                    if (Math.abs(state.pitch - finalPitch) > 0.01f) { tts.setPitch(finalPitch); state.pitch = finalPitch }
                    var locTag = prefs.getLocaleForLangPkg(effectiveLang, pkg)
                    if (locTag.isEmpty()) locTag = Locale(effectiveLang).toLanguageTag()
                    if (state.localeTag != locTag) {
                        try { tts.language = Locale.forLanguageTag(locTag) } catch(e:Exception){ tts.language = Locale(effectiveLang) }
                        state.localeTag = locTag
                    }
                    val stopped = LiveStreamProcessor.process(this, tts, chunkText, effectiveLang, appVolume, callback!!, cbStarted, myStop, chunkIndex)
                    if (stopped) { VhLogger.markStop(); break }
                }
                if (!cbStarted[0] && !myStop.get()) callback?.start(16000, android.media.AudioFormat.ENCODING_PCM_16BIT, 1)
                callback?.done()
            }
            override fun onDestroy() { VhLogger.i("[SERVICE] onDestroy"); activeStop.get().set(true); pool.values.forEach { try { it.shutdown() } catch(e:Exception){} }; pool.clear(); langStates.clear(); super.onDestroy() }
        }
