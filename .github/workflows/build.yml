          w("app/src/main/java/com/omni/tts/AccessibleDropdown.kt",
          "package com.omni.tts\n"
          "import androidx.compose.foundation.clickable\n"
          "import androidx.compose.foundation.layout.*\n"
          "import androidx.compose.foundation.lazy.LazyColumn\n"
          "import androidx.compose.material3.*\n"
          "import androidx.compose.runtime.*\n"
          "import androidx.compose.ui.Modifier\n"
          "import androidx.compose.ui.semantics.contentDescription\n"
          "import androidx.compose.ui.semantics.semantics\n"
          "import androidx.compose.ui.unit.dp\n"
          "@Composable\n"
          "fun AccessibleDropdown(label: String, selectedText: String, items: List<String>, onSelect: (Int) -> Unit) {\n"
          "    var showDialog by remember { mutableStateOf(false) }\n"
          "    Box(modifier = Modifier.fillMaxWidth().padding(vertical = 8.dp)) {\n"
          "        OutlinedTextField(\n"
          "            value = selectedText, onValueChange = {}, readOnly = true, label = { Text(label) },\n"
          "            modifier = Modifier.fillMaxWidth(), enabled = false,\n"
          "            colors = OutlinedTextFieldDefaults.colors(\n"
          "                disabledTextColor = MaterialTheme.colorScheme.onSurface,\n"
          "                disabledBorderColor = MaterialTheme.colorScheme.outline,\n"
          "                disabledLabelColor = MaterialTheme.colorScheme.onSurfaceVariant\n"
          "            )\n"
          "        )\n"
          "        Box(modifier = Modifier.matchParentSize().clickable { showDialog = true }.semantics { contentDescription = \"$label. Current setting is $selectedText. Double tap to change.\" })\n"
          "    }\n"
          "    if (showDialog) {\n"
          "        AlertDialog(\n"
          "            onDismissRequest = { showDialog = false },\n"
          "            title = { Text(label) },\n"
          "            text = {\n"
          "                LazyColumn {\n"
          "                    items(items.size) { i ->\n"
          "                        Text(items[i], modifier = Modifier.fillMaxWidth().clickable { onSelect(i); showDialog = false }.padding(vertical = 16.dp, horizontal = 8.dp))\n"
          "                    }\n"
          "                }\n"
          "            },\n"
          "            confirmButton = { TextButton(onClick = { showDialog = false }) { Text(\"Cancel\") } }\n"
          "        )\n"
          "    }\n"
          "}\n")

