        package com.omni.tts
        object TextNormalizer {
            fun normalizeMath(text: String): String {
                val sb = StringBuilder(); var i = 0
                while (i < text.length) {
                    val cp = text.codePointAt(i)
                    val ascii = mathUnicodeToAscii(cp)
                    if (ascii != 0.toChar()) sb.append(ascii) else sb.appendCodePoint(cp)
                    i += Character.charCount(cp)
                }
                return sb.toString()
            }
            private fun mathUnicodeToAscii(cp: Int): Char {
                if (cp in 0x1D400..0x1D419) return ('A' + (cp - 0x1D400)); if (cp in 0x1D434..0x1D44D) return ('A' + (cp - 0x1D434))
                if (cp in 0x1D468..0x1D481) return ('A' + (cp - 0x1D468)); if (cp in 0x1D5A0..0x1D5B9) return ('A' + (cp - 0x1D5A0))
                if (cp in 0x1D670..0x1D689) return ('A' + (cp - 0x1D670)); if (cp in 0x1D41A..0x1D433) return ('a' + (cp - 0x1D41A))
                if (cp in 0x1D44E..0x1D467) return ('a' + (cp - 0x1D44E)); if (cp in 0x1D482..0x1D49B) return ('a' + (cp - 0x1D482))
                if (cp in 0x1D5BA..0x1D5D3) return ('a' + (cp - 0x1D5BA)); if (cp in 0x1D68A..0x1D6A3) return ('a' + (cp - 0x1D68A))
                if (cp in 0xFF21..0xFF3A) return ('A' + (cp - 0xFF21)); if (cp in 0xFF41..0xFF5A) return ('a' + (cp - 0xFF41))
                return 0.toChar()
            }
            fun processEmojis(text: String, keep: Boolean, count: Boolean): String {
                val sb = StringBuilder(); var i = 0
                while (i < text.length) {
                    val cp = text.codePointAt(i); val cpLen = Character.charCount(cp)
                    if (isEmoji(cp)) {
                        if (keep) {
                            var eCount = 1; var j = i + cpLen
                            while (j < text.length && text.codePointAt(j) == cp) { eCount++; j += cpLen }
                            if (count && eCount > 1) sb.append("$eCount ").appendCodePoint(cp) else sb.appendCodePoint(cp)
                            i = j; continue
                        }
                    } else sb.appendCodePoint(cp)
                    i += cpLen
                }
                return sb.toString()
            }
            private fun isEmoji(cp: Int): Boolean = cp > 0xFFFF || cp in 0x2600..0x27BF || cp in 0x1F300..0x1FAFF || cp in 0xFE00..0xFE0F
            fun processPunctuation(text: String, count: Boolean): String {
                if (!count) return text
                val sb = StringBuilder(); var i = 0
                while (i < text.length) {
                    val c = text[i]
                    if (isPunct(c)) {
                        var pCount = 1; while (i + pCount < text.length && text[i + pCount] == c) pCount++
                        if (pCount > 1) sb.append("$pCount $c") else sb.append(c)
                        i += pCount; continue
                    } else sb.append(c); i++
                }
                return sb.toString()
            }
            private fun isPunct(c: Char): Boolean = c == '.' || c == '!' || c == '?' || c == ',' || c == ';' || c == ':' || c == '-' || c == '*' || c == '_'
            fun isPunctuationOnly(text: String): Boolean {
                var i = 0
                while (i < text.length) {
                    val cp = text.codePointAt(i)
                    if (Character.isLetter(cp) || Character.isDigit(cp)) return false
                    i += Character.charCount(cp)
                }
                return true
            }
        }
