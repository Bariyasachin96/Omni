        cat > app/src/main/cpp/tts_engine_core.cpp << 'EOF'
#include <jni.h>
#include <string>
#include <cstring>
#include "compact_lang_det.h"

// Returns ISO-639 2-letter code, or "un" if unknown/unreliable
static std::string detectLang(const std::string& text) {
    if (text.empty()) return "un";
    bool reliable = false;
    int bytes = static_cast<int>(text.size());
    CLD2::Language lang = CLD2::DetectLanguage(
        text.c_str(), bytes, true, &reliable);
    const char* code = CLD2::LanguageCode(lang);
    if (!code || strlen(code) == 0 || strcmp(code,"un")==0) return "un";
    return std::string(code);
}

extern "C" JNIEXPORT jstring JNICALL
Java_com_omni_tts_NativeEngine_detectLang(
        JNIEnv* env, jobject, jstring jText) {
    if (!jText) return env->NewStringUTF("un");
    const char* utf8 = env->GetStringUTFChars(jText, nullptr);
    if (!utf8)  return env->NewStringUTF("un");
    std::string result = detectLang(std::string(utf8));
    env->ReleaseStringUTFChars(jText, utf8);
    return env->NewStringUTF(result.c_str());
}
EOF

