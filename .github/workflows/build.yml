        cat > app/src/main/cpp/tts_engine_core.cpp << 'CPPEOF'
#include <jni.h>
#include <string>
#include <cstring>
#include <vector>
#include "compact_lang_det.h"

struct BlockDef { int start; int end; std::string lang; };
std::vector<BlockDef> blocks = {
    {0x0900, 0x097F, "hi"}, {0x0980, 0x09FF, "bn"}, {0x0A00, 0x0A7F, "pa"}, {0x0A80, 0x0AFF, "gu"},
    {0x0B00, 0x0B7F, "or"}, {0x0B80, 0x0BFF, "ta"}, {0x0C00, 0x0C7F, "te"}, {0x0C80, 0x0CFF, "kn"},
    {0x0D00, 0x0D7F, "ml"}, {0x0D80, 0x0DFF, "si"}, {0x0E00, 0x0E7F, "th"}, {0x0600, 0x06FF, "ar"},
    {0x3040, 0x309F, "ja"}, {0x1100, 0x11FF, "ko"}, {0x4E00, 0x9FFF, "zh"}
};

int utf8ToCodepoint(const unsigned char* p, int& len) {
    if (p[0] < 0x80) { len = 1; return p[0]; }
    if ((p[0] & 0xE0) == 0xC0) { len = 2; return ((p[0] & 0x1F) << 6) | (p[1] & 0x3F); }
    if ((p[0] & 0xF0) == 0xE0) { len = 3; return ((p[0] & 0x0F) << 12) | ((p[1] & 0x3F) << 6) | (p[2] & 0x3F); }
    if ((p[0] & 0xF8) == 0xF0) { len = 4; return ((p[0] & 0x07) << 18) | ((p[1] & 0x3F) << 12) | ((p[2] & 0x3F) << 6) | (p[3] & 0x3F); }
    len = 1; return p[0];
}

void codepointToUtf8(int cp, std::string& out) {
    if (cp <= 0x7F) { out += static_cast<char>(cp); }
    else if (cp <= 0x7FF) { out += static_cast<char>((cp >> 6) | 0xC0); out += static_cast<char>((cp & 0x3F) | 0x80); }
    else if (cp <= 0xFFFF) { out += static_cast<char>((cp >> 12) | 0xE0); out += static_cast<char>(((cp >> 6) & 0x3F) | 0x80); out += static_cast<char>((cp & 0x3F) | 0x80); }
    else if (cp <= 0x10FFFF) { out += static_cast<char>((cp >> 18) | 0xF0); out += static_cast<char>(((cp >> 12) & 0x3F) | 0x80); out += static_cast<char>(((cp >> 6) & 0x3F) | 0x80); out += static_cast<char>((cp & 0x3F) | 0x80); }
}

char mathUnicodeToAscii(int cp) {
    if (cp >= 0x1D400 && cp <= 0x1D419) return 'A' + (cp - 0x1D400);
    if (cp >= 0x1D434 && cp <= 0x1D44D) return 'A' + (cp - 0x1D434);
    if (cp >= 0x1D468 && cp <= 0x1D481) return 'A' + (cp - 0x1D468);
    if (cp >= 0x1D5A0 && cp <= 0x1D5B9) return 'A' + (cp - 0x1D5A0);
    if (cp >= 0x1D670 && cp <= 0x1D689) return 'A' + (cp - 0x1D670);
    if (cp >= 0x1D41A && cp <= 0x1D433) return 'a' + (cp - 0x1D41A);
    if (cp >= 0x1D44E && cp <= 0x1D467) return 'a' + (cp - 0x1D44E);
    if (cp >= 0x1D482 && cp <= 0x1D49B) return 'a' + (cp - 0x1D482);
    if (cp >= 0x1D5BA && cp <= 0x1D5D3) return 'a' + (cp - 0x1D5BA);
    if (cp >= 0x1D68A && cp <= 0x1D6A3) return 'a' + (cp - 0x1D68A);
    if (cp >= 0xFF21 && cp <= 0xFF3A) return 'A' + (cp - 0xFF21);
    if (cp >= 0xFF41 && cp <= 0xFF5A) return 'a' + (cp - 0xFF41);
    if (cp >= 0x1D7CE && cp <= 0x1D7D7) return '0' + (cp - 0x1D7CE);
    if (cp >= 0xFF10 && cp <= 0xFF19) return '0' + (cp - 0xFF10);
    return 0;
}

bool isEmoji(int cp) {
    if (cp >= 0x1F300 && cp <= 0x1F9FF) return true;
    if (cp >= 0x2600 && cp <= 0x27BF) return true;
    if (cp >= 0x2300 && cp <= 0x23FF) return true;
    if (cp >= 0x2B50 && cp <= 0x2B55) return true;
    if (cp >= 0xFE00 && cp <= 0xFE0F) return true;
    if (cp >= 0x1FA00 && cp <= 0x1FAFF) return true;
    if (cp == 0x200D) return true;
    if (cp >= 0x1F1E0 && cp <= 0x1F1FF) return true;
    return false;
}

bool isPunct(int cp) { return cp == '.' || cp == '!' || cp == '?' || cp == ',' || cp == ';' || cp == ':' || cp == '-' || cp == '*' || cp == '_'; }

std::string normalizeText(const std::string& input, bool keepEmoji, bool countEmoji, bool countPunct) {
    std::string result;
    int i = 0, len = input.length();
    while (i < len) {
        int clen = 0;
        int cp = utf8ToCodepoint(reinterpret_cast<const unsigned char*>(&input[i]), clen);
        char ascii = mathUnicodeToAscii(cp);
        if (ascii != 0) { result += ascii; i += clen; continue; }

        if (isEmoji(cp)) {
            if (!keepEmoji) { i += clen; continue; }
            int eCount = 1;
            int j = i + clen;
            while (j < len) {
                int nlen = 0;
                int ncp = utf8ToCodepoint(reinterpret_cast<const unsigned char*>(&input[j]), nlen);
                if (ncp == cp) { eCount++; j += nlen; } else break;
            }
            if (countEmoji && eCount > 1) result += std::to_string(eCount) + " ";
            for (int k = 0; k < eCount; k++) codepointToUtf8(cp, result);
            i = j;
            continue;
        }

        if (isPunct(cp) && countPunct) {
            int pCount = 1;
            int j = i + clen;
            while (j < len) {
                int nlen = 0;
                int ncp = utf8ToCodepoint(reinterpret_cast<const unsigned char*>(&input[j]), nlen);
                if (ncp == cp) { pCount++; j += nlen; } else break;
            }
            if (pCount > 1) result += std::to_string(pCount) + " ";
            codepointToUtf8(cp, result);
            i = j;
            continue;
        }

        codepointToUtf8(cp, result);
        i += clen;
    }
    return result;
}

std::string applyDictionary(std::string text, const std::vector<std::string>& keys, const std::vector<std::string>& vals) {
    for (size_t i = 0; i < keys.size(); i++) {
        if (keys[i].empty()) continue;
        size_t start_pos = 0;
        while((start_pos = text.find(keys[i], start_pos)) != std::string::npos) {
            text.replace(start_pos, keys[i].length(), vals[i]);
            start_pos += vals[i].length();
        }
    }
    return text;
}

std::string detectLang(const std::string& text, const std::string& latFall, const std::string& nonLatFall) {
    bool is_rel = false;
    CLD2::Language lang = CLD2::DetectLanguage(text.c_str(), text.length(), true, &is_rel);
    const char* code = CLD2::LanguageCode(lang);
    if (code != nullptr && strlen(code) >= 2 && strcmp(code, "un") != 0) return std::string(code);

    int i = 0; int len = text.length(); bool hasNonLatin = false;
    while (i < len) {
        int clen = 0;
        int cp = utf8ToCodepoint(reinterpret_cast<const unsigned char*>(&text[i]), clen);
        if (cp > 0x02AF && !(cp >= 0x1E00 && cp <= 0x1EFF)) {
            hasNonLatin = true;
            for (const auto& b : blocks) { if (cp >= b.start && cp <= b.end) return b.lang; }
        }
        i += clen;
    }
    return hasNonLatin ? nonLatFall : latFall;
}

extern "C" JNIEXPORT jstring JNICALL Java_com_omni_tts_NativeEngine_processDirect(
    JNIEnv* env, jobject, jobject directBuffer, jint length, jobjectArray jKeys, jobjectArray jVals,
    jboolean keepEmoji, jboolean countEmoji, jboolean countPunct,
    jstring jLat, jstring jNonLat)
{
    if (directBuffer == nullptr || length <= 0) return env->NewStringUTF("");

    void* bufferAddr = env->GetDirectBufferAddress(directBuffer);
    if (bufferAddr == nullptr) return env->NewStringUTF("");

    std::string rawInput(static_cast<const char*>(bufferAddr), length);

    const char* latStr = env->GetStringUTFChars(jLat, nullptr); std::string latFall(latStr); env->ReleaseStringUTFChars(jLat, latStr);
    const char* nonLatStr = env->GetStringUTFChars(jNonLat, nullptr); std::string nonLatFall(nonLatStr); env->ReleaseStringUTFChars(jNonLat, nonLatStr);

    std::vector<std::string> keys, vals;
    int dictSize = env->GetArrayLength(jKeys);
    for (int i = 0; i < dictSize; i++) {
        jstring jk = (jstring) env->GetObjectArrayElement(jKeys, i);
        const char* kc = env->GetStringUTFChars(jk, nullptr); keys.push_back(std::string(kc)); env->ReleaseStringUTFChars(jk, kc);
        env->DeleteLocalRef(jk);
        jstring jv = (jstring) env->GetObjectArrayElement(jVals, i);
        const char* vc = env->GetStringUTFChars(jv, nullptr); vals.push_back(std::string(vc)); env->ReleaseStringUTFChars(jv, vc);
        env->DeleteLocalRef(jv);
    }

    std::vector<std::string> sentences;
    size_t start = 0;
    size_t end = rawInput.find('\0');
    while (end != std::string::npos) {
        sentences.push_back(rawInput.substr(start, end - start));
        start = end + 1;
        end = rawInput.find('\0', start);
    }
    if (start < rawInput.length()) {
        sentences.push_back(rawInput.substr(start));
    }

    std::string resultChunks;
    std::string currentLang = "";
    std::string batch = "";

    for (size_t i = 0; i < sentences.size(); i++) {
        std::string sentence = sentences[i];
        if (sentence.empty()) continue;

        sentence = applyDictionary(sentence, keys, vals);
        sentence = normalizeText(sentence, keepEmoji, countEmoji, countPunct);

        if (sentence.empty()) continue;

        std::string sLang = detectLang(sentence, latFall, nonLatFall);

        if (currentLang.empty()) currentLang = sLang;

        if (sLang != currentLang) {
            if (!batch.empty()) resultChunks += currentLang + "|" + batch + "||";
            batch = sentence; currentLang = sLang;
        } else {
            if (!batch.empty() && batch.back() != ' ' && batch.back() != '\n') batch += " ";
            batch += sentence;
        }
    }

    if (!batch.empty()) resultChunks += currentLang + "|" + batch;

    return env->NewStringUTF(resultChunks.c_str());
}
CPPEOF

        cat > app/src/main/java/com/omni/tts/NativeEngine.kt << 'NATIVEEOF'
