name: Build Omni Ultra Max Native
on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;25.1.8937393" "cmake;3.22.1" --sdk_root=$ANDROID_HOME

      - name: Clone CLD2 Native Library
        run: |
          mkdir -p app/src/main/cpp
          git clone --depth 1 https://github.com/CLD2Owners/cld2.git app/src/main/cpp/cld2_src

      - name: Write Generator Script
        run: |
          cat > generate_project.py << 'PYEOF'
          import os, base64, textwrap

          def w(path, content):
              d=os.path.dirname(path); d and os.makedirs(d, exist_ok=True)
              with open(path, 'w', encoding='utf-8') as f:
                  f.write(textwrap.dedent(content))

          def wb(path, content_b64):
              d=os.path.dirname(path); d and os.makedirs(d, exist_ok=True)
              with open(path, 'wb') as f:
                  f.write(base64.b64decode(content_b64))

          PYEOF
          python3 - << 'GENEOF'
          import os, textwrap

          def w(path, content):
              d=os.path.dirname(path); d and os.makedirs(d, exist_ok=True)
              with open(path, 'w', encoding='utf-8') as f:
                  f.write(content)

          # ── gradle.properties ────────────────────────────────────────────────
          w("gradle.properties", """android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx3096m -Dfile.encoding=UTF-8
          org.gradle.daemon=false
          """)

          # ── settings.gradle.kts ──────────────────────────────────────────────
          w("settings.gradle.kts", """pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "Omni"
          include(":app")
          """)

          # ── build.gradle.kts (root) ──────────────────────────────────────────
          w("build.gradle.kts", """plugins {
              id("com.android.application") version "8.2.2" apply false
              id("org.jetbrains.kotlin.android") version "1.9.22" apply false
          }
          """)

          # ── app/build.gradle.kts ─────────────────────────────────────────────
          w("app/build.gradle.kts", """plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
          }
          android {
              namespace = "com.omni.tts"
              compileSdk = 34
              ndkVersion = "25.1.8937393"
              defaultConfig {
                  applicationId = "com.omni.tts"
                  minSdk = 24
                  targetSdk = 34
                  versionCode = 1
                  versionName = "16.0"
                  externalNativeBuild {
                      cmake {
                          cppFlags += listOf("-std=c++17", "-Wno-narrowing", "-O3")
                          arguments += listOf("-DANDROID_STL=c++_shared")
                      }
                  }
                  ndk { abiFilters.addAll(listOf("armeabi-v7a", "arm64-v8a", "x86", "x86_64")) }
              }
              sourceSets { getByName("main") { java.srcDirs("src/main/java") } }
              buildFeatures { compose = true }
              composeOptions { kotlinCompilerExtensionVersion = "1.5.8" }
              externalNativeBuild { cmake { path = file("src/main/cpp/CMakeLists.txt"); version = "3.22.1" } }
              compileOptions { sourceCompatibility = JavaVersion.VERSION_17; targetCompatibility = JavaVersion.VERSION_17 }
              kotlinOptions { jvmTarget = "17" }
              packaging { resources { pickFirsts.add("**/libc++_shared.so") } }
          }
          dependencies {
              implementation("androidx.core:core-ktx:1.12.0")
              implementation("androidx.lifecycle:lifecycle-runtime-ktx:2.7.0")
              implementation("androidx.activity:activity-compose:1.8.2")
              val composeBom = platform("androidx.compose:compose-bom:2024.01.00")
              implementation(composeBom)
              implementation("androidx.compose.ui:ui")
              implementation("androidx.compose.ui:ui-graphics")
              implementation("androidx.compose.material3:material3")
              implementation("org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3")
          }
          """)

          # ── CMakeLists.txt ───────────────────────────────────────────────────
          w("app/src/main/cpp/CMakeLists.txt", """cmake_minimum_required(VERSION 3.18.1)
          project("omni_native")
          set(CLD2_DIR ${CMAKE_CURRENT_SOURCE_DIR}/cld2_src/internal)
          add_library(omni_core SHARED
              tts_engine_core.cpp
              ${CLD2_DIR}/cldutil.cc
              ${CLD2_DIR}/cldutil_shared.cc
              ${CLD2_DIR}/compact_lang_det.cc
              ${CLD2_DIR}/compact_lang_det_hint_code.cc
              ${CLD2_DIR}/compact_lang_det_impl.cc
              ${CLD2_DIR}/debug.cc
