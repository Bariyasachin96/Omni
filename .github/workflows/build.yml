package com.omni.tts

import android.content.Context
import android.content.SharedPreferences

/**
 * Keys:
 *   engine_<isoCode>           → TTS engine package for this language
 *   rate_<isoCode>_<pkg>       → speech rate (float, default 1.0)
 *   pitch_<isoCode>_<pkg>      → pitch (float, default 1.0)
 *   loc_<isoCode>_<pkg>        → voice locale tag (string)
 *   latin_fallback             → iso code for undetected Latin text
 *   nonlatin_fallback          → iso code for undetected non-Latin text
 */
class SharedPrefsManager(context: Context) {
    private val p: SharedPreferences =
        context.getSharedPreferences("OMNI_PREFS", Context.MODE_PRIVATE)

    fun getString(key: String, def: String = ""): String =
        p.getString(key, def) ?: def

    fun setString(key: String, value: String) =
        p.edit().putString(key, value).apply()

    fun getFloat(key: String, def: Float = 1f): Float = p.getFloat(key, def)
    fun setFloat(key: String, v: Float) = p.edit().putFloat(key, v).apply()

    fun getBoolean(key: String, def: Boolean = false): Boolean =
        p.getBoolean(key, def)
    fun setBoolean(key: String, v: Boolean) = p.edit().putBoolean(key, v).apply()

    fun engineForLang(iso: String): String =
        p.getString("engine_$iso", "NOT_SET") ?: "NOT_SET"

    fun setEngineForLang(iso: String, pkg: String) =
        p.edit().putString("engine_$iso", pkg).apply()

    fun rateKey(iso: String, pkg: String) = "rate_${iso}_$pkg"
    fun pitchKey(iso: String, pkg: String) = "pitch_${iso}_$pkg"
    fun locKey(iso: String, pkg: String) = "loc_${iso}_$pkg"
}
EOF

        # ── LanguageDetector.kt ───────────────────────────────────────────
        cat > app/src/main/kotlin/com/omni/tts/LanguageDetector.kt << 'EOF'
package com.omni.tts

import java.util.concurrent.ConcurrentHashMap

/**
 * Language detection chain:
 * 1. CLD2 64-char sliding window
 * 2. If result configured  → use it
 * 3. If result not configured → script check
 *      Latin  → latin_fallback pref
 *      NonLatin → nonlatin_fallback pref
 * 4. Codepoint → hardcoded block table
 * 5. Script pref fallback
 * 6. "en" last resort
 *
 * Block table hardcoded from Unicode Blocks 12.1 — no asset file.
 */
object LanguageDetector {

    // ── Block table ───────────────────────────────────────────────────────
    // [startCp, endCp, isoCode]
    private val BLOCKS: Array<IntArray> = arrayOf(
        intArrayOf(0x0530,0x058F, 0), // hy Armenian
        intArrayOf(0x0590,0x05FF, 1), // he Hebrew
        intArrayOf(0x0600,0x06FF, 2), // ar Arabic
        intArrayOf(0x0700,0x074F, 3), // ar Syriac
        intArrayOf(0x0750,0x077F, 2), // ar Arabic Supplement
        intArrayOf(0x08A0,0x08FF, 2), // ar Arabic Extended
        intArrayOf(0x0900,0x097F, 4), // hi Devanagari
        intArrayOf(0x0980,0x09FF, 5), // bn Bengali
        intArrayOf(0x0A00,0x0A7F, 6), // pa Gurmukhi
        intArrayOf(0x0A80,0x0AFF, 7), // gu Gujarati
        intArrayOf(0x0B00,0x0B7F, 8), // or Oriya
        intArrayOf(0x0B80,0x0BFF, 9), // ta Tamil
        intArrayOf(0x0C00,0x0C7F,10), // te Telugu
        intArrayOf(0x0C80,0x0CFF,11), // kn Kannada
        intArrayOf(0x0D00,0x0D7F,12), // ml Malayalam
        intArrayOf(0x0D80,0x0DFF,13), // si Sinhala
        intArrayOf(0x0E00,0x0E7F,14), // th Thai
        intArrayOf(0x0E80,0x0EFF,15), // lo Lao
        intArrayOf(0x0F00,0x0FFF,16), // bo Tibetan
        intArrayOf(0x1000,0x109F,17), // my Myanmar
        intArrayOf(0x10A0,0x10FF,18), // ka Georgian
        intArrayOf(0x1100,0x11FF,19), // ko Hangul Jamo
        intArrayOf(0x1200,0x137F,20), // am Ethiopic
        intArrayOf(0x1380,0x139F,20), // am Ethiopic Supplement
        intArrayOf(0x1780,0x17FF,21), // km Khmer
        intArrayOf(0x1800,0x18AF,22), // mn Mongolian
        intArrayOf(0x1B80,0x1BBF,23), // su Sundanese
        intArrayOf(0x1C90,0x1CBF,18), // ka Georgian Extended
        intArrayOf(0x1CC0,0x1CCF,23), // su Sundanese Supplement
        intArrayOf(0x1F00,0x1FFF,24), // el Greek Extended
        intArrayOf(0x2D00,0x2D2F,18), // ka Georgian Supplement
        intArrayOf(0x2D30,0x2D7F,25), // zgh Tifinagh/Berber
        intArrayOf(0x3040,0x309F,26), // ja Hiragana
        intArrayOf(0x30A0,0x30FF,26), // ja Katakana
        intArrayOf(0x3100,0x312F,27), // zh Bopomofo
        intArrayOf(0x3130,0x318F,19), // ko Hangul Compat
        intArrayOf(0x3190,0x319F,27), // zh Kanbun
        intArrayOf(0x31A0,0x31BF,27), // zh Bopomofo Extended
        intArrayOf(0x31F0,0x31FF,26), // ja Katakana Phonetic
        intArrayOf(0x3400,0x4DBF,27), // zh CJK Ext A
        intArrayOf(0x4E00,0x9FFF,27), // zh CJK Unified
        intArrayOf(0xA000,0xA48F,27), // zh Yi Syllables
        intArrayOf(0xA490,0xA4CF,27), // zh Yi Radicals
        intArrayOf(0xA8E0,0xA8FF, 4), // hi Devanagari Extended
        intArrayOf(0xA960,0xA97F,19), // ko Hangul Jamo Ext-A
        intArrayOf(0xA980,0xA9DF,28), // jv Javanese
        intArrayOf(0xA9E0,0xA9FF,17), // my Myanmar Ext-B
        intArrayOf(0xAA60,0xAA7F,17), // my Myanmar Ext-A
        intArrayOf(0xAB00,0xAB2F,20), // am Ethiopic Extended-A
        intArrayOf(0xAC00,0xD7AF,19), // ko Hangul Syllables
        intArrayOf(0xD7B0,0xD7FF,19), // ko Hangul Jamo Ext-B
        intArrayOf(0xFB50,0xFDFF, 2), // ar Arabic Presentation A
        intArrayOf(0xFE70,0xFEFF, 2), // ar Arabic Presentation B
        intArrayOf(0x11100,0x1114F, 5), // bn Chakma
        intArrayOf(0x11150,0x1117F, 4), // hi Mahajani
        intArrayOf(0x11300,0x1137F, 9), // ta Grantha
        intArrayOf(0x11600,0x1165F,29), // mr Modi
        intArrayOf(0x11FC0,0x11FFF, 9), // ta Tamil Supplement
        intArrayOf(0x1EE00,0x1EEFF, 2), // ar Arabic Math
        intArrayOf(0x20000,0x2A6DF,27), // zh CJK Ext B
        intArrayOf(0x2A700,0x2B73F,27), // zh CJK Ext C
        intArrayOf(0x2B740,0x2B81F,27), // zh CJK Ext D
        intArrayOf(0x2B820,0x2CEAF,27), // zh CJK Ext E
        intArrayOf(0x2CEB0,0x2EBEF,27)  // zh CJK Ext F
    )

    // Matches index in BLOCKS[n][2]
    private val BLOCK_ISO = arrayOf(
        "hy","he","ar","ar","hi","bn","pa","gu","or","ta","te","kn","ml","si",
        "th","lo","bo","my","ka","ko","am","km","mn","su","el","zgh","ja","zh",
        "jv","mr"
    )

    // ── Codepoint cache ───────────────────────────────────────────────────
    private val cpCache = ConcurrentHashMap<Int, String>()
    private const val CACHE_MAX = 5000

    // ── Latin check ───────────────────────────────────────────────────────
    fun isLatinText(text: String): Boolean {
        for (cp in text.codePoints()) {
            if (cp > 0x02AF && !(cp in 0x1E00..0x1EFF)) return false
        }
        return true
    }

    // ── Detection entry point ─────────────────────────────────────────────
    fun detect(text: String, prefs: SharedPrefsManager): String {
        val trimmed = if (text.length > 1500) text.substring(0, 1500) else text.trim()

        // Step 1+2: CLD2 + direct configured check
        val cld2 = detectWithCld2(trimmed)
        if (cld2 != null && cld2 != "un") {
            if (isConfigured(cld2, prefs)) return cld2
            // Step 3: script pref
            val sp = scriptPref(trimmed, prefs)
            if (sp != null) return sp
        }

        // Step 4: block lookup
        val cp = firstSignificantCp(trimmed)
        if (cp > 0x2AF) {
            val cached = cpCache[cp]
            if (cached != null && isConfigured(cached, prefs)) return cached
            val blockIso = blockLookup(cp)
            if (blockIso != null) {
                if (cpCache.size < CACHE_MAX) cpCache[cp] = blockIso
                if (isConfigured(blockIso, prefs)) return blockIso
                val sp = scriptPref(trimmed, prefs)
                if (sp != null) return sp
            }
        }

        // Step 5: script pref (pure ASCII or block miss)
        val sp = scriptPref(trimmed, prefs)
        if (sp != null) return sp

        // Step 6: en last resort
        return prefs.engineForLang("en").let { if (it != "NOT_SET") "en" else "NOT_SET" }
    }

    /** Detect without config check — used for chunking */
    fun detectRaw(text: String): String {
        val trimmed = if (text.length > 1500) text.substring(0, 1500) else text.trim()
        val cld2 = detectWithCld2(trimmed)
        if (cld2 != null && cld2 != "un") return cld2
        val cp = firstSignificantCp(trimmed)
        if (cp > 0x2AF) {
            val b = blockLookup(cp)
            if (b != null) return b
        }
        return "en"
    }

    // ── Privates ──────────────────────────────────────────────────────────

    private fun detectWithCld2(text: String): String? {
        var i = 0
        while (i < text.length) {
            val chunk = text.substring(i, minOf(i + 64, text.length))
            val r = try { NativeEngine.detectLang(chunk) } catch (_: Exception) { null }
            if (r != null && r != "un" && r.length >= 2) return r
            i += 64
        }
        val r = try { NativeEngine.detectLang(text) } catch (_: Exception) { null }
        if (r != null && r != "un" && r.length >= 2) return r
        return null
    }

    private fun scriptPref(text: String, prefs: SharedPrefsManager): String? {
        val key = if (isLatinText(text)) "latin_fallback" else "nonlatin_fallback"
        val iso = prefs.getString(key)
        return if (iso.isNotEmpty() && isConfigured(iso, prefs)) iso else null
    }

    private fun isConfigured(iso: String, prefs: SharedPrefsManager): Boolean =
        prefs.engineForLang(iso) != "NOT_SET"

    private fun blockLookup(cp: Int): String? {
        for (e in BLOCKS) if (cp in e[0]..e[1]) return BLOCK_ISO[e[2]]
        return null
    }

    private fun firstSignificantCp(text: String): Int {
        for (cp in text.codePoints()) {
            if (!Character.isWhitespace(cp) && !Character.isDigit(cp)
                && !(cp in 0x21..0x2F) && !(cp in 0x3A..0x40)
                && !(cp in 0x5B..0x60) && !(cp in 0x7B..0x7E))
                return cp
        }
        return -1
    }
}
EOF

        # ── TextSplitter.kt ───────────────────────────────────────────────
        cat > app/src/main/kotlin/com/omni/tts/TextSplitter.kt << 'EOF'
package com.omni.tts

import java.text.BreakIterator

data class Chunk(val text: String, val iso: String)

/**
 * Splits text into same-language sentence chunks.
 * Merges consecutive chunks of the same ISO code up to 500 chars.
 */
object TextSplitter {

    fun split(text: String, prefs: SharedPrefsManager): List<Chunk> {
        if (text.isBlank()) return emptyList()

        val bi = BreakIterator.getSentenceInstance()
        bi.setText(text)

        val raw = mutableListOf<Chunk>()
        var start = bi.first()
        var end = bi.next()
        while (end != BreakIterator.DONE) {
            val seg = text.substring(start, end)
            if (seg.isNotBlank()) {
                val iso = LanguageDetector.detect(seg, prefs)
                raw.add(Chunk(seg, iso))
            }
            start = end
            end = bi.next()
        }

        // Merge same-language consecutive chunks up to 500 chars
        if (raw.isEmpty()) return emptyList()
        val merged = mutableListOf<Chunk>()
        var cur = raw[0]
        for (i in 1 until raw.size) {
            val next = raw[i]
            if (next.iso == cur.iso && cur.text.length + next.text.length <= 500) {
                cur = Chunk(cur.text + next.text, cur.iso)
            } else {
                merged.add(cur)
                cur = next
            }
        }
        merged.add(cur)
        return merged
    }
}
EOF

        # ── WavUtils.kt ───────────────────────────────────────────────────
        cat > app/src/main/kotlin/com/omni/tts/WavUtils.kt << 'EOF'
package com.omni.tts

import java.io.EOFException
import java.io.InputStream

object WavUtils {
    data class WavInfo(
        val sampleRate: Int = 16000,
        val channels: Int = 1,
        val bitsPerSample: Int = 16,
        val dataOffset: Int = 44
    )

    fun parse(input: InputStream): WavInfo {
        readFully(input, ByteArray(4))  // RIFF
        readInt(input)                  // fileSize
        readFully(input, ByteArray(4))  // WAVE
        var offset = 12
        var sampleRate = 16000
        var channels = 1
        var bitsPerSample = 16

        while (true) {
            val id = ByteArray(4).also { readFully(input, it) }
            val size = readIntLE(input)
            offset += 8
            when (String(id)) {
                "fmt " -> {
                    readShortLE(input)                       // audioFormat
                    channels = readShortLE(input).toInt()
                    sampleRate = readIntLE(input)
                    readIntLE(input)                         // byteRate
                    readShortLE(input)                       // blockAlign
                    bitsPerSample = readShortLE(input).toInt()
                    val rem = size - 16
                    if (rem > 0) skipFully(input, rem)
                    offset += size
                }
                "data" -> return WavInfo(sampleRate, channels, bitsPerSample, offset)
                else -> { skipFully(input, size); offset += size }
            }
        }
    }

    private fun readFully(i: InputStream, b: ByteArray) {
        var n = 0
        while (n < b.size) {
            val c = i.read(b, n, b.size - n)
            if (c < 0) throw EOFException()
            n += c
        }
    }

    private fun readIntLE(i: InputStream): Int {
        val b = ByteArray(4).also { readFully(i, it) }
        return (b[0].toInt() and 0xFF) or
               ((b[1].toInt() and 0xFF) shl 8) or
               ((b[2].toInt() and 0xFF) shl 16) or
               ((b[3].toInt() and 0xFF) shl 24)
    }

    private fun readShortLE(i: InputStream): Short {
        val b = ByteArray(2).also { readFully(i, it) }
        return ((b[0].toInt() and 0xFF) or ((b[1].toInt() and 0xFF) shl 8)).toShort()
    }

    private fun skipFully(i: InputStream, n: Int) {
        var t = 0
        while (t < n) {
            var s = i.skip((n - t).toLong())
            if (s == 0L) { if (i.read() < 0) throw EOFException(); s = 1 }
            t += s.toInt()
        }
    }
}
