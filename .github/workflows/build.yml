        cat > app/src/main/java/com/omni/tts/EngineFinder.kt << 'EOF'
        package com.omni.tts
        import android.content.Context
        import android.content.Intent
        import android.speech.tts.TextToSpeech
        object EngineFinder {
            data class TTSInfo(val pkg: String, val name: String)
            fun getEngines(context: Context): List<TTSInfo> {
                val pm = context.packageManager
                val list = pm.queryIntentServices(Intent(TextToSpeech.Engine.INTENT_ACTION_TTS_SERVICE), 0).map { TTSInfo(it.serviceInfo.packageName, it.serviceInfo.applicationInfo.loadLabel(pm).toString()) }
                return if (list.isEmpty()) listOf(TTSInfo("com.google.android.tts", "Google TTS")) else list
            }
        }
        EOF
        cat > app/src/main/java/com/omni/tts/WavUtils.kt << 'EOF'
        package com.omni.tts
        import java.io.EOFException
        import java.io.InputStream
        object WavUtils {
            class WavInfo { var sampleRate=16000; var channels:Short=1; var bitsPerSample:Short=16; var dataOffset=0 }
            fun parse(dis: InputStream): WavInfo {
                val info = WavInfo()
                readFully(dis, ByteArray(4)); readInt(dis); readFully(dis, ByteArray(4)); var offset = 12
                while (true) {
                    val chunkId = ByteArray(4); readFully(dis, chunkId)
                    val chunkSize = Integer.reverseBytes(readInt(dis)); offset += 8
                    val id = String(chunkId)
                    if (id == "fmt ") {
                        readShort(dis); info.channels = java.lang.Short.reverseBytes(readShort(dis))
                        info.sampleRate = Integer.reverseBytes(readInt(dis)); readInt(dis); readShort(dis)
                        info.bitsPerSample = java.lang.Short.reverseBytes(readShort(dis))
                        val rem = chunkSize - 16; if (rem > 0) skipFully(dis, rem); offset += chunkSize
                    } else if (id == "data") { info.dataOffset = offset; break } else { skipFully(dis, chunkSize); offset += chunkSize }
                }
                return info
            }
            private fun readFully(i: InputStream, b: ByteArray) { var n=0; while(n<b.size){ val c=i.read(b,n,b.size-n); if(c<0)throw EOFException(); n+=c } }
            private fun readInt(i: InputStream): Int { val c1=i.read();val c2=i.read();val c3=i.read();val c4=i.read(); if((c1 or c2 or c3 or c4)<0)throw EOFException(); return (c1 shl 24)+(c2 shl 16)+(c3 shl 8)+c4 }
            private fun readShort(i: InputStream): Short { val c1=i.read();val c2=i.read(); if((c1 or c2)<0)throw EOFException(); return ((c1 shl 8)+c2).toShort() }
            private fun skipFully(i: InputStream, n: Int) { var t=0; while(t<n){ var s=i.skip((n-t).toLong()); if(s==0L){if(i.read()<0)throw EOFException();s=1}; t+=s.toInt() } }
        }
        EOF
        cat > app/src/main/java/com/omni/tts/VhLogger.kt << 'EOF'
        package com.omni.tts
        import android.content.Context
        import android.util.Log
        import java.io.BufferedWriter
        import java.io.File
        import java.io.FileWriter
        import java.io.IOException
        import java.text.SimpleDateFormat
        import java.util.Date
        import java.util.LinkedList
        import java.util.Locale
        import java.util.concurrent.atomic.AtomicLong
        object VhLogger {
            private const val TAG = "OMNI-TTS"
            private const val MAX_LINES = 5000
            private val buffer = LinkedList<String>()
            private val sdf = SimpleDateFormat("MM-dd HH:mm:ss.SSS", Locale.US)
            private var appContext: Context? = null
            private val lastSynthStart = AtomicLong(0)
            private val lastFirstAudio = AtomicLong(0)
            fun init(ctx: Context) { appContext = ctx.applicationContext }
            @Synchronized private fun write(level: String, msg: String) {
                val line = "${sdf.format(Date())} $level/$TAG: $msg"
                Log.d(TAG, msg); buffer.addLast(line); if (buffer.size > MAX_LINES) buffer.removeFirst()
            }
            fun d(msg: String) = write("D", msg)
            fun w(msg: String) = write("W", msg)
            fun e(msg: String) = write("E", msg)
            fun i(msg: String) = write("I", msg)
            fun markSynthStart(chunkText: String, lang: String, chunkIndex: Int): Long {
                val t = System.currentTimeMillis(); lastSynthStart.set(t); lastFirstAudio.set(0)
                write("D", "[CHUNK-$chunkIndex] lang=$lang len=${chunkText.length} text=${chunkText.substring(0, Math.min(50, chunkText.length))}")
                write("D", "[CHUNK-$chunkIndex] synthesizeToFile START")
                return t
            }
            fun markSynthEnd(chunkIndex: Int, startTime: Long) { write("D", "[CHUNK-$chunkIndex] synthesizeToFile DONE in ${System.currentTimeMillis() - startTime}ms") }
            fun markHeaderFound(chunkIndex: Int) {
                val t = System.currentTimeMillis(); val synthStart = lastSynthStart.get()
                val ms = if (synthStart > 0) t - synthStart else -1L
                write("D", "[CHUNK-$chunkIndex] WAV header found, time-to-header=${ms}ms")
            }
            fun markFirstAudio(chunkIndex: Int) {
                val t = System.currentTimeMillis(); val synthStart = lastSynthStart.get()
                if (lastFirstAudio.compareAndSet(0, t)) {
                    val ms = if (synthStart > 0) t - synthStart else -1L
                    write("D", "[CHUNK-$chunkIndex] FIRST AUDIO BYTE sent, latency=${ms}ms")
                }
            }
            fun markChunkDone(chunkIndex: Int, startTime: Long, totalBytes: Long) { write("D", "[CHUNK-$chunkIndex] DONE totalBytes=$totalBytes totalTime=${System.currentTimeMillis() - startTime}ms") }
            fun markSynthError(chunkIndex: Int, reason: String) { write("E", "[CHUNK-$chunkIndex] SYNTH ERROR: $reason") }
            fun markEngineInit(lang: String, pkg: String, ms: Long) { write("D", "[ENGINE] init lang=$lang pkg=$pkg time=${ms}ms") }
            fun markEngineReused(lang: String) { write("D", "[ENGINE] reused lang=$lang") }
            fun markRequest(text: String, totalChunks: Int) { write("D", "[REQUEST] length=${text.length} chunks=$totalChunks text=${text.substring(0, Math.min(80, text.length))}") }
            fun markStop() { write("D", "[STOP] onStop called — interrupting current synthesis") }
            fun markFallback(detectedLang: String, fallbackLang: String) { write("W", "[FALLBACK] detected=$detectedLang -> using=$fallbackLang") }
            fun markSkipped(reason: String) { write("W", "[SKIPPED] $reason") }
            @Synchronized @Throws(IOException::class) fun exportToFile(): File {
                val ctx = appContext ?: throw IOException("VhLogger not initialized")
                val f = File(ctx.cacheDir, "omni_tts_debug.txt")
                val bw = BufferedWriter(FileWriter(f, false))
                bw.write("=== Omni Full Debug Log ===\nTime: ${Date()}\nDevice: ${android.os.Build.MODEL}\nAndroid: ${android.os.Build.VERSION.RELEASE}\nEntries: ${buffer.size}\n============================\n\n")
                buffer.forEach { bw.write(it); bw.newLine() }; bw.close(); return f
            }
            @Synchronized fun clear() { buffer.clear() }
        }
        EOF
    - name: Generate Project Files Part 2
