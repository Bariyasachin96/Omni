package com.omni.tts

import android.content.Context
import android.media.AudioFormat
import android.os.Bundle
import android.os.Process
import android.speech.tts.SynthesisCallback
import android.speech.tts.TextToSpeech
import android.speech.tts.UtteranceProgressListener
import java.io.File
import java.io.FileInputStream
import java.util.concurrent.CountDownLatch
import java.util.concurrent.TimeUnit
import java.util.concurrent.atomic.AtomicBoolean

object LiveStreamProcessor {

    fun process(
        context: Context,
        tts: TextToSpeech,
        text: String,
        callback: SynthesisCallback,
        cbStarted: BooleanArray,
        isStopped: AtomicBoolean,
        chunkIndex: Int = 0
    ): Boolean {
        Process.setThreadPriority(Process.THREAD_PRIORITY_URGENT_AUDIO)
        val tmp = File(context.cacheDir, "omni_${System.nanoTime()}.wav")
        var pipe: FileInputStream? = null

        try {
            val latch = CountDownLatch(1)
            var synthError = false

            tts.setOnUtteranceProgressListener(object : UtteranceProgressListener() {
                override fun onStart(id: String) {}
                override fun onDone(id: String) { latch.countDown() }
                override fun onError(id: String) { synthError = true; latch.countDown() }
                override fun onError(id: String, errorCode: Int) { synthError = true; latch.countDown() }
            })

            val params = Bundle()
            if (tts.synthesizeToFile(text, params, tmp, "omni_$chunkIndex") != TextToSpeech.SUCCESS) {
                return isStopped.get()
            }

            // Wait max 10s for synthesis
            latch.await(10, TimeUnit.SECONDS)
            if (synthError) return isStopped.get()

            var headerParsed = false
            var bytesRead = 0L

            while (!isStopped.get() && (latch.count > 0 || tmp.length() > bytesRead)) {
                if (isStopped.get()) { tts.stop(); break }

                if (!headerParsed && tmp.exists() && tmp.length() >= 44) {
                    try {
                        pipe = FileInputStream(tmp)
                        val info = WavUtils.parse(pipe)
                        bytesRead = info.dataOffset.toLong()
                        pipe.channel.position(bytesRead)
                        if (!cbStarted[0]) {
                            val enc = if (info.bitsPerSample == 8)
                                AudioFormat.ENCODING_PCM_8BIT
                            else AudioFormat.ENCODING_PCM_16BIT
                            callback.start(info.sampleRate, enc, info.channels)
                            cbStarted[0] = true
                        }
                        headerParsed = true
                    } catch (_: Exception) {
                        pipe?.close(); pipe = null
                        Thread.sleep(1); continue
                    }
                }

                if (headerParsed) {
                    val avail = tmp.length() - bytesRead
                    if (avail > 0 && pipe != null) {
                        val buf = ByteArray(minOf(4096L, avail).toInt())
                        val r = pipe.read(buf)
                        if (r > 0) { callback.audioAvailable(buf, 0, r); bytesRead += r }
                        else Thread.sleep(1)
                    } else {
                        Thread.sleep(1)
                    }
                } else {
                    Thread.sleep(1)
                }
            }
        } finally {
            pipe?.close()
            if (tmp.exists()) tmp.delete()
        }
        return isStopped.get()
    }
}
