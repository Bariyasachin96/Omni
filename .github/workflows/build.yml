        cat > app/src/main/cpp/tts_engine_core.cpp << 'EOF'
#include <jni.h>
#include <string>
#include <cstring>
#include <stdint.h>
#include "compact_lang_det.h"

// Fast Unicode block detection — ~50ns
static uint32_t firstCp(const unsigned char* s, int len) {
    if (len == 0) return 0;
    unsigned char b = s[0];
    if (b < 0x80) return b;
    if (b < 0xE0 && len >= 2) return ((b&0x1F)<<6)|(s[1]&0x3F);
    if (b < 0xF0 && len >= 3) return ((b&0x0F)<<12)|((s[1]&0x3F)<<6)|(s[2]&0x3F);
    if (len >= 4) return ((b&0x07)<<18)|((s[1]&0x3F)<<12)|((s[2]&0x3F)<<6)|(s[3]&0x3F);
    return 0;
}

static const char* fastScript(const char* utf8, int bytes) {
    const unsigned char* s = (const unsigned char*)utf8;
    int i = 0;
    while (i < bytes && s[i] < 0x80) i++;
    if (i >= bytes) return "en";
    uint32_t cp = firstCp(s+i, bytes-i);
    if (cp >= 0x0900 && cp <= 0x097F) return "hi";
    if (cp >= 0x0980 && cp <= 0x09FF) return "bn";
    if (cp >= 0x0A00 && cp <= 0x0A7F) return "pa";
    if (cp >= 0x0A80 && cp <= 0x0AFF) return "gu";
    if (cp >= 0x0B00 && cp <= 0x0B7F) return "or";
    if (cp >= 0x0B80 && cp <= 0x0BFF) return "ta";
    if (cp >= 0x0C00 && cp <= 0x0C7F) return "te";
    if (cp >= 0x0C80 && cp <= 0x0CFF) return "kn";
    if (cp >= 0x0D00 && cp <= 0x0D7F) return "ml";
    if (cp >= 0x0D80 && cp <= 0x0DFF) return "si";
    if (cp >= 0x0E00 && cp <= 0x0E7F) return "th";
    if (cp >= 0x0E80 && cp <= 0x0EFF) return "lo";
    if (cp >= 0x0F00 && cp <= 0x0FFF) return "bo";
    if (cp >= 0x1000 && cp <= 0x109F) return "my";
    if (cp >= 0x10A0 && cp <= 0x10FF) return "ka";
    if ((cp >= 0x1100 && cp <= 0x11FF)||(cp >= 0xAC00 && cp <= 0xD7AF)) return "ko";
    if (cp >= 0x1200 && cp <= 0x137F) return "am";
    if (cp >= 0x0600 && cp <= 0x06FF) return "ar";
    if (cp >= 0x0590 && cp <= 0x05FF) return "he";
    if (cp >= 0x0400 && cp <= 0x04FF) return "ru";
    if (cp >= 0x0370 && cp <= 0x03FF) return "el";
    if (cp >= 0x0530 && cp <= 0x058F) return "hy";
    if (cp >= 0x1780 && cp <= 0x17FF) return "km";
    if (cp >= 0x1800 && cp <= 0x18AF) return "mn";
    if ((cp >= 0x4E00 && cp <= 0x9FFF)||(cp >= 0x3400 && cp <= 0x4DBF)) return "zh";
    if (cp >= 0x3040 && cp <= 0x30FF) return "ja";
    return nullptr; // unknown
}

static std::string cld2Detect(const char* utf8, int bytes) {
    bool reliable = false;
    CLD2::Language lang = CLD2::DetectLanguage(utf8, bytes, true, &reliable);
    const char* code = CLD2::LanguageCode(lang);
    if (!code || strlen(code)==0 || strcmp(code,"un")==0) return "un";
    return std::string(code);
}

extern "C" JNIEXPORT jstring JNICALL
Java_com_omni_tts_NativeEngine_detectLang(JNIEnv* env, jobject, jstring jText) {
    if (!jText) return env->NewStringUTF("un");
    const char* utf8 = env->GetStringUTFChars(jText, nullptr);
    if (!utf8) return env->NewStringUTF("un");
    int bytes = (int)strlen(utf8);
    if (bytes == 0) { env->ReleaseStringUTFChars(jText, utf8); return env->NewStringUTF("un"); }
    // Step1: fast script
    const char* fast = fastScript(utf8, bytes);
    if (fast != nullptr) {
        env->ReleaseStringUTFChars(jText, utf8);
        return env->NewStringUTF(fast);
    }
    // Step2: CLD2
    std::string result = cld2Detect(utf8, bytes);
    env->ReleaseStringUTFChars(jText, utf8);
    return env->NewStringUTF(result.c_str());
}
