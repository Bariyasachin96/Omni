        package com.omni.tts
        import java.text.BreakIterator
        object SmartTextSplitter {
            fun split(text: String, fallbackLang: String, prefs: SharedPrefsManager): List<LanguageDetector.Chunk> {
                val chunks = mutableListOf<LanguageDetector.Chunk>()
                if (text.trim().isEmpty()) return chunks
                val iterator = BreakIterator.getSentenceInstance()
                iterator.setText(text)
                var currentBatch = StringBuilder()
                var currentLang: String? = null
                var start = iterator.first()
                var end = iterator.next()
                while (end != BreakIterator.DONE) {
                    val sentence = text.substring(start, end).trim()
                    if (sentence.isNotEmpty()) {
                        val sentenceLang = LanguageDetector.detect(sentence, fallbackLang, prefs)
                        if (currentLang == null) currentLang = sentenceLang
                        if (sentenceLang != currentLang) {
                            if (currentBatch.isNotEmpty()) chunks.add(LanguageDetector.Chunk(currentBatch.toString().trim(), currentLang))
                            currentBatch = StringBuilder(sentence); currentLang = sentenceLang
                        } else {
                            if (currentBatch.isNotEmpty()) currentBatch.append(" ")
                            currentBatch.append(sentence)
                        }
                    }
                    start = end; end = iterator.next()
                }
                if (currentBatch.isNotEmpty()) chunks.add(LanguageDetector.Chunk(currentBatch.toString().trim(), currentLang ?: fallbackLang))
                return chunks
            }
        }
