        cat > app/src/main/java/com/omni/tts/MainActivity.kt << 'EOF'
        package com.omni.tts
        import android.content.Intent
        import android.os.Bundle
        import android.speech.tts.TextToSpeech
        import androidx.activity.ComponentActivity
        import androidx.activity.compose.setContent
        import androidx.compose.foundation.layout.*
        import androidx.compose.foundation.rememberScrollState
        import androidx.compose.foundation.verticalScroll
        import androidx.compose.material3.*
        import androidx.compose.runtime.*
        import androidx.compose.ui.Modifier
        import androidx.compose.ui.platform.LocalContext
        import androidx.compose.ui.unit.dp
        import java.util.Locale
        class MainActivity : ComponentActivity() {
            private var tempTts: TextToSpeech? = null
            @OptIn(ExperimentalMaterial3Api::class)
            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)
                val prefs = SharedPrefsManager(this)
                setContent {
                    MaterialTheme {
                        Surface(modifier = Modifier.fillMaxSize()) {
                            val context = LocalContext.current
                            val engines = EngineFinder.getEngines(context).toMutableList()
                            engines.add(0, EngineFinder.TTSInfo("NOT_SET", "--- Not Set ---"))
                            val languagesList = LanguageDetector.getAllLanguages()
                            var expLang by remember { mutableStateOf(false) }
                            var selLang by remember { mutableStateOf(prefs.getString("pref_lang", "English")) }
                            var expEng by remember { mutableStateOf(false) }
                            var selEngPkg by remember { mutableStateOf(prefs.getEngineForLanguage(selLang)) }
                            val selEngName = engines.find { it.pkg == selEngPkg }?.name ?: "Not Set"
                            val key = "${selLang}_${selEngPkg}"
                            var rate by remember { mutableIntStateOf(prefs.getInt("rate_$key", 100)) }
                            var pitch by remember { mutableIntStateOf(prefs.getInt("pitch_$key", 100)) }
                            var vol by remember { mutableIntStateOf(prefs.getInt("vol_$key", 100)) }
                            var availableLocales by remember { mutableStateOf(listOf<Locale>()) }
                            var expLoc by remember { mutableStateOf(false) }
                            var selLocTag by remember { mutableStateOf(prefs.getLocaleForLangPkg(selLang, selEngPkg)) }
                            LaunchedEffect(selEngPkg, selLang) {
                                if(selEngPkg != "NOT_SET") {
                                    tempTts?.shutdown()
                                    tempTts = TextToSpeech(context, { status ->
                                        if(status == TextToSpeech.SUCCESS) {
                                            val targetIso = LanguageDetector.getLocale(selLang).language
                                            val voices = try { tempTts?.voices?.map { it.locale }?.filter { it.language.equals(targetIso, true) } } catch(e:Exception){ null }
                                            availableLocales = voices?.distinctBy { it.toLanguageTag() }?.sortedBy { it.displayName } ?: listOf()
                                        }
                                    }, selEngPkg)
                                } else availableLocales = listOf()
                            }
                            Column(modifier = Modifier.padding(16.dp).verticalScroll(rememberScrollState())) {
                                Text("Omni Setup", style = MaterialTheme.typography.headlineMedium)
                                Spacer(modifier = Modifier.height(24.dp))
                                ExposedDropdownMenuBox(expanded = expLang, onExpandedChange = { expLang = !expLang }) {
                                    OutlinedTextField(value = selLang, onValueChange = {}, readOnly = true, label = { Text("Select Language") }, trailingIcon = { ExposedDropdownMenuDefaults.TrailingIcon(expanded = expLang) }, modifier = Modifier.fillMaxWidth().menuAnchor())
                                    ExposedDropdownMenu(expanded = expLang, onDismissRequest = { expLang = false }) {
                                        languagesList.forEach { lang ->
                                            DropdownMenuItem(text = { Text(lang) }, onClick = {
                                                selLang = lang; prefs.setString("pref_lang", lang)
                                                selEngPkg = prefs.getEngineForLanguage(lang)
                                                val nKey = "${lang}_${selEngPkg}"
                                                rate = prefs.getInt("rate_$nKey", 100); pitch = prefs.getInt("pitch_$nKey", 100); vol = prefs.getInt("vol_$nKey", 100)
                                                selLocTag = prefs.getLocaleForLangPkg(lang, selEngPkg); expLang = false
                                            })
                                        }
                                    }
                                }
                                Spacer(modifier = Modifier.height(16.dp))
                                ExposedDropdownMenuBox(expanded = expEng, onExpandedChange = { expEng = !expEng }) {
                                    OutlinedTextField(value = selEngName, onValueChange = {}, readOnly = true, label = { Text("Select TTS Engine") }, trailingIcon = { ExposedDropdownMenuDefaults.TrailingIcon(expanded = expEng) }, modifier = Modifier.fillMaxWidth().menuAnchor())
                                    ExposedDropdownMenu(expanded = expEng, onDismissRequest = { expEng = false }) {
                                        engines.forEach { e ->
                                            DropdownMenuItem(text = { Text(e.name) }, onClick = {
                                                selEngPkg = e.pkg; prefs.setString("engine_$selLang", e.pkg)
                                                val eKey = "${selLang}_${e.pkg}"
                                                rate = prefs.getInt("rate_$eKey", 100); pitch = prefs.getInt("pitch_$eKey", 100); vol = prefs.getInt("vol_$eKey", 100)
                                                selLocTag = prefs.getLocaleForLangPkg(selLang, e.pkg); expEng = false
                                            })
                                        }
                                    }
                                }
                                Spacer(modifier = Modifier.height(16.dp))
                                ExposedDropdownMenuBox(expanded = expLoc, onExpandedChange = { expLoc = !expLoc }) {
                                    val locName = availableLocales.find { it.toLanguageTag() == selLocTag }?.displayName ?: "Default System Voice"
                                    OutlinedTextField(value = locName, onValueChange = {}, readOnly = true, label = { Text("Voice / Locale") }, trailingIcon = { ExposedDropdownMenuDefaults.TrailingIcon(expanded = expLoc) }, modifier = Modifier.fillMaxWidth().menuAnchor())
                                    ExposedDropdownMenu(expanded = expLoc, onDismissRequest = { expLoc = false }) {
                                        availableLocales.forEach { loc -> DropdownMenuItem(text = { Text(loc.displayName) }, onClick = { selLocTag = loc.toLanguageTag(); prefs.setLocaleForLangPkg(selLang, selEngPkg, selLocTag); expLoc = false }) }
                                    }
                                }
                                Spacer(modifier = Modifier.height(24.dp))
                                Text("Speech Rate: ${if(rate==100) "System Default" else String.format("%.2fx", rate/100f)}")
                                Slider(value = rate.toFloat(), onValueChange = { rate = it.toInt(); prefs.setInt("rate_$key", rate) }, valueRange = 10f..500f)
                                Spacer(modifier = Modifier.height(16.dp))
                                Text("Pitch: ${if(pitch==100) "System Default" else String.format("%.2fx", pitch/100f)}")
                                Slider(value = pitch.toFloat(), onValueChange = { pitch = it.toInt(); prefs.setInt("pitch_$key", pitch) }, valueRange = 10f..500f)
                                Spacer(modifier = Modifier.height(16.dp))
                                Text("Volume: ${if(vol==100) "System Default" else "$vol%"}")
                                Slider(value = vol.toFloat(), onValueChange = { vol = it.toInt(); prefs.setInt("vol_$key", vol) }, valueRange = 10f..100f)
                                Spacer(modifier = Modifier.height(32.dp))
                                Button(onClick = {
                                    tempTts?.setSpeechRate(rate/100f); tempTts?.setPitch(pitch/100f)
                                    if(selLocTag.isNotEmpty()) try { tempTts?.language = Locale.forLanguageTag(selLocTag) } catch(e:Exception){}
                                    val params = Bundle(); params.putFloat(TextToSpeech.Engine.KEY_PARAM_VOLUME, vol/100f)
                                    tempTts?.speak("Testing Omni audio setup", TextToSpeech.QUEUE_FLUSH, params, "test")
                                }, modifier = Modifier.fillMaxWidth()) { Text("TEST AUDIO") }
                                Spacer(modifier = Modifier.height(12.dp))
                                Button(onClick = { startActivity(Intent(context, AdvancedSettingsActivity::class.java)) }, modifier = Modifier.fillMaxWidth()) { Text("ADVANCED SETTINGS") }
                                Spacer(modifier = Modifier.height(12.dp))
                                Button(onClick = { startActivity(Intent("com.android.settings.TTS_SETTINGS")) }, modifier = Modifier.fillMaxWidth()) { Text("OPEN SYSTEM TTS SETTINGS") }
                            }
                        }
                    }
                }
            }
            override fun onDestroy() { tempTts?.shutdown(); super.onDestroy() }
        }
        EOF
