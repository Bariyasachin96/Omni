                                Row(verticalAlignment = Alignment.CenterVertically) { Checkbox(checked = punctCount, onCheckedChange = { punctCount = it; prefs.setBoolean("punct_count", it) }); Text("Repeated Punctuation Count") }
                                Row(verticalAlignment = Alignment.CenterVertically) { Checkbox(checked = dictEnabled, onCheckedChange = { dictEnabled = it; prefs.setBoolean("dict_enabled", it) }); Text("Enable Dictionary") }
                                Spacer(modifier = Modifier.height(16.dp))
                                ExposedDropdownMenuBox(expanded = expLat, onExpandedChange = { expLat = !expLat }) {
                                    OutlinedTextField(value = latLang, onValueChange = {}, readOnly = true, label = { Text("Default Latin Lang Code") }, trailingIcon = { ExposedDropdownMenuDefaults.TrailingIcon(expanded = expLat) }, modifier = Modifier.fillMaxWidth().menuAnchor())
                                    ExposedDropdownMenu(expanded = expLat, onDismissRequest = { expLat = false }) {
                                        langs.forEach { l -> DropdownMenuItem(text = { Text(l) }, onClick = { latLang = l; prefs.setString("mixed_mode_latin_language", l); expLat = false }) }
                                    }
                                }
                                Spacer(modifier = Modifier.height(16.dp))
                                ExposedDropdownMenuBox(expanded = expNonLat, onExpandedChange = { expNonLat = !expNonLat }) {
                                    OutlinedTextField(value = nonLatLang, onValueChange = {}, readOnly = true, label = { Text("Default Non-Latin Lang Code") }, trailingIcon = { ExposedDropdownMenuDefaults.TrailingIcon(expanded = expNonLat) }, modifier = Modifier.fillMaxWidth().menuAnchor())
                                    ExposedDropdownMenu(expanded = expNonLat, onDismissRequest = { expNonLat = false }) {
                                        langs.forEach { l -> DropdownMenuItem(text = { Text(l) }, onClick = { nonLatLang = l; prefs.setString("mixed_mode_non_latin_language", l); expNonLat = false }) }
                                    }
                                }
                                Spacer(modifier = Modifier.height(32.dp))
                                Button(onClick = { startActivity(Intent(context, DictionaryActivity::class.java)) }, modifier = Modifier.fillMaxWidth()) { Text("MANAGE DICTIONARY") }
                            }
                        }
                    }
                }
            }
        }
        EOF
        cat > app/src/main/kotlin/com/omni/tts/DictionaryActivity.kt << 'EOF'
        package com.omni.tts
        import android.os.Bundle
        import androidx.activity.ComponentActivity
        import androidx.activity.compose.setContent
        import androidx.compose.foundation.clickable
        import androidx.compose.foundation.layout.*
        import androidx.compose.foundation.lazy.LazyColumn
        import androidx.compose.foundation.lazy.items
        import androidx.compose.material3.*
        import androidx.compose.runtime.*
        import androidx.compose.ui.Modifier
        import androidx.compose.ui.unit.dp
        class DictionaryActivity : ComponentActivity() {
            @OptIn(ExperimentalMaterial3Api::class)
            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)
                val prefs = SharedPrefsManager(this)
                setContent {
                    MaterialTheme {
                        Surface(modifier = Modifier.fillMaxSize()) {
                            var dict by remember { mutableStateOf(prefs.getDict()) }
                            var from by remember { mutableStateOf("") }
                            var to by remember { mutableStateOf("") }
                            Column(modifier = Modifier.padding(16.dp)) {
                                Text("Dictionary", style = MaterialTheme.typography.headlineSmall)
                                Spacer(modifier = Modifier.height(16.dp))
                                OutlinedTextField(value = from, onValueChange = { from = it }, label = { Text("Current Word") }, modifier = Modifier.fillMaxWidth())
                                Spacer(modifier = Modifier.height(8.dp))
                                OutlinedTextField(value = to, onValueChange = { to = it }, label = { Text("Replace With") }, modifier = Modifier.fillMaxWidth())
                                Spacer(modifier = Modifier.height(16.dp))
                                Row(modifier = Modifier.fillMaxWidth(), horizontalArrangement = Arrangement.SpaceBetween) {
                                    Button(onClick = { if(from.isNotBlank() && to.isNotBlank()) { prefs.addDict(from.trim(), to.trim()); dict = prefs.getDict(); from = ""; to = "" } }) { Text("ADD") }
                                    Button(onClick = { prefs.clearDict(); dict = prefs.getDict() }, colors = ButtonDefaults.buttonColors(containerColor = MaterialTheme.colorScheme.error)) { Text("CLEAR ALL") }
                                }
                                Spacer(modifier = Modifier.height(24.dp))
                                Text("Word List (Tap to delete)", style = MaterialTheme.typography.titleMedium)
                                Spacer(modifier = Modifier.height(8.dp))
                                LazyColumn(modifier = Modifier.fillMaxSize()) {
                                    items(dict.toList()) { (k, v) ->
                                        Card(modifier = Modifier.fillMaxWidth().padding(vertical = 4.dp).clickable { prefs.removeDict(k); dict = prefs.getDict() }) {
                                            Text("$k → $v", modifier = Modifier.padding(16.dp))
                                        }
                                    }
                                }
                            }
                        }
                    }
                }
            }
        }
        EOF
