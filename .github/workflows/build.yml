package com.omni.tts

import android.content.Intent
import android.os.Bundle
import android.speech.tts.TextToSpeech
import androidx.activity.ComponentActivity
import androidx.activity.compose.setContent
import androidx.compose.foundation.layout.*
import androidx.compose.foundation.rememberScrollState
import androidx.compose.foundation.verticalScroll
import androidx.compose.material3.*
import androidx.compose.runtime.*
import androidx.compose.ui.Modifier
import androidx.compose.ui.platform.LocalContext
import androidx.compose.ui.unit.dp
import kotlinx.coroutines.Dispatchers
import kotlinx.coroutines.launch
import kotlinx.coroutines.withContext
import java.util.Locale

class MainActivity : ComponentActivity() {

    private var tempTts: TextToSpeech? = null

    @OptIn(ExperimentalMaterial3Api::class)
    override fun onCreate(savedInstanceState: Bundle?) {
        super.onCreate(savedInstanceState)
        val prefs = SharedPrefsManager(this)

        setContent {
            MaterialTheme {
                Surface(modifier = Modifier.fillMaxSize()) {
                    OmniSetupScreen(prefs)
                }
            }
        }
    }

    override fun onDestroy() { tempTts?.shutdown(); super.onDestroy() }

    @OptIn(ExperimentalMaterial3Api::class)
    @Composable
    fun OmniSetupScreen(prefs: SharedPrefsManager) {
        val context = LocalContext.current
        val scope = rememberCoroutineScope()
        val engines = remember { EngineFinder.getEngines(context) }
        val langList = remember {
            OmniTtsService.LANGUAGES.map { "${it.key} (${it.value})" }.sorted()
        }

        // ── State ─────────────────────────────────────────────────────────
        var selLang by remember {
            mutableStateOf(langList.find { it.contains("(en)") } ?: langList[0])
        }
        val isoCode get() = selLang.substringAfter("(").substringBefore(")")

        var selEngPkg by remember { mutableStateOf(prefs.engineForLang(isoCode)) }
        val selEngName = engines.find { it.pkg == selEngPkg }?.name ?: "Not Set"

        var rate  by remember { mutableFloatStateOf(prefs.getFloat(prefs.rateKey(isoCode, selEngPkg), 1f)) }
        var pitch by remember { mutableFloatStateOf(prefs.getFloat(prefs.pitchKey(isoCode, selEngPkg), 1f)) }

        var availLocales by remember { mutableStateOf(listOf<Locale>()) }
        var selLocTag by remember { mutableStateOf(prefs.getString(prefs.locKey(isoCode, selEngPkg))) }

        var latinFb    by remember { mutableStateOf(prefs.getString("latin_fallback", "en")) }
        var nonLatinFb by remember { mutableStateOf(prefs.getString("nonlatin_fallback", "hi")) }

        var langExp   by remember { mutableStateOf(false) }
        var engExp    by remember { mutableStateOf(false) }
        var locExp    by remember { mutableStateOf(false) }
        var latExp    by remember { mutableStateOf(false) }
        var nonLatExp by remember { mutableStateOf(false) }

        // Load voices when engine/language changes
        LaunchedEffect(selEngPkg, isoCode) {
            if (selEngPkg != "NOT_SET") {
                withContext(Dispatchers.IO) {
                    val latch = java.util.concurrent.CountDownLatch(1)
                    var voices: List<Locale>? = null
                    val t = TextToSpeech(context, { status ->
                        if (status == TextToSpeech.SUCCESS) {
                            voices = try {
                                tempTts?.voices
                                    ?.map { it.locale }
                                    ?.filter { it.language.equals(isoCode, true) }
                                    ?.distinctBy { it.toLanguageTag() }
                                    ?.sortedBy { it.displayName }
                            } catch (_: Exception) { null }
                        }
                        latch.countDown()
                    }, selEngPkg)
                    tempTts?.shutdown()
                    tempTts = t
                    latch.await(4, java.util.concurrent.TimeUnit.SECONDS)
                    withContext(Dispatchers.Main) { availLocales = voices ?: listOf() }
                }
            } else {
                availLocales = listOf()
            }
        }

        Column(
            modifier = Modifier
                .padding(16.dp)
                .verticalScroll(rememberScrollState())
        ) {
            Text("Omni TTS Setup", style = MaterialTheme.typography.headlineMedium)
            Spacer(Modifier.height(24.dp))

            // ── Language dropdown ─────────────────────────────────────────
            ExposedDropdownMenuBox(expanded = langExp, onExpandedChange = { langExp = !langExp }) {
                OutlinedTextField(
                    value = selLang, onValueChange = {}, readOnly = true,
                    label = { Text("Language") },
                    trailingIcon = { ExposedDropdownMenuDefaults.TrailingIcon(langExp) },
                    modifier = Modifier.fillMaxWidth().menuAnchor()
                )
                ExposedDropdownMenu(expanded = langExp, onDismissRequest = { langExp = false }) {
                    langList.forEach { lang ->
                        DropdownMenuItem(text = { Text(lang) }, onClick = {
                            selLang = lang
                            val iso = lang.substringAfter("(").substringBefore(")")
                            selEngPkg = prefs.engineForLang(iso)
                            rate = prefs.getFloat(prefs.rateKey(iso, selEngPkg), 1f)
                            pitch = prefs.getFloat(prefs.pitchKey(iso, selEngPkg), 1f)
                            selLocTag = prefs.getString(prefs.locKey(iso, selEngPkg))
                            langExp = false
                        })
                    }
                }
            }
            Spacer(Modifier.height(12.dp))

            // ── Engine dropdown ───────────────────────────────────────────
            ExposedDropdownMenuBox(expanded = engExp, onExpandedChange = { engExp = !engExp }) {
                OutlinedTextField(
                    value = selEngName, onValueChange = {}, readOnly = true,
                    label = { Text("TTS Engine") },
                    trailingIcon = { ExposedDropdownMenuDefaults.TrailingIcon(engExp) },
                    modifier = Modifier.fillMaxWidth().menuAnchor()
                )
                ExposedDropdownMenu(expanded = engExp, onDismissRequest = { engExp = false }) {
                    DropdownMenuItem(text = { Text("Not Set") }, onClick = {
                        selEngPkg = "NOT_SET"
                        prefs.setEngineForLang(isoCode, "NOT_SET"); engExp = false
                    })
                    engines.forEach { e ->
                        DropdownMenuItem(text = { Text(e.name) }, onClick = {
                            selEngPkg = e.pkg
                            prefs.setEngineForLang(isoCode, e.pkg)
                            rate = prefs.getFloat(prefs.rateKey(isoCode, e.pkg), 1f)
                            pitch = prefs.getFloat(prefs.pitchKey(isoCode, e.pkg), 1f)
                            selLocTag = prefs.getString(prefs.locKey(isoCode, e.pkg))
                            engExp = false
                        })
                    }
                }
            }
            Spacer(Modifier.height(12.dp))

            // ── Voice/Locale dropdown ─────────────────────────────────────
            ExposedDropdownMenuBox(expanded = locExp, onExpandedChange = { locExp = !locExp }) {
                val locName = availLocales.find { it.toLanguageTag() == selLocTag }?.displayName
                    ?: "Default Voice"
                OutlinedTextField(
                    value = locName, onValueChange = {}, readOnly = true,
                    label = { Text("Voice / Locale") },
                    trailingIcon = { ExposedDropdownMenuDefaults.TrailingIcon(locExp) },
                    modifier = Modifier.fillMaxWidth().menuAnchor()
                )
                ExposedDropdownMenu(expanded = locExp, onDismissRequest = { locExp = false }) {
                    DropdownMenuItem(text = { Text("Default Voice") }, onClick = {
                        selLocTag = ""; prefs.setString(prefs.locKey(isoCode, selEngPkg), "")
                        locExp = false
                    })
                    availLocales.forEach { loc ->
                        DropdownMenuItem(text = { Text(loc.displayName) }, onClick = {
                            selLocTag = loc.toLanguageTag()
                            prefs.setString(prefs.locKey(isoCode, selEngPkg), selLocTag)
                            locExp = false
                        })
                    }
                }
            }
            Spacer(Modifier.height(24.dp))

            // ── Rate slider ───────────────────────────────────────────────
            Text("Speech Rate: ${"%.2f".format(rate)}x")
            Slider(
                value = rate, valueRange = 0.1f..3f,
                onValueChange = {
                    rate = it
                    prefs.setFloat(prefs.rateKey(isoCode, selEngPkg), it)
                }
            )
            Spacer(Modifier.height(8.dp))

            // ── Pitch slider ──────────────────────────────────────────────
            Text("Pitch: ${"%.2f".format(pitch)}x")
            Slider(
                value = pitch, valueRange = 0.1f..3f,
                onValueChange = {
                    pitch = it
                    prefs.setFloat(prefs.pitchKey(isoCode, selEngPkg), it)
                }
            )
            Spacer(Modifier.height(24.dp))

            // ── Fallback language section ──────────────────────────────────
            HorizontalDivider()
            Spacer(Modifier.height(16.dp))
            Text("Auto-detect Fallback", style = MaterialTheme.typography.titleSmall)
            Text(
                "When language can't be detected, use:",
                style = MaterialTheme.typography.bodySmall
            )
            Spacer(Modifier.height(12.dp))

            // Latin fallback
            val latLangs = OmniTtsService.LANGUAGES.entries
                .filter { it.value == it.value } // all
                .map { "${it.key} (${it.value})" }.sorted()

            ExposedDropdownMenuBox(expanded = latExp, onExpandedChange = { latExp = !latExp }) {
                val latName = OmniTtsService.LANGUAGES.entries
                    .find { it.value == latinFb }?.key ?: latinFb
                OutlinedTextField(
                    value = "Latin text → $latName", onValueChange = {}, readOnly = true,
                    label = { Text("Preferred language for Latin text") },
                    trailingIcon = { ExposedDropdownMenuDefaults.TrailingIcon(latExp) },
                    modifier = Modifier.fillMaxWidth().menuAnchor()
                )
                ExposedDropdownMenu(expanded = latExp, onDismissRequest = { latExp = false }) {
                    latLangs.forEach { lang ->
                        DropdownMenuItem(text = { Text(lang) }, onClick = {
                            latinFb = lang.substringAfter("(").substringBefore(")")
                            prefs.setString("latin_fallback", latinFb); latExp = false
                        })
                    }
                }
            }
            Spacer(Modifier.height(8.dp))

            // Non-Latin fallback
            ExposedDropdownMenuBox(expanded = nonLatExp, onExpandedChange = { nonLatExp = !nonLatExp }) {
                val nlName = OmniTtsService.LANGUAGES.entries
                    .find { it.value == nonLatinFb }?.key ?: nonLatinFb
                OutlinedTextField(
                    value = "Non-Latin text → $nlName", onValueChange = {}, readOnly = true,
                    label = { Text("Preferred language for non-Latin text") },
                    trailingIcon = { ExposedDropdownMenuDefaults.TrailingIcon(nonLatExp) },
                    modifier = Modifier.fillMaxWidth().menuAnchor()
                )
                ExposedDropdownMenu(expanded = nonLatExp, onDismissRequest = { nonLatExp = false }) {
                    latLangs.forEach { lang ->
                        DropdownMenuItem(text = { Text(lang) }, onClick = {
                            nonLatinFb = lang.substringAfter("(").substringBefore(")")
                            prefs.setString("nonlatin_fallback", nonLatinFb); nonLatExp = false
                        })
                    }
                }
            }
            Spacer(Modifier.height(24.dp))

            // ── Buttons ───────────────────────────────────────────────────
            Button(
                onClick = {
                    scope.launch {
                        tempTts?.setSpeechRate(rate)
                        tempTts?.setPitch(pitch)
                        if (selLocTag.isNotEmpty()) {
                            try { tempTts?.language = Locale.forLanguageTag(selLocTag) }
                            catch (_: Exception) {}
                        }
                        tempTts?.speak(
                            "Testing Omni TTS audio setup",
                            TextToSpeech.QUEUE_FLUSH, null, "test"
                        )
                    }
                },
                modifier = Modifier.fillMaxWidth()
            ) { Text("TEST AUDIO") }

            Spacer(Modifier.height(8.dp))

            OutlinedButton(
                onClick = {
                    startActivity(Intent("com.android.settings.TTS_SETTINGS"))
                },
                modifier = Modifier.fillMaxWidth()
            ) { Text("OPEN SYSTEM TTS SETTINGS") }
        }
    }
}
EOF

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.5'
        cache-disabled: true

    - name: Build APK
      run: |
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        chmod +x gradlew 2>/dev/null || true
        gradle assembleDebug \
          -Pandroid.ndkVersion=25.1.8937393 \
          --no-daemon \
          --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Omni-TTS-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: error
