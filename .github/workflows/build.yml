# ── ComposeTtsService.kt ─────────────────────────────────────────────
# ARCHITECTURE: Direct OS Mixer + Thread Blocking
#
# onSynthesizeText flow:
#   1. For each chunk: create latch, set AudioAttributes (accessibility routing),
#      set pitch/rate unconditionally, call tts.speak() with QUEUE_FLUSH,
#      then latch.await() to block the synth thread until the OS finishes playback.
#   2. AFTER the entire loop completes: satisfy TalkBack with fake callback
#      sequence: callback.start() -> callback.done().
#      callback.start() is guarded by myStop so it is skipped on interrupt,
#      but callback.done() is ALWAYS called to prevent TalkBack from hanging.
#
# KEY INVARIANTS:
#   - callback.start() / callback.done() are NEVER called inside the chunk loop.
#   - tts.speak() uses QUEUE_FLUSH so each chunk pre-empts any stale utterance.
#   - AudioAttributes.setUsage(11) = USAGE_ASSISTANCE_ACCESSIBILITY ensures the
#     OS routes audio to the Accessibility volume slider, not the Media slider.
#   - finalRate = sysRate * appRate (multiplier model, not standalone override).
#   - Volume is passed via Bundle KEY_PARAM_VOLUME; it does not affect routing.
#   - latch.countDown() is called in BOTH onDone and onError so the thread
#     never hangs on a failed utterance.
#   - onStop sets myStop=true AND calls tts.stop() on all pooled engines,
#     which causes the in-progress speak() to fire onError -> latch.countDown(),
#     unblocking the synth thread cleanly without a stuck latch.wait.
w("app/src/main/java/com/omni/tts/ComposeTtsService.kt", """package com.omni.tts
import android.media.AudioAttributes
import android.os.Bundle
import android.speech.tts.SynthesisCallback
import android.speech.tts.SynthesisRequest
import android.speech.tts.TextToSpeech
import android.speech.tts.TextToSpeechService
import android.speech.tts.UtteranceProgressListener
import java.nio.ByteBuffer
import java.util.Locale
import java.util.concurrent.ConcurrentHashMap
import java.util.concurrent.CountDownLatch
import java.util.concurrent.TimeUnit
import java.util.concurrent.atomic.AtomicBoolean
import java.util.concurrent.atomic.AtomicReference
class ComposeTtsService : TextToSpeechService() {
    private val enginePool = ConcurrentHashMap<String, TextToSpeech>()
    private val engineLocks = ConcurrentHashMap<String, Any>()
    private lateinit var prefs: SharedPrefsManager
    // activeStop holds the stop flag for the CURRENT synthesis request.
    // Each new onSynthesizeText call atomically replaces it, cancelling any prior request.
    private val activeStop = AtomicReference(AtomicBoolean(true))
    class LangState { var localeTag = ""; var rate = -1f; var pitch = -1f }
    private val langStates = ConcurrentHashMap<String, LangState>()
    private fun getLocale(iso: String): Locale = try { Locale.forLanguageTag(iso) } catch (_: Exception) { Locale.US }

    override fun onCreate() {
        super.onCreate()
        VhLogger.init(this)
        VhLogger.i("[SERVICE] Omni v17 Booted — Direct OS Mixer architecture")
        prefs = SharedPrefsManager(this)
    }

    private fun initEngineForLang(lang: String): TextToSpeech? {
        val pkg = prefs.getEngineForLanguage(lang)
        if (pkg == "NOT_SET") return null
        enginePool[lang]?.let { return it }
        val lock = engineLocks.getOrPut(lang) { Any() }
        synchronized(lock) {
            enginePool[lang]?.let { return it }
            val initLatch = CountDownLatch(1)
            val ref = arrayOfNulls<TextToSpeech>(1)
            val t0 = System.currentTimeMillis()
            ref[0] = TextToSpeech(this, { status ->
                if (status == TextToSpeech.SUCCESS) {
                    val tag = prefs.getLocaleForLangPkg(lang, pkg).ifEmpty { getLocale(lang).toLanguageTag() }
                    try { ref[0]?.language = Locale.forLanguageTag(tag) } catch (_: Exception) { ref[0]?.language = getLocale(lang) }
                    VhLogger.markEngineInit(lang, pkg, System.currentTimeMillis() - t0)
                }
                initLatch.countDown()
            }, pkg)
            try { initLatch.await(5, TimeUnit.SECONDS) } catch (_: InterruptedException) {}
            val tts = ref[0]
            if (tts != null) enginePool[lang] = tts
            return tts
        }
    }

    override fun onGetLanguage(): Array<String> = arrayOf("eng", "USA", "")
    override fun onIsLanguageAvailable(l: String?, c: String?, v: String?) = TextToSpeech.LANG_AVAILABLE
    override fun onLoadLanguage(l: String?, c: String?, v: String?) = TextToSpeech.LANG_AVAILABLE

    override fun onStop() {
        VhLogger.markStop()
        // Signal the current synthesis loop to exit after latch.await() unblocks.
        activeStop.get().set(true)
        // Stop all internal engines; this fires onError on the active utterance,
        // which calls latch.countDown() and unblocks the synth thread immediately.
        enginePool.values.forEach { try { it.stop() } catch (_: Exception) {} }
    }

    override fun onSynthesizeText(request: SynthesisRequest?, callback: SynthesisCallback?) {
        // Cancel any prior request and install a fresh stop flag for this request.
        activeStop.get().set(true)
        val myStop = AtomicBoolean(false)
        activeStop.set(myStop)

        val rawText = request?.charSequenceText?.toString() ?: ""
        if (rawText.isEmpty() || myStop.get()) {
            callback?.done()
            return
        }

        val readingMode = prefs.getReadingMode()
        VhLogger.markMode(readingMode)
        val latFall = prefs.getString("mixed_mode_latin_language", "en")
        val nonLatFall = prefs.getString("mixed_mode_non_latin_language", "hi")

        // Sentence-split and pass to the native CLD2 engine for language segmentation.
        val iterator = java.text.BreakIterator.getSentenceInstance()
        iterator.setText(rawText)
        val sentences = mutableListOf<String>()
        var start = iterator.first(); var end = iterator.next()
        while (end != java.text.BreakIterator.DONE) {
            val s = rawText.substring(start, end).trim(); if (s.isNotEmpty()) sentences.add(s)
            start = end; end = iterator.next()
        }
        val joined = sentences.joinToString("\\u0000")
        val bytes = joined.toByteArray(Charsets.UTF_8)
        val directBuffer = ByteBuffer.allocateDirect(bytes.size)
        directBuffer.put(bytes); directBuffer.position(0)

        val dictMap = if (prefs.getBoolean("dict_enabled", false)) prefs.getDict() else emptyMap()
        val nativeOutput = NativeEngine.processDirect(
            directBuffer, bytes.size,
            dictMap.keys.toTypedArray(), dictMap.values.toTypedArray(),
            prefs.getBoolean("emoji_reading", true),
            prefs.getBoolean("emoji_count", false),
            prefs.getBoolean("punct_count", false),
            latFall, nonLatFall, readingMode
        )

        val chunkStrings = nativeOutput.split("||").filter { it.isNotBlank() }
        VhLogger.markRequest(rawText, chunkStrings.size)

        // sysRate / sysPitch come directly from TalkBack's SynthesisRequest.
        // finalRate = sysRate * appRate (multiplier model).
        val sysRate  = maxOf(0.1f, (request?.speechRate ?: 100) / 100.0f)
        val sysPitch = maxOf(0.1f, (request?.pitch     ?: 100) / 100.0f)

        var chunkIndex = 0
        for (chunkStr in chunkStrings) {
            if (myStop.get()) break

            val parts = chunkStr.split("|", limit = 2)
            if (parts.size < 2 || parts[1].trim().isEmpty()) continue
            chunkIndex++
            var effectiveLang = parts[0]
            val chunkText    = parts[1]

            // Engine resolution with Latin fallback.
            var pkg = prefs.getEngineForLanguage(effectiveLang)
            if (pkg == "NOT_SET") {
                VhLogger.markFallback(effectiveLang, latFall)
                effectiveLang = latFall
                pkg = prefs.getEngineForLanguage(effectiveLang)
            }
            if (pkg == "NOT_SET") { VhLogger.markSkipped("no engine for lang=$effectiveLang"); continue }

            val key      = "${effectiveLang}_${pkg}"
            val appRate  = maxOf(0.1f, prefs.getInt("rate_$key",  100) / 100.0f)
            val appPitch = maxOf(0.1f, prefs.getInt("pitch_$key", 100) / 100.0f)
            val appVolume= prefs.getInt("vol_$key", 100) / 100.0f
            val finalRate  = maxOf(0.1f, minOf(6.0f, sysRate  * appRate))
            val finalPitch = maxOf(0.1f, minOf(6.0f, sysPitch * appPitch))

            val tts = initEngineForLang(effectiveLang) ?: continue
            VhLogger.markEngineReused(effectiveLang)

            // Update locale on the engine only when it has changed.
            val state  = langStates.getOrPut(effectiveLang) { LangState() }
            val locTag = prefs.getLocaleForLangPkg(effectiveLang, pkg)
                .ifEmpty { Locale.forLanguageTag(effectiveLang).toLanguageTag() }
            if (state.localeTag != locTag) {
                try { tts.language = Locale.forLanguageTag(locTag) }
                catch (_: Exception) { tts.language = Locale.forLanguageTag(effectiveLang) }
                state.localeTag = locTag
            }

            // ── DIRECT OS MIXER: the core speak-and-block sequence ──────────────

            // Step 1: Create a latch that will be released when this utterance ends.
            val latch = CountDownLatch(1)

            // Step 2: Register progress listener. BOTH onDone and onError MUST
            //         release the latch so the thread never hangs.
            tts.setOnUtteranceProgressListener(object : UtteranceProgressListener() {
                override fun onStart(id: String) {
                    VhLogger.d("[CHUNK-$chunkIndex] onStart utteranceId=$id")
                }
                override fun onDone(id: String) {
                    VhLogger.markSynthEnd(chunkIndex, System.currentTimeMillis())
                    latch.countDown()
                }
                override fun onError(id: String) {
                    VhLogger.markSynthError(chunkIndex, "onError id=$id")
                    latch.countDown()
                }
                override fun onError(id: String, errorCode: Int) {
                    VhLogger.markSynthError(chunkIndex, "onError id=$id code=$errorCode")
                    latch.countDown()
                }
            })

            // Step 3: Route audio to the Accessibility volume channel.
            //         USAGE_ASSISTANCE_ACCESSIBILITY = 11, CONTENT_TYPE_SPEECH = 1.
            tts.setAudioAttributes(
                AudioAttributes.Builder()
                    .setUsage(AudioAttributes.USAGE_ASSISTANCE_ACCESSIBILITY)  // 11
                    .setContentType(AudioAttributes.CONTENT_TYPE_SPEECH)       // 1
                    .build()
            )

            // Step 4: Apply pitch and rate unconditionally before every speak().
            //         setPitch / setSpeechRate are sticky on the engine instance
            //         so we must always set them to avoid inheriting stale values
            //         from a previous chunk or a previous request.
            tts.setSpeechRate(finalRate)
            tts.setPitch(finalPitch)

            // Step 5: Build the params bundle. Volume only; rate/pitch are already
            //         applied via the engine API above.
            val bundle = Bundle().apply {
                putFloat(TextToSpeech.Engine.KEY_PARAM_VOLUME, appVolume)
            }

            // Step 6: Speak. QUEUE_FLUSH pre-empts any stale utterance on this engine.
            val synthStart = VhLogger.markSynthStart(chunkText, effectiveLang, chunkIndex)
            val speakResult = tts.speak(chunkText, TextToSpeech.QUEUE_FLUSH, bundle, "omni_chunk_$chunkIndex")
            if (speakResult != TextToSpeech.SUCCESS) {
                VhLogger.markSynthError(chunkIndex, "tts.speak() returned $speakResult")
                latch.countDown()  // release immediately so we don't hang
            }

            // Step 7: BLOCK this thread until the OS finishes playing the audio.
            //         TalkBack must wait here; it must NOT receive callback.done()
            //         until all chunks have been spoken.
            try {
                latch.await()
            } catch (e: InterruptedException) {
                VhLogger.e("[CHUNK-$chunkIndex] latch.await() interrupted: ${e.message}")
                Thread.currentThread().interrupt()
                break
            }
            VhLogger.markSynthEnd(chunkIndex, synthStart)
        }

        // ── FAKE CALLBACK (CRITICAL) ──────────────────────────────────────────
        // TalkBack requires callback.start() followed by callback.done() to
        // acknowledge synthesis completion. We are NOT streaming PCM bytes, so
        // we call start() with a dummy 16kHz/16-bit/mono spec purely to satisfy
        // the protocol. callback.done() is ALWAYS called (even on stop/error) so
        // TalkBack is never left in a hung state.
        //
        // callback.start() is only called if the request was NOT stopped, because
        // calling it after onStop() can confuse TalkBack into re-queuing audio.
        // callback.done() is unconditional.
        if (!myStop.get()) {
            callback?.start(16000, android.media.AudioFormat.ENCODING_PCM_16BIT, 1)
        }
        callback?.done()
    }

    override fun onDestroy() {
        VhLogger.i("[SERVICE] onDestroy")
        activeStop.get().set(true)
        enginePool.values.forEach { try { it.shutdown() } catch (_: Exception) {} }
        enginePool.clear(); langStates.clear(); super.onDestroy()
    }
}
""")

