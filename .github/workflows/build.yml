          "            }\n"
          "            val txt = span.subSequence(start, end).toString()\n"
          "            val lang = ls.locale?.language ?: \"UNKNOWN\"\n"
          "            if (txt.isNotEmpty()) result.add(TextChunk(txt, lang))\n"
          "            prevEnd = end\n"
          "        }\n"
          "        if (prevEnd < span.length) {\n"
          "            val txt = span.subSequence(prevEnd, span.length).toString()\n"
          "            if (txt.isNotEmpty()) result.add(TextChunk(txt, \"UNKNOWN\"))\n"
          "        }\n"
          "        return result\n"
          "    }\n"
          "    // ─────────────────────────────────────────────────────────────────\n"
          "    // Auto TTS clsCLD2.b(text, R, N, ctx):String — EXACT PORT\n"
          "    // Sliding window CLD2 detection + script-based fallback\n"
          "    // ─────────────────────────────────────────────────────────────────\n"
          "    private fun detectLanguage(text: String, latFall: String, nonLatFall: String): String {\n"
          "        if (text.isEmpty()) return \"UNKNOWN\"\n"
          "        val readingMode = prefs.getReadingMode()\n"
          "        // Use NativeEngine for CLD2 detection — single chunk auto mode call\n"
          "        try {\n"
          "            val joined = text\n"
          "            val bytes = joined.toByteArray(Charsets.UTF_8)\n"
          "            val buf = ByteBuffer.allocateDirect(bytes.size)\n"
          "            buf.put(bytes); buf.position(0)\n"
          "            val out = NativeEngine.processDirect(\n"
          "                buf, bytes.size,\n"
          "                emptyArray(), emptyArray(),\n"
          "                false, false, false,\n"
          "                latFall, nonLatFall, \"auto\",\n"
          "                \"auto\", \"auto\", \"auto\"\n"
          "            )\n"
          "            // \"auto\" mode returns single chunk: \"lang|text\"\n"
          "            val parts = out.split(\"|\", limit = 2)\n"
          "            if (parts.size == 2 && parts[0].isNotBlank()) return parts[0]\n"
          "        } catch (_: Exception) {}\n"
          "        // Fallback: char-script check\n"
          "        for (c in text) {\n"
          "            if (c.isWhitespace() || c.isDigit() || isLatinPunct(c)) continue\n"
          "            return if (c.code in 0x0041..0x024F) latFall else nonLatFall\n"
          "        }\n"
          "        return nonLatFall\n"
          "    }\n"
          "    // Auto TTS clsCLD2.c(char):boolean — ASCII punctuation check\n"
          "    private fun isLatinPunct(c: Char): Boolean {\n"
          "        val v = c.code\n"
          "        return (v in 33..47) || (v in 58..64) || (v in 91..96) || (v in 123..126)\n"
          "    }\n"
          "    // Engine availability check (Auto TTS t2/g.o)\n"
          "    private fun isEngineAvailable(lang: String): Boolean {\n"
          "        if (lang == \"UNKNOWN\" || lang.isEmpty()) return false\n"
          "        return prefs.getEngineForLanguage(lang) != \"NOT_SET\"\n"
          "    }\n"
          "    // ─────────────────────────────────────────────────────────────────\n"
          "    // onSynthesizeText — Auto TTS exact pipeline\n"
          "    // ─────────────────────────────────────────────────────────────────\n"
          "    override fun onSynthesizeText(request: SynthesisRequest?, callback: SynthesisCallback?) {\n"
          "        // ── Foreground service: ensure Android won't kill us mid-utterance. ──\n"
          "        // Matches original AutoTtsService onSynthesizeText prologue (R flag → d0()).\n"
          "        startForegroundIfPossible()\n"
          "        // ── Reset BOTH stop flags atomically inside the lock, then wake any leaked waiter. ──\n"
          "        // Matches original lines 1248–1257: two synchronized blocks each setting one flag\n"
          "        // + notifyAll. A previous call's wait()-blocked thread (if any) must be unblocked\n"
          "        // so it doesn't leak state into this new utterance.\n"
          "        synchronized(syncLock) {\n"
          "            isStopped = false       // hard stop cleared\n"
          "            isFlushed = false       // soft flush cleared\n"
          "            syncLock.notifyAll()\n"
          "        }\n"
          "        // ── SOFT FLUSH (Z(false)): drain any residual hardware buffers from the prior\n"
          "        // utterance without an immediate hard stop. Speak \"\" with QUEUE_FLUSH on every\n"
          "        // engine in the pool — equivalent to AutoTTS's Z(false) softFlush() routine.\n"
          "        for (eng in enginePool.values) {\n"
          "            try { eng.speak(\"\", TextToSpeech.QUEUE_FLUSH, null, \"omni_soft_flush\") } catch (_: Exception) {}\n"
          "        }\n"
          "        VhLogger.d(\"[SERVICE] onSynthesizeText textLen=${request?.charSequenceText?.length ?: 0}\")\n"
          "        activeStop.get().set(true)\n"
          "        val myStop = AtomicBoolean(false)\n"
          "        activeStop.set(myStop)\n"
          "        val rawCharSeq = request?.charSequenceText ?: \"\"\n"
          "        val rawText = rawCharSeq.toString().trim()\n"
          "        if (rawText.isEmpty()) {\n"
          "            // Original Z(false) soft-flush path: empty input → drain & finish, signalling\n"
          "            // any waiter via isFlushed (NOT isStopped — this isn't a hard cancel).\n"
          "            synchronized(syncLock) { isFlushed = true; syncLock.notifyAll() }\n"
          "            callback?.start(16000, android.media.AudioFormat.ENCODING_PCM_16BIT, 1)\n"
          "            callback?.done()\n"
          "            return\n"
          "        }\n"
          "        val readingMode = prefs.getReadingMode()\n"
          "        VhLogger.markMode(readingMode)\n"
          "        // ── OPTION-B ITEM 2: Snapshot synth-wide prefs ONCE at the top of this call. ──\n"
          "        // Matches original AutoTtsService.R() pattern: load all mode/flag prefs into local\n"
          "        // variables here so the chunk loop and native bridge never hit SharedPreferences\n"
          "        // again during this synthesis call. Each prefs.getX() costs ~0.5–2ms; this synth\n"
          "        // call previously hit ~10 of them per chunk path, adding up to ~10–20ms wasted.\n"
          "        // Lang-specific prefs (rate/pitch/vol/engine/locale/voice) stay per-chunk since\n"
          "        // they vary by chunk language and the engine pool key depends on them.\n"
          "        val isBluetooth       = prefs.isBluetoothCarMode()\n"
          "        val isBrokenProtector = prefs.isBrokenEngineProtector()\n"
          "        val isDedicated       = prefs.isDedicatedEnginesEnabled()\n"
          "        val latFall    = if (readingMode == \"dual\" || readingMode == \"mix\") prefs.getString(\"mixed_mode_latin_language\", \"en\") else prefs.getString(\"pref_lang\", \"en\")\n"
          "        val nonLatFall = if (readingMode == \"dual\" || readingMode == \"mix\") prefs.getString(\"mixed_mode_non_latin_language\", \"hi\") else prefs.getString(\"pref_lang\", \"hi\")\n"
          "        // Native-mode prefs (used by mix/dual paths only) — read once even if branch unused.\n"
          "        val dictEnabled       = prefs.getBoolean(\"dict_enabled\", false)\n"
          "        val emojiReading      = prefs.getBoolean(\"emoji_reading\", true)\n"
          "        val emojiCount        = prefs.getBoolean(\"emoji_count\", false)\n"
          "        val punctCount        = prefs.getBoolean(\"punct_count\", false)\n"
          "        val mixPuncLang       = prefs.getString(\"mix_punc_lang\",  \"auto\")\n"
          "        val mixNumLang        = prefs.getString(\"mix_num_lang\",   \"auto\")\n"
          "        val mixEmojiLang      = prefs.getString(\"mix_emoji_lang\", \"auto\")\n"
          "        val dualPuncLang      = prefs.getString(\"dual_punc_lang\",  \"auto\")\n"
          "        val dualNumLang       = prefs.getString(\"dual_num_lang\",   \"auto\")\n"
          "        val dualEmojiLang     = prefs.getString(\"dual_emoji_lang\", \"auto\")\n"
          "        // Dict map: only fetch if enabled — getDict() reads multiple SharedPreferences keys.\n"
          "        val cachedDictMap: Map<String, String> = if (dictEnabled) prefs.getDict() else emptyMap()\n"
          "        val chunks = mutableListOf<TextChunk>()\n"
          "        // ── [AutoTTS:engine|locale] PREFIX BYPASS + zxx LANGUAGE BYPASS ──\n"
          "        // AutoTTS supports an in-band routing tag. Format:\n"
          "        //     \"[AutoTTS:com.google.android.tts|en-US] hello world\"\n"
          "        // When present, skip the native script-splitter and route the stripped text\n"
          "        // directly to the specified engine/locale via TextChunk.forcedEngine/forcedLocale.\n"
          "        // Also: if SynthesisRequest.language == \"zxx\" (Android's \"no-language\" hint),\n"
          "        // honour that by routing one chunk through without detection.\n"
          "        val bypassPrefix = rawText.startsWith(\"[AutoTTS:\")\n"
          "        val bypassZxx = request?.language == \"zxx\"\n"
          "        var bypassed = false\n"
          "        if (bypassPrefix) {\n"
          "            val end = rawText.indexOf(']')\n"
          "            if (end > \"[AutoTTS:\".length) {\n"
          "                val tag = rawText.substring(\"[AutoTTS:\".length, end)\n"
          "                // Parse the in-band routing tag — supports four formats from original AutoTTS:\n"
          "                //   2-part \"|\":  engine|locale            (our compact form)\n"
          "                //   2-part \":\":  engine:locale\n"
          "                //   3-part \":\":  engine:locale:variant     (engine routing + voice variant)\n"
          "                //   4-part \":\":  license:engine:locale:variant   (full original AutoTTS form;\n"
          "                //                                             license token is ignored on our side)\n"
          "                val tparts: List<String> = if (tag.contains(\"|\")) tag.split(\"|\", limit = 2)\n"
          "                                           else tag.split(\":\")\n"
          "                var forcedEng: String? = null\n"
          "                var forcedLoc: String? = null\n"
          "                var forcedVariant: String? = null\n"
          "                when (tparts.size) {\n"
          "                    2 -> {\n"
          "                        forcedEng = tparts[0].takeIf { it.isNotBlank() }\n"
          "                        forcedLoc = tparts[1].takeIf { it.isNotBlank() }\n"
          "                    }\n"
          "                    3 -> {\n"
          "                        forcedEng     = tparts[0].takeIf { it.isNotBlank() }\n"
          "                        forcedLoc     = tparts[1].takeIf { it.isNotBlank() }\n"
          "                        forcedVariant = tparts[2].takeIf { it.isNotBlank() }\n"
          "                    }\n"
          "                    4 -> {\n"
          "                        // Original AutoTTS format: license:engine:locale:variant — drop license token.\n"
          "                        forcedEng     = tparts[1].takeIf { it.isNotBlank() }\n"
          "                        forcedLoc     = tparts[2].takeIf { it.isNotBlank() }\n"
          "                        forcedVariant = tparts[3].takeIf { it.isNotBlank() }\n"
          "                    }\n"
          "                    else -> { /* malformed — fall through, bypassed stays false */ }\n"
          "                }\n"
          "                val stripped = rawText.substring(end + 1).trimStart()\n"
          "                // forcedLoc may be \"en_US\" (Java Locale.toString format) or \"en-US\" (BCP-47);\n"
          "                // normalise to BCP-47 for our downstream Locale.forLanguageTag() consumers.\n"
          "                val locTag = forcedLoc?.replace('_', '-')\n"
          "                val baseLang = locTag?.substringBefore('-')?.takeIf { it.isNotBlank() } ?: latFall\n"
          "                if (stripped.isNotEmpty() && (forcedEng != null || locTag != null)) {\n"
          "                    val chunk = TextChunk(stripped, baseLang, forcedEng, locTag)\n"
          "                    // Stash variant in the chunk's lang field via a side channel? No — we route\n"
          "                    // variant through prefs.getVoiceName at speak time. For [AutoTTS:] forced\n"
          "                    // variant we temporarily inject the prefs entry for this lang+pkg+locTag pair.\n"
          "                    if (forcedVariant != null && forcedEng != null && locTag != null) {\n"
          "                        prefs.setVoiceName(baseLang, forcedEng, locTag, forcedVariant)\n"
          "                    }\n"
          "                    chunks.add(chunk)\n"
          "                    VhLogger.d(\"[SERVICE] [AutoTTS:] bypass eng=$forcedEng loc=$locTag var=$forcedVariant\")\n"
          "                    bypassed = true\n"
          "                }\n"
          "            }\n"
          "        } else if (bypassZxx) {\n"
          "            chunks.add(TextChunk(rawText, latFall))\n"
          "            VhLogger.d(\"[SERVICE] zxx bypass — single chunk routed to $latFall\")\n"
          "            bypassed = true\n"
          "        }\n"
          "        if (!bypassed) when (readingMode) {\n"
          "            \"mix\" -> {\n"
          "                // UNIVERSAL CHARACTER SPLITTER: pass the full raw text directly to the\n"
          "                // C++ engine. Native buildMixChunks does true character-by-character\n"
          "                // script-boundary splitting via SCRIPT_BLOCKS. We deliberately do NOT\n"
          "                // route through splitByLocaleSpans here, because TalkBack's LocaleSpan\n"
          "                // hints can mis-tag mixed-script sentences (e.g. tagging \"भेजें Button\"\n"
          "                // as entirely English).\n"
          "                val dictMap = cachedDictMap\n"
          "                val bytes = rawText.toByteArray(Charsets.UTF_8)\n"
          "                val buf = ByteBuffer.allocateDirect(bytes.size)\n"
          "                buf.put(bytes); buf.position(0)\n"
          "                val out = NativeEngine.processDirect(\n"
          "                    buf, bytes.size,\n"
          "                    dictMap.keys.toTypedArray(), dictMap.values.toTypedArray(),\n"
          "                    emojiReading,\n"
          "                    emojiCount,\n"
          "                    punctCount,\n"
          "                    latFall, nonLatFall, \"mix\",\n"
          "                    mixPuncLang,\n"
          "                    mixNumLang,\n"
          "                    mixEmojiLang\n"
          "                )\n"
          "                VhLogger.d(\"[SERVICE] mix mode: native returned ${out.length} chars\")\n"
          "                for (chunkStr in out.split(\"||\").filter { it.isNotBlank() }) {\n"
          "                    val parts = chunkStr.split(\"|\", limit = 2)\n"
          "                    if (parts.size == 2 && parts[0].isNotBlank() && parts[1].trim().isNotEmpty()) {\n"
          "                        val resolved = if (isDedicated || isEngineAvailable(parts[0])) parts[0] else {\n"
          "                            // Smart Fallback: English-ish chunks go to latFall (Primary engine),\n"
          "                            // anything else routes to nonLatFall (Secondary engine — broad multilingual,\n"
          "                            // e.g. Google TTS — so Chinese / Korean / etc. don't fall to a Latin-only engine).\n"
          "                            if (parts[0] == \"en\" || parts[0] == latFall) latFall else nonLatFall\n"
          "                        }\n"
          "                        chunks.add(TextChunk(parts[1], resolved))\n"
          "                    }\n"
          "                }\n"
          "            }\n"
          "            \"dual\" -> {\n"
          "                val sentences = mutableListOf<String>()\n"
          "                val iter = java.text.BreakIterator.getSentenceInstance()\n"
          "                iter.setText(rawText)\n"
          "                var st = iter.first(); var en = iter.next()\n"
          "                while (en != java.text.BreakIterator.DONE) {\n"
          "                    val s = rawText.substring(st, en).trim()\n"
          "                    if (s.isNotEmpty()) sentences.add(s)\n"
          "                    st = en; en = iter.next()\n"
          "                }\n"
          "                val joined = sentences.joinToString(\"\\u0000\")\n"
          "                val bytes  = joined.toByteArray(Charsets.UTF_8)\n"
          "                val buf = ByteBuffer.allocateDirect(bytes.size)\n"
          "                buf.put(bytes); buf.position(0)\n"
          "                val dictMap = cachedDictMap\n"
          "                val out = NativeEngine.processDirect(\n"
          "                    buf, bytes.size,\n"
          "                    dictMap.keys.toTypedArray(), dictMap.values.toTypedArray(),\n"
          "                    emojiReading,\n"
          "                    emojiCount,\n"
          "                    punctCount,\n"
          "                    latFall, nonLatFall, \"dual\",\n"
          "                    dualPuncLang,\n"
          "                    dualNumLang,\n"
          "                    dualEmojiLang\n"
          "                )\n"
          "                for (chunkStr in out.split(\"||\").filter { it.isNotBlank() }) {\n"
          "                    val parts = chunkStr.split(\"|\", limit = 2)\n"
          "                    if (parts.size == 2 && parts[0].isNotBlank() && parts[1].trim().isNotEmpty())\n"
          "                        chunks.add(TextChunk(parts[1], parts[0]))\n"
          "                }\n"
          "            }\n"
          "            else -> {\n"
          "                // AUTO MODE — also catches any legacy persisted \"direct\"/\"google\" pref values\n"
          "                // safely by falling through to auto-detect routing.\n"
          "                val detected = detectLanguage(rawText, latFall, nonLatFall)\n"
          "                val resolved = if (isDedicated || isEngineAvailable(detected)) detected else {\n"
          "                    // Smart Fallback: English-ish detection goes to latFall, anything else to nonLatFall.\n"
          "                    if (detected == \"en\" || detected == latFall) latFall else nonLatFall\n"
          "                }\n"
          "                chunks.add(TextChunk(rawText, resolved))\n"
          "            }\n"
          "        }\n"
          "        VhLogger.d(\"[SERVICE] mode=$readingMode produced ${chunks.size} chunks\")\n"
          "        if (chunks.isEmpty()) {\n"
          "            callback?.start(16000, android.media.AudioFormat.ENCODING_PCM_16BIT, 1)\n"
          "            callback?.done()\n"
          "            return\n"
          "        }\n"
          "        val sysRate  = maxOf(0.1f, (request?.speechRate ?: 100) / 100.0f)\n"
          "        val sysPitch = maxOf(0.1f, (request?.pitch       ?: 100) / 100.0f)\n"
          "        val totalChunks = chunks.size\n"
          "        callback?.start(16000, android.media.AudioFormat.ENCODING_PCM_16BIT, 1)\n"
          "        for ((idx, chunk) in chunks.withIndex()) {\n"
          "            if (myStop.get()) break\n"
          "            if (chunk.text.trim().isEmpty()) continue\n"
          "            val currentChunk = idx + 1\n"
          "            val effectiveLang = chunk.lang\n"
          "            val chunkText = chunk.text\n"
          "            VhLogger.d(\"[CHUNK-$currentChunk] lang=$effectiveLang textLen=${chunkText.length}\")\n"
          "            // Honour [AutoTTS:] forced routing — overrides per-language prefs\n"
          "            val pkg = chunk.forcedEngine ?: prefs.getEngineForLanguage(effectiveLang)\n"
          "            if (pkg == \"NOT_SET\") { VhLogger.markSkipped(\"$effectiveLang NOT_SET\"); continue }\n"
          "            val key = \"${effectiveLang}_${pkg}\"\n"
          "            val appRate   = maxOf(0.1f, prefs.getInt(\"rate_$key\",  100) / 100.0f)\n"
          "            val appPitch  = maxOf(0.1f, prefs.getInt(\"pitch_$key\", 100) / 100.0f)\n"
          "            val appVolume = prefs.getInt(\"vol_$key\", 100) / 100.0f\n"
          "            val finalRate  = maxOf(0.1f, minOf(6.0f, sysRate  * appRate))\n"
          "            val finalPitch = maxOf(0.1f, minOf(6.0f, sysPitch * appPitch))\n"
          "            val locTag = chunk.forcedLocale ?: prefs.getLocaleForLangPkg(effectiveLang, pkg)\n"
          "                .ifEmpty { Locale.forLanguageTag(effectiveLang).toLanguageTag() }\n"
          "            VhLogger.markChunkStart(currentChunk, totalChunks, effectiveLang, pkg, locTag, chunkText, finalRate, finalPitch, appVolume, sysRate, sysPitch, appRate, appPitch)\n"
          "            val tts = initEngineForLangPkg(effectiveLang, pkg)\n"
          "            if (tts == null) { VhLogger.markEngineNull(effectiveLang); continue }\n"
          "            if (myStop.get()) break\n"
          "            // BUNDLE-C ITEM 2: cached rate/pitch — skip setSpeechRate + setPitch when\n"
          "            // unchanged from the previous chunk on this engine. Two IPC calls saved.\n"
          "            // Note: cacheKey is computed a few lines below for voice cache, but rate/pitch\n"
          "            // belong to the engine instance so we derive it now (cheap string concat).\n"
          "            val rpCacheKey = if (prefs.getEngineForLanguage(effectiveLang) == pkg) effectiveLang else \"${effectiveLang}__${pkg}\"\n"
          "            val rpTuple = finalRate to finalPitch\n"
          "            if (rateAndPitchCache[rpCacheKey] != rpTuple) {\n"
          "                tts.setSpeechRate(finalRate)\n"
          "                tts.setPitch(finalPitch)\n"
          "                rateAndPitchCache[rpCacheKey] = rpTuple\n"
          "            }\n"
          "            // ── Exact Voice Variant Matching ──\n"
          "            // The user can pin a specific voice (e.g. \"en-us-x-sfg#female_3-local\") via the\n"
          "            // Voice Variant dropdown. We look it up by name here. \"*Default\" means \"use the\n"
          "            // locale's default voice\" — fall back to setLanguage(locTag) in that case.\n"
          "            val voiceName = prefs.getVoiceName(effectiveLang, pkg, locTag)\n"
          "            // OPTION-A ITEM 2: skip redundant setVoice/setLanguage. Each call costs 50–200ms\n"
          "            // on some engines (especially Google TTS). For long-form reading with many\n"
          "            // consecutive same-language chunks this adds up to noticeable micro-pauses.\n"
          "            // The cache key matches the engine pool key so [AutoTTS:] forced routing\n"
          "            // (which uses a composite key) gets its own cache slot.\n"
          "            val cacheKey = if (prefs.getEngineForLanguage(effectiveLang) == pkg) effectiveLang else \"${effectiveLang}__${pkg}\"\n"
          "            val targetTuple = locTag to voiceName\n"
          "            if (lastVoiceCache[cacheKey] == targetTuple) {\n"
          "                VhLogger.d(\"[CHUNK-$currentChunk] voice/locale unchanged — skipping setVoice/setLanguage\")\n"
          "            } else {\n"
          "                try {\n"
          "                    val targetLocale = Locale.forLanguageTag(locTag)\n"
          "                    var voiceSet = false\n"
          "                    if (voiceName != \"*Default\") {\n"
          "                        // BUNDLE-B ITEM 3: O(1) cache lookup. The voice list was pre-built\n"
          "                        // at init time (see initEngineForLangPkg). If the cache miss happens\n"
          "                        // (rare — OEM engine that refused voices enumeration at init time),\n"
          "                        // fall back to the original O(n) scan on tts.voices.\n"
          "                        val cachedVoiceMap = voiceListCache[cacheKey]\n"
          "                        val match: Voice? = if (cachedVoiceMap != null) {\n"
          "                            cachedVoiceMap[voiceName]\n"
          "                        } else {\n"
          "                            try { tts.voices?.firstOrNull { it.name == voiceName } } catch (_: Exception) { null }\n"
          "                        }\n"
          "                        if (match != null) {\n"
          "                            tts.voice = match\n"
          "                            voiceSet = true\n"
          "                            VhLogger.markLocaleApplied(currentChunk, match.name, true)\n"
          "                        }\n"
          "                    }\n"
          "                    if (!voiceSet) {\n"
          "                        tts.language = targetLocale\n"
          "                        VhLogger.markLocaleApplied(currentChunk, locTag, false)\n"
          "                    }\n"
          "                    // Cache only on successful application — exception path falls through to retry next chunk.\n"
          "                    lastVoiceCache[cacheKey] = targetTuple\n"
          "                } catch (_: Exception) {\n"
          "                    try { tts.language = Locale.forLanguageTag(locTag) }\n"
          "                    catch (_: Exception) { tts.language = Locale.forLanguageTag(effectiveLang) }\n"
          "                    // Don't cache on exception path — let the next chunk retry the apply.\n"
          "                }\n"
          "            }\n"
          "            val expectedId = \"AutoTTS_${currentChunk}\"\n"
          "            var isChunkDone = false\n"
          "            tts.setOnUtteranceProgressListener(object : UtteranceProgressListener() {\n"
          "                override fun onStart(id: String) {\n"
          "                    if (id != expectedId) return\n"
          "                    // Declare audio format to the framework callback on first chunk.\n"
          "                    // Matches original AutoTtsService d.onStart() lines 1816-1820:\n"
          "                    //     if (!callback.hasStarted()) callback.start(16000, 2, 1)\n"
          "                    // Without this, some SynthesisCallback consumers (notably TalkBack) reject\n"
          "                    // the PCM stream because the format header was never declared.\n"
          "                    try {\n"
          "                        if (callback?.hasStarted() == false) {\n"
          "                            callback.start(16000, android.media.AudioFormat.ENCODING_PCM_16BIT, 1)\n"
          "                        }\n"
          "                    } catch (_: Exception) {}\n"
          "                    VhLogger.markSynthStart(chunkText, effectiveLang, currentChunk)\n"
          "                }\n"
          "                override fun onDone(id: String) {\n"
          "                    if (id != expectedId) return\n"
          "                    VhLogger.markSynthEnd(currentChunk, System.currentTimeMillis())\n"
          "                    isChunkDone = true\n"
          "                    synchronized(syncLock) { syncLock.notifyAll() }\n"
          "                }\n"
          "                override fun onError(id: String) {\n"
          "                    if (id != expectedId) return\n"
          "                    VhLogger.markSynthError(currentChunk, \"onError id=$id\")\n"
          "                    myStop.set(true); synchronized(syncLock) { syncLock.notifyAll() }\n"
          "                }\n"
          "                override fun onError(id: String, errorCode: Int) {\n"
          "                    if (id != expectedId) return\n"
          "                    VhLogger.markSynthErrorCode(currentChunk, errorCode)\n"
          "                    myStop.set(true); synchronized(syncLock) { syncLock.notifyAll() }\n"
          "                }\n"
          "                override fun onStop(id: String, interrupted: Boolean) {\n"
          "                    if (id != expectedId) return\n"
          "                    myStop.set(true); synchronized(syncLock) { syncLock.notifyAll() }\n"
          "                }\n"
          "            })\n"
          "            val params = android.os.Bundle(request?.params ?: android.os.Bundle())\n"
          "            params.remove(\"pitch\"); params.remove(\"rate\")\n"
          "            params.remove(\"language\"); params.remove(\"country\")\n"
          "            params.remove(\"variant\"); params.remove(\"voiceName\"); params.remove(\"utteranceId\")\n"
          "            // BUNDLE-C ITEM 4: matches original AutoTtsService — only attach volume to the\n"
          "            // bundle when non-zero. Engine defaults to 1.0f if absent; putting 0.0f could\n"
          "            // confuse some engines into silent-but-busy state. Skip the putFloat IPC on\n"
          "            // pure-silent rows (e.g. punctuation chunks the user has volume-zeroed).\n"
          "            if (appVolume > 0.0f) {\n"
          "                params.putFloat(TextToSpeech.Engine.KEY_PARAM_VOLUME, appVolume)\n"
          "            }\n"
          "            // ── Bluetooth Car Mode (SCO routing) ──\n"
          "            // Re-set audio attributes with USAGE_VOICE_COMMUNICATION (11) so the car's\n"
          "            // hands-free system routes TTS over the SCO/phone-call channel rather than A2DP.\n"
          "            // BUNDLE-C ITEM 1: skip if already applied to this engine. Matches original\n"
          "            // AutoTtsService.b0.h flag — apply once per engine, never again.\n"
          "            if (isBluetooth && !btAppliedEngines.contains(rpCacheKey)) {\n"
          "                try {\n"
          "                    tts.setAudioAttributes(\n"
          "                        android.media.AudioAttributes.Builder().setUsage(11).setContentType(1).build()\n"
          "                    )\n"
          "                    btAppliedEngines.add(rpCacheKey)\n"
          "                } catch (_: Exception) {}\n"
          "            }\n"
          "            // ── Broken Engine Protector ──\n"
          "            // Some older / OEM TTS engines crash if streamType or audioAttributes are present\n"
          "            // in the params bundle. Stripping them keeps those engines alive.\n"
          "            if (isBrokenProtector) {\n"
          "                params.remove(\"streamType\")\n"
          "                params.remove(\"audioAttributes\")\n"
          "            }\n"
          "            params.putString(TextToSpeech.Engine.KEY_PARAM_UTTERANCE_ID, expectedId)\n"
          "            // First chunk flushes any residual audio; subsequent chunks queue-add for seamless playback.\n"
          "            val queueMode = if (currentChunk == 1) TextToSpeech.QUEUE_FLUSH else TextToSpeech.QUEUE_ADD\n"
          "            val speakResult = tts.speak(chunkText, queueMode, params, expectedId)\n"
          "            // OPTION-A ITEM 1: speak() ERROR recovery via engine eviction.\n"
          "            // Original AutoTtsService.N() reinitializes the ENTIRE engine pool on speak()\n"
          "            // failure. We do the lighter version: evict only the failing engine + clear its\n"
          "            // voice cache. The next chunk for the same language lazy-re-inits via\n"
          "            // initEngineForLangPkg(), giving a fresh TextToSpeech instance a chance to\n"
          "            // succeed. Without this, an OOM/crash on one engine kills that language for\n"
          "            // the rest of the session.\n"
          "            if (speakResult == TextToSpeech.ERROR) {\n"
          "                VhLogger.e(\"[CHUNK-$currentChunk] speak ERROR — evicting & reinitialising engine $pkg for $effectiveLang\")\n"
          "                val evictKey = if (prefs.getEngineForLanguage(effectiveLang) == pkg) effectiveLang else \"${effectiveLang}__${pkg}\"\n"
          "                val removed = enginePool.remove(evictKey)\n"
          "                lastVoiceCache.remove(evictKey)  // matched cache must be invalidated alongside the engine\n"
          "                voiceListCache.remove(evictKey)  // BUNDLE-B: voice list belongs to evicted engine\n"
          "                btAppliedEngines.remove(evictKey)  // BUNDLE-C: BT flag must reset for fresh engine\n"
          "                rateAndPitchCache.remove(evictKey)  // BUNDLE-C: rate/pitch must re-apply on fresh engine\n"
          "                try { removed?.shutdown() } catch (_: Exception) {}\n"
          "                continue\n"
          "            }\n"
          "            // ORIGINAL AUTOTTS PRODUCER-CONSUMER PATTERN — zero-lag stops via wait()/notifyAll()\n"
          "            val heartbeat = ByteArray(2)  // tiny heartbeat just to prevent TalkBack timeout\n"
          "            synchronized(syncLock) {\n"
          "                while (!isChunkDone && !myStop.get() && !isStopped && !isFlushed && !activeStop.get().get()) {\n"
          "                    try {\n"
          "                        // Deep sleep. Wakes INSTANTLY when onStop or onDone calls notifyAll().\n"
          "                        syncLock.wait(1000)\n"
          "                        // Feed a 2-byte heartbeat every ~1s if not woken (TalkBack timeout bypass).\n"
          "                        callback?.audioAvailable(heartbeat, 0, heartbeat.size)\n"
          "                    } catch (_: Exception) { break }\n"
          "                }\n"
          "            }\n"
          "            if (myStop.get() || isStopped || isFlushed) break\n"
          "        }\n"
          "        callback?.done()\n"
          "    }\n"
          "    override fun onDestroy() {\n"
          "        activeStop.get().set(true)\n"
          "        // Set BOTH stop flags so any wait()-blocked thread exits cleanly\n"
          "        synchronized(syncLock) {\n"
          "            isStopped = true\n"
          "            isFlushed = true\n"
          "            syncLock.notifyAll()\n"
          "        }\n"
          "        // Release system resources in reverse-acquire order: FG → audio focus → engines\n"
          "        stopForegroundSafe()\n"
          "        abandonAudioFocus()\n"
          "        enginePool.values.forEach { try { it.shutdown() } catch (_: Exception) {} }\n"
          "        enginePool.clear()\n"
          "        lastVoiceCache.clear()  // OPTION-A ITEM 2: cache lifetime tied to engine pool\n"
          "        voiceListCache.clear()  // BUNDLE-B: voice list cache lifetime tied to engine pool\n"
          "        btAppliedEngines.clear()  // BUNDLE-C: per-engine BT flag\n"
          "        rateAndPitchCache.clear()  // BUNDLE-C: per-engine rate/pitch state\n"
          "        super.onDestroy()\n"
          "    }\n"
          "}\n")

          # ── CheckVoiceData.kt ────────────────────────────────────────────────
          w("app/src/main/java/com/omni/tts/CheckVoiceData.kt",
          "package com.omni.tts\n"
          "import android.app.Activity\n"
          "import android.content.Intent\n"
          "import android.os.Bundle\n"
          "import android.speech.tts.TextToSpeech\n"
          "import java.util.Locale\n"
          "class CheckVoiceData : Activity() {\n"
          "    override fun onCreate(savedInstanceState: Bundle?) {\n"
          "        super.onCreate(savedInstanceState)\n"
          "        val prefs = SharedPrefsManager(this)\n"
          "        // Build the available-voices list from TWO sources, deduped:\n"
          "        //   1. Languages the user has configured an engine for (modern direct keying).\n"
          "        //   2. The legacy voice_N sequential pref schema (for original AutoTTS migration).\n"
          "        val available = arrayListOf<String>()\n"
          "        val seen = hashSetOf<String>()\n"
          "        for (iso in Languages.map.keys) {\n"
          "            if (prefs.getEngineForLanguage(iso) != \"NOT_SET\") {\n"
          "                try {\n"
          "                    val tag = Locale.forLanguageTag(iso).toLanguageTag()\n"
          "                    if (seen.add(tag)) available.add(tag)\n"
          "                } catch (_: Exception) {}\n"
          "            }\n"
          "        }\n"
          "        for (raw in prefs.getAllVoicePrefs()) {\n"
          "            // Format: \"name#locale_country_variant\"  → extract locale portion (after #)\n"
          "            val parts = raw.split(\"#\")\n"
          "            if (parts.size < 2) continue\n"
          "            val locStr = parts.drop(1).joinToString(\"#\")  // re-join in case # appears in variant\n"
          "            try {\n"
          "                val locParts = locStr.split(\"_\")\n"
          "                val locale: Locale? = when (locParts.size) {\n"
          "                    1 -> Locale(locParts[0])\n"
          "                    2 -> Locale(locParts[0], locParts[1])\n"
          "                    3 -> Locale(locParts[0], locParts[1], locParts[2])\n"
          "                    else -> null\n"
          "                }\n"
          "                if (locale != null) {\n"
          "                    val tag = locale.toLanguageTag()\n"
          "                    if (seen.add(tag)) available.add(tag)\n"
          "                }\n"
          "            } catch (_: Exception) {}\n"
          "        }\n"
          "        val data = Intent()\n"
          "        data.putStringArrayListExtra(TextToSpeech.Engine.EXTRA_AVAILABLE_VOICES, available)\n"
          "        data.putStringArrayListExtra(TextToSpeech.Engine.EXTRA_UNAVAILABLE_VOICES, arrayListOf())\n"
          "        setResult(TextToSpeech.Engine.CHECK_VOICE_DATA_PASS, data)\n"
          "        finish()\n"
          "    }\n"
          "}\n")

          # ── GetSampleText.kt ─────────────────────────────────────────────────
          w("app/src/main/java/com/omni/tts/GetSampleText.kt",
          "package com.omni.tts\n"
          "import android.app.Activity\n"
          "import android.content.Intent\n"
          "import android.os.Bundle\n"
          "import android.speech.tts.TextToSpeech\n"
          "import java.util.Locale\n"
          "class GetSampleText : Activity() {\n"
          "    override fun onCreate(savedInstanceState: Bundle?) {\n"
          "        super.onCreate(savedInstanceState)\n"
          "        val langExtra = intent?.getStringExtra(\"language\") ?: \"eng\"\n"
          "        val locale = try { Locale(langExtra) } catch (_: Exception) { Locale.getDefault() }\n"
          "        val iso = locale.language\n"
          "        // Localized sample texts keyed by ISO 639-1. Anything not listed falls through to a\n"
          "        // generic English-templated message that names the language.\n"
          "        val sampleMap = mapOf(\n"
          "            \"en\" to \"This is a sample text in English.\",\n"
          "            \"hi\" to \"\u092F\u0939 \u090F\u0915 \u0928\u092E\u0942\u0928\u093E \u092A\u093E\u0920 \u0939\u0948\u0964\",\n"
          "            \"es\" to \"Este es un texto de ejemplo.\",\n"
          "            \"fr\" to \"Ceci est un texte d'exemple.\",\n"
          "            \"de\" to \"Dies ist ein Beispieltext.\",\n"
          "            \"ru\" to \"\u042D\u0442\u043E \u043F\u0440\u0438\u043C\u0435\u0440 \u0442\u0435\u043A\u0441\u0442\u0430.\",\n"
          "            \"zh\" to \"\u8FD9\u662F\u4E00\u6BB5\u793A\u4F8B\u6587\u672C\u3002\",\n"
          "            \"ja\" to \"\u3053\u308C\u306F\u30B5\u30F3\u30D7\u30EB\u306E\u30C6\u30AD\u30B9\u30C8\u3067\u3059\u3002\",\n"
          "            \"ar\" to \"\u0647\u0630\u0627 \u0646\u0635 \u0639\u064A\u0646\u0629.\",\n"
          "            \"mr\" to \"\u0939\u093E \u090F\u0915 \u0928\u092E\u0941\u0928\u093E \u092E\u091C\u0915\u0942\u0930 \u0906\u0939\u0947.\"\n"
          "        )\n"
          "        val text = sampleMap[iso] ?: \"Sample text for ${locale.displayLanguage}.\"\n"
          "        // Wrap with the [AutoTTS::lang] bypass tag so ComposeTtsService routes the sample\n"
          "        // straight to the correct engine without running the native script splitter.\n"
          "        val outStr = \"[AutoTTS::${locale.toLanguageTag()}] $text\"\n"
          "        val data = Intent()\n"
          "        data.putExtra(\"sampleText\", outStr)\n"
          "        setResult(TextToSpeech.Engine.CHECK_VOICE_DATA_PASS, data)\n"
          "        finish()\n"
          "    }\n"
          "}\n")

