          w("app/src/main/java/com/omni/tts/VhLogger.kt",
          "package com.omni.tts\n"
          "import android.content.Context\n"
          "import android.util.Log\n"
          "import java.io.BufferedWriter\n"
          "import java.io.File\n"
          "import java.io.FileWriter\n"
          "import java.io.IOException\n"
          "import java.text.SimpleDateFormat\n"
          "import java.util.Date\n"
          "import java.util.LinkedList\n"
          "import java.util.Locale\n"
          "import java.util.concurrent.ConcurrentHashMap\n"
          "import java.util.concurrent.atomic.AtomicLong\n"
          "object VhLogger {\n"
          "    private const val TAG = \"OMNI-NATIVE\"\n"
          "    private const val MAX_LINES = 8000\n"
          "    private val buffer = LinkedList<String>()\n"
          "    private val sdf = SimpleDateFormat(\"MM-dd HH:mm:ss.SSS\", Locale.US)\n"
          "    private var appContext: Context? = null\n"
          "    private val lastSynthStart = AtomicLong(0)\n"
          "    private val firstAudioPerChunk = ConcurrentHashMap<Int, Long>()\n"
          "    private val sleepCountPerChunk = ConcurrentHashMap<Int, Int>()\n"
          "    private val totalBytesPerChunk = ConcurrentHashMap<Int, Long>()\n"
          "    private val audioCallbackCount = ConcurrentHashMap<Int, Int>()\n"
          "    fun init(ctx: Context) {\n"
          "        appContext = ctx.applicationContext\n"
          "        write(\"I\", \"[LOGGER] VhLogger initialized — device=${android.os.Build.MODEL} sdk=${android.os.Build.VERSION.SDK_INT} android=${android.os.Build.VERSION.RELEASE}\")\n"
          "    }\n"
          "    @Synchronized private fun write(level: String, msg: String) {\n"
          "        val line = \"${sdf.format(Date())} $level/$TAG: $msg\"\n"
          "        when (level) { \"E\" -> Log.e(TAG, msg); \"W\" -> Log.w(TAG, msg); else -> Log.d(TAG, msg) }\n"
          "        buffer.addLast(line); if (buffer.size > MAX_LINES) buffer.removeFirst()\n"
          "    }\n"
          "    fun d(msg: String) = write(\"D\", msg)\n"
          "    fun w(msg: String) = write(\"W\", msg)\n"
          "    fun e(msg: String) = write(\"E\", msg)\n"
          "    fun i(msg: String) = write(\"I\", msg)\n"
          "    fun markRequest(text: String, totalChunks: Int) {\n"
          "        write(\"I\", \"[REQUEST] ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\")\n"
          "        write(\"I\", \"[REQUEST] textLength=${text.length} totalChunks=$totalChunks\")\n"
