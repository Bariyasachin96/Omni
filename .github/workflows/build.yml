name: Build Omni Ultra Max Native
on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;25.1.8937393" "cmake;3.22.1" --sdk_root=$ANDROID_HOME

      - name: Clone CLD2 Native Library
        run: |
          mkdir -p app/src/main/cpp
          git clone --depth 1 https://github.com/CLD2Owners/cld2.git app/src/main/cpp/cld2_src

      - name: Write Generator Script
        run: |
          cat > generate_project.py << 'PYEOF'
          import os, base64, textwrap

          def w(path, content):
              d=os.path.dirname(path); d and os.makedirs(d, exist_ok=True)
              with open(path, 'w', encoding='utf-8') as f:
                  f.write(textwrap.dedent(content))

          def wb(path, content_b64):
              d=os.path.dirname(path); d and os.makedirs(d, exist_ok=True)
              with open(path, 'wb') as f:
                  f.write(base64.b64decode(content_b64))

          PYEOF
          python3 - << 'GENEOF'
          import os, textwrap

          def w(path, content):
              d=os.path.dirname(path); d and os.makedirs(d, exist_ok=True)
              with open(path, 'w', encoding='utf-8') as f:
                  f.write(content)

          # ── gradle.properties ────────────────────────────────────────────────
          w("gradle.properties", """android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx3096m -Dfile.encoding=UTF-8
          org.gradle.daemon=false
          """)

          # ── settings.gradle.kts ──────────────────────────────────────────────
          w("settings.gradle.kts", """pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "Omni"
          include(":app")
          """)

          # ── build.gradle.kts (root) ──────────────────────────────────────────
          w("build.gradle.kts", """plugins {
              id("com.android.application") version "8.2.2" apply false
              id("org.jetbrains.kotlin.android") version "1.9.22" apply false
          }
          """)

          # ── app/build.gradle.kts ─────────────────────────────────────────────
          w("app/build.gradle.kts", """plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
          }
          android {
              namespace = "com.omni.tts"
              compileSdk = 34
              ndkVersion = "25.1.8937393"
              defaultConfig {
                  applicationId = "com.omni.tts"
                  minSdk = 24
                  targetSdk = 34
                  versionCode = 1
                  versionName = "16.0"
                  externalNativeBuild {
                      cmake {
                          cppFlags += listOf("-std=c++17", "-Wno-narrowing", "-O3")
                          arguments += listOf("-DANDROID_STL=c++_shared")
                      }
                  }
                  ndk { abiFilters.addAll(listOf("armeabi-v7a", "arm64-v8a", "x86", "x86_64")) }
              }
              sourceSets { getByName("main") { java.srcDirs("src/main/java") } }
              buildFeatures { compose = true }
              composeOptions { kotlinCompilerExtensionVersion = "1.5.8" }
              externalNativeBuild { cmake { path = file("src/main/cpp/CMakeLists.txt"); version = "3.22.1" } }
              compileOptions { sourceCompatibility = JavaVersion.VERSION_17; targetCompatibility = JavaVersion.VERSION_17 }
              kotlinOptions { jvmTarget = "17" }
              packaging { resources { pickFirsts.add("**/libc++_shared.so") } }
          }
          dependencies {
              implementation("androidx.core:core-ktx:1.12.0")
              implementation("androidx.lifecycle:lifecycle-runtime-ktx:2.7.0")
              implementation("androidx.activity:activity-compose:1.8.2")
              val composeBom = platform("androidx.compose:compose-bom:2024.01.00")
              implementation(composeBom)
              implementation("androidx.compose.ui:ui")
              implementation("androidx.compose.ui:ui-graphics")
              implementation("androidx.compose.material3:material3")
              implementation("org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3")
          }
          """)

          # ── CMakeLists.txt ───────────────────────────────────────────────────
          w("app/src/main/cpp/CMakeLists.txt", """cmake_minimum_required(VERSION 3.18.1)
          project("omni_native")
          set(CLD2_DIR ${CMAKE_CURRENT_SOURCE_DIR}/cld2_src/internal)
          add_library(omni_core SHARED
              tts_engine_core.cpp
              ${CLD2_DIR}/cldutil.cc
              ${CLD2_DIR}/cldutil_shared.cc
              ${CLD2_DIR}/compact_lang_det.cc
              ${CLD2_DIR}/compact_lang_det_hint_code.cc
              ${CLD2_DIR}/compact_lang_det_impl.cc
              ${CLD2_DIR}/debug.cc
              ${CLD2_DIR}/fixunicodevalue.cc
              ${CLD2_DIR}/generated_entities.cc
              ${CLD2_DIR}/generated_language.cc
              ${CLD2_DIR}/generated_ulscript.cc
              ${CLD2_DIR}/getonescriptspan.cc
              ${CLD2_DIR}/lang_script.cc
              ${CLD2_DIR}/offsetmap.cc
              ${CLD2_DIR}/scoreonescriptspan.cc
              ${CLD2_DIR}/tote.cc
              ${CLD2_DIR}/utf8statetable.cc
              ${CLD2_DIR}/cld_generated_cjk_uni_prop_80.cc
              ${CLD2_DIR}/cld2_generated_cjk_compatible.cc
              ${CLD2_DIR}/cld_generated_cjk_delta_bi_4.cc
              ${CLD2_DIR}/generated_distinct_bi_0.cc
              ${CLD2_DIR}/cld2_generated_quadchrome_2.cc
              ${CLD2_DIR}/cld2_generated_deltaoctachrome.cc
              ${CLD2_DIR}/cld2_generated_distinctoctachrome.cc
              ${CLD2_DIR}/cld_generated_score_quad_octa_2.cc
          )
          target_include_directories(omni_core PRIVATE ${CLD2_DIR}/../public ${CLD2_DIR})
          find_library(log-lib log)
          target_link_libraries(omni_core ${log-lib})
          """)

          # ── tts_engine_core.cpp ──────────────────────────────────────────────
          w("app/src/main/cpp/tts_engine_core.cpp", r"""
          #include <jni.h>
          #include <string>
          #include <cstring>
          #include <vector>
          #include <unordered_map>
          #include <unordered_set>
          #include "compact_lang_det.h"

          struct BlockDef { int start; int end; const char* lang; };
          static const BlockDef SCRIPT_BLOCKS[] = {
              {0x0900, 0x097F, "hi"}, {0x0980, 0x09FF, "bn"}, {0x0A00, 0x0A7F, "pa"},
              {0x0A80, 0x0AFF, "gu"}, {0x0B00, 0x0B7F, "or"}, {0x0B80, 0x0BFF, "ta"},
              {0x0C00, 0x0C7F, "te"}, {0x0C80, 0x0CFF, "kn"}, {0x0D00, 0x0D7F, "ml"},
              {0x0D80, 0x0DFF, "si"}, {0x0E00, 0x0E7F, "th"}, {0x0600, 0x06FF, "ar"},
              {0x3040, 0x30FF, "ja"}, {0x1100, 0x11FF, "ko"}, {0x4E00, 0x9FFF, "zh"},
              {0x0400, 0x04FF, "ru"}, {0x0500, 0x052F, "ru"}, {0xAC00, 0xD7AF, "ko"},
              {0, 0, nullptr}
          };

          inline int utf8ToCodepoint(const unsigned char* p, int& len) {
              if (p[0] < 0x80)               { len=1; return p[0]; }
              if ((p[0]&0xE0)==0xC0)          { len=2; return ((p[0]&0x1F)<<6)|(p[1]&0x3F); }
              if ((p[0]&0xF0)==0xE0)          { len=3; return ((p[0]&0x0F)<<12)|((p[1]&0x3F)<<6)|(p[2]&0x3F); }
              if ((p[0]&0xF8)==0xF0)          { len=4; return ((p[0]&0x07)<<18)|((p[1]&0x3F)<<12)|((p[2]&0x3F)<<6)|(p[3]&0x3F); }
              len=1; return p[0];
          }

          inline void codepointToUtf8(int cp, std::string& out) {
              if (cp<=0x7F)     { out+=(char)cp; }
              else if(cp<=0x7FF){ out+=(char)((cp>>6)|0xC0); out+=(char)((cp&0x3F)|0x80); }
              else if(cp<=0xFFFF){ out+=(char)((cp>>12)|0xE0); out+=(char)(((cp>>6)&0x3F)|0x80); out+=(char)((cp&0x3F)|0x80); }
              else              { out+=(char)((cp>>18)|0xF0); out+=(char)(((cp>>12)&0x3F)|0x80); out+=(char)(((cp>>6)&0x3F)|0x80); out+=(char)((cp&0x3F)|0x80); }
          }

          inline char mathUnicodeToAscii(int cp) {
              if(cp>=0x1D400&&cp<=0x1D419) return 'A'+(cp-0x1D400);
              if(cp>=0x1D434&&cp<=0x1D44D) return 'A'+(cp-0x1D434);
              if(cp>=0x1D468&&cp<=0x1D481) return 'A'+(cp-0x1D468);
              if(cp>=0x1D5A0&&cp<=0x1D5B9) return 'A'+(cp-0x1D5A0);
              if(cp>=0x1D670&&cp<=0x1D689) return 'A'+(cp-0x1D670);
              if(cp>=0x1D41A&&cp<=0x1D433) return 'a'+(cp-0x1D41A);
              if(cp>=0x1D44E&&cp<=0x1D467) return 'a'+(cp-0x1D44E);
              if(cp>=0x1D482&&cp<=0x1D49B) return 'a'+(cp-0x1D482);
              if(cp>=0x1D5BA&&cp<=0x1D5D3) return 'a'+(cp-0x1D5BA);
              if(cp>=0x1D68A&&cp<=0x1D6A3) return 'a'+(cp-0x1D68A);
              if(cp>=0xFF21&&cp<=0xFF3A)   return 'A'+(cp-0xFF21);
              if(cp>=0xFF41&&cp<=0xFF5A)   return 'a'+(cp-0xFF41);
              if(cp>=0x1D7CE&&cp<=0x1D7D7) return '0'+(cp-0x1D7CE);
              if(cp>=0xFF10&&cp<=0xFF19)   return '0'+(cp-0xFF10);
              return 0;
          }

          inline bool isEmoji(int cp) {
              return (cp>=0x1F300&&cp<=0x1F9FF)||(cp>=0x2600&&cp<=0x27BF)||
                     (cp>=0x2300&&cp<=0x23FF)||(cp>=0x2B50&&cp<=0x2B55)||
                     (cp>=0xFE00&&cp<=0xFE0F)||(cp>=0x1FA00&&cp<=0x1FAFF)||
                     (cp>=0x1F1E0&&cp<=0x1F1FF)||cp==0x200D||cp==0xFE0F;
          }

          inline bool isPunct(int cp) {
              return cp=='.'||cp=='!'||cp=='?'||cp==','||cp==';'||cp==':'||cp=='-'||cp=='*'||cp=='_';
          }

          static std::string normalizeText(const std::string& input,
                                            bool keepEmoji, bool countEmoji, bool countPunct) {
              std::string result;
              result.reserve(input.size());
              int i=0, len=(int)input.size();
              while(i<len) {
                  int clen=0;
                  int cp=utf8ToCodepoint((const unsigned char*)&input[i], clen);
                  char ascii=mathUnicodeToAscii(cp);
                  if(ascii){ result+=ascii; i+=clen; continue; }
                  if(isEmoji(cp)) {
                      if(!keepEmoji){ i+=clen; continue; }
                      int eCount=1, j=i+clen;
                      while(j<len){ int nl=0; int nc=utf8ToCodepoint((const unsigned char*)&input[j],nl); if(nc==cp){eCount++;j+=nl;}else break; }
                      if(countEmoji&&eCount>1) result+=std::to_string(eCount)+" ";
                      for(int k=0;k<eCount;k++) codepointToUtf8(cp,result);
                      i=j; continue;
                  }
                  if(isPunct(cp)&&countPunct) {
                      int pCount=1, j=i+clen;
                      while(j<len){ int nl=0; int nc=utf8ToCodepoint((const unsigned char*)&input[j],nl); if(nc==cp){pCount++;j+=nl;}else break; }
                      if(pCount>1) result+=std::to_string(pCount)+" ";
                      codepointToUtf8(cp,result);
                      i=j; continue;
                  }
                  codepointToUtf8(cp,result);
                  i+=clen;
              }
              return result;
          }

          static std::string applyDictionary(std::string text,
                                              const std::vector<std::string>& keys,
                                              const std::vector<std::string>& vals) {
              for(size_t i=0;i<keys.size();i++){
                  if(keys[i].empty()) continue;
                  size_t pos=0;
                  while((pos=text.find(keys[i],pos))!=std::string::npos){
                      text.replace(pos,keys[i].size(),vals[i]);
                      pos+=vals[i].size();
                  }
              }
              return text;
          }

          static const char* scriptLookup(int cp) {
              for(int i=0; SCRIPT_BLOCKS[i].lang; i++)
                  if(cp>=SCRIPT_BLOCKS[i].start && cp<=SCRIPT_BLOCKS[i].end)
                      return SCRIPT_BLOCKS[i].lang;
              return nullptr;
          }

          static std::string detectLang(const std::string& text,
                                         const std::string& latFall,
                                         const std::string& nonLatFall) {
              bool is_rel=false;
              CLD2::Language lang=CLD2::DetectLanguage(text.c_str(),(int)text.size(),true,&is_rel);
              const char* code=CLD2::LanguageCode(lang);
              if(code&&strlen(code)>=2&&strcmp(code,"un")!=0) return std::string(code);
              int i=0; int len=(int)text.size(); bool hasNonLatin=false;
              while(i<len){
                  int clen=0;
                  int cp=utf8ToCodepoint((const unsigned char*)&text[i],clen);
                  if(cp>0x02AF&&!(cp>=0x1E00&&cp<=0x1EFF)){
                      hasNonLatin=true;
                      const char* sl=scriptLookup(cp);
                      if(sl) return std::string(sl);
                  }
                  i+=clen;
              }
              return hasNonLatin ? nonLatFall : latFall;
          }

          struct ChunkResult { std::string lang; std::string text; };

          // Auto mode: detect language per sentence, merge consecutive same-lang sentences
          static std::vector<ChunkResult> buildAutoChunks(
              const std::vector<std::string>& sentences,
              const std::string& latFall,
              const std::string& nonLatFall)
          {
              std::vector<ChunkResult> chunks;
              std::string curLang="", batch="";
              for(auto& s: sentences){
                  if(s.empty()) continue;
                  std::string sl=detectLang(s,latFall,nonLatFall);
                  if(curLang.empty()){ curLang=sl; }
                  if(sl!=curLang){
                      if(!batch.empty()) chunks.push_back({curLang,batch});
                      batch=s; curLang=sl;
                  } else {
                      if(!batch.empty()&&batch.back()!=' '&&batch.back()!='\n') batch+=' ';
                      batch+=s;
                  }
              }
              if(!batch.empty()) chunks.push_back({curLang,batch});
              return chunks;
          }

          // Mix Language mode: every sentence is its own chunk with its own detected language
          static std::vector<ChunkResult> buildMixChunks(
              const std::vector<std::string>& sentences,
              const std::string& latFall,
              const std::string& nonLatFall)
          {
              std::vector<ChunkResult> chunks;
              for(auto& s: sentences){
                  if(s.empty()) continue;
                  std::string sl=detectLang(s,latFall,nonLatFall);
                  chunks.push_back({sl,s});
              }
              return chunks;
          }

          extern "C" JNIEXPORT jstring JNICALL
          Java_com_omni_tts_NativeEngine_processDirect(
              JNIEnv* env, jobject,
              jobject directBuffer, jint length,
              jobjectArray jKeys, jobjectArray jVals,
              jboolean keepEmoji, jboolean countEmoji, jboolean countPunct,
              jstring jLat, jstring jNonLat,
              jstring jMode)
          {
              if(!directBuffer||length<=0) return env->NewStringUTF("");
              void* buf=env->GetDirectBufferAddress(directBuffer);
              if(!buf) return env->NewStringUTF("");
              std::string rawInput((const char*)buf,(size_t)length);

              const char* latC=env->GetStringUTFChars(jLat,nullptr);
              std::string latFall(latC); env->ReleaseStringUTFChars(jLat,latC);
              const char* nonLatC=env->GetStringUTFChars(jNonLat,nullptr);
              std::string nonLatFall(nonLatC); env->ReleaseStringUTFChars(jNonLat,nonLatC);

              std::vector<std::string> keys,vals;
              int dictSize=env->GetArrayLength(jKeys);
              for(int i=0;i<dictSize;i++){
                  jstring jk=(jstring)env->GetObjectArrayElement(jKeys,i);
                  const char* kc=env->GetStringUTFChars(jk,nullptr);
                  keys.push_back(kc); env->ReleaseStringUTFChars(jk,kc); env->DeleteLocalRef(jk);
                  jstring jv=(jstring)env->GetObjectArrayElement(jVals,i);
                  const char* vc=env->GetStringUTFChars(jv,nullptr);
                  vals.push_back(vc); env->ReleaseStringUTFChars(jv,vc); env->DeleteLocalRef(jv);
              }

              std::vector<std::string> sentences;
              size_t start=0, end=rawInput.find('\0');
              while(end!=std::string::npos){ sentences.push_back(rawInput.substr(start,end-start)); start=end+1; end=rawInput.find('\0',start); }
              if(start<rawInput.size()) sentences.push_back(rawInput.substr(start));

              std::vector<std::string> processed;
              processed.reserve(sentences.size());
              for(auto& s: sentences){
                  if(s.empty()){ processed.push_back(""); continue; }
                  auto d=applyDictionary(s,keys,vals);
                  d=normalizeText(d,keepEmoji,countEmoji,countPunct);
                  processed.push_back(d);
              }

              const char* modeC=env->GetStringUTFChars(jMode,nullptr);
              std::string mode(modeC); env->ReleaseStringUTFChars(jMode,modeC);

              std::string result;
              if(mode=="single"){
                  // Single mode: treat all text as one chunk, use latin fallback lang
                  std::string combined;
                  for(auto& p: processed){ if(!p.empty()){ if(!combined.empty()) combined+=' '; combined+=p; } }
                  if(!combined.empty()) result=latFall+"|"+combined;
              } else if(mode=="mix"){
                  // Mix Language mode: each sentence = separate chunk with its own TTS
                  auto chunks=buildMixChunks(processed,latFall,nonLatFall);
                  for(size_t i=0;i<chunks.size();i++){
                      result+=chunks[i].lang+"|"+chunks[i].text;
                      if(i+1<chunks.size()) result+="||";
                  }
              } else {
                  // Auto mode (default): detect language, merge consecutive same-lang sentences
                  auto chunks=buildAutoChunks(processed,latFall,nonLatFall);
                  for(size_t i=0;i<chunks.size();i++){
                      result+=chunks[i].lang+"|"+chunks[i].text;
                      if(i+1<chunks.size()) result+="||";
                  }
              }
              return env->NewStringUTF(result.c_str());
          }
          """)

          # ── NativeEngine.kt ──────────────────────────────────────────────────
          w("app/src/main/java/com/omni/tts/NativeEngine.kt", """package com.omni.tts
          import java.nio.ByteBuffer
          object NativeEngine {
              init { System.loadLibrary("omni_core") }
              external fun processDirect(
                  buffer: ByteBuffer, length: Int,
                  keys: Array<String>, vals: Array<String>,
                  keepEmoji: Boolean, countEmoji: Boolean, countPunct: Boolean,
                  latFall: String, nonLatFall: String,
                  mode: String
              ): String
          }
          """)

          # ── Languages.kt ─────────────────────────────────────────────────────
          w("app/src/main/java/com/omni/tts/Languages.kt", """package com.omni.tts
          object Languages {
              val map = linkedMapOf(
                  "af" to "Afrikaans", "sq" to "Albanian", "ar" to "Arabic", "hy" to "Armenian",
                  "az" to "Azerbaijani", "eu" to "Basque", "be" to "Belarusian", "bn" to "Bengali",
                  "bs" to "Bosnian", "bg" to "Bulgarian", "ca" to "Catalan", "zh" to "Chinese",
                  "hr" to "Croatian", "cs" to "Czech", "da" to "Danish", "nl" to "Dutch",
                  "en" to "English", "et" to "Estonian", "fi" to "Finnish", "fr" to "French",
                  "gl" to "Galician", "ka" to "Georgian", "de" to "German", "el" to "Greek",
                  "gu" to "Gujarati", "he" to "Hebrew", "hi" to "Hindi", "hu" to "Hungarian",
                  "is" to "Icelandic", "id" to "Indonesian", "ga" to "Irish", "it" to "Italian",
                  "ja" to "Japanese", "jv" to "Javanese", "kn" to "Kannada", "kk" to "Kazakh",
                  "km" to "Khmer", "ko" to "Korean", "lo" to "Lao", "lv" to "Latvian",
                  "lt" to "Lithuanian", "mk" to "Macedonian", "ms" to "Malay", "ml" to "Malayalam",
                  "mt" to "Maltese", "mr" to "Marathi", "mn" to "Mongolian", "ne" to "Nepali",
                  "no" to "Norwegian", "fa" to "Persian", "pl" to "Polish", "pt" to "Portuguese",
                  "pa" to "Punjabi", "ro" to "Romanian", "ru" to "Russian", "sr" to "Serbian",
                  "si" to "Sinhalese", "sk" to "Slovak", "sl" to "Slovenian", "so" to "Somali",
                  "es" to "Spanish", "su" to "Sundanese", "sw" to "Swahili", "sv" to "Swedish",
                  "ta" to "Tamil", "te" to "Telugu", "th" to "Thai", "tr" to "Turkish",
                  "uk" to "Ukrainian", "ur" to "Urdu", "uz" to "Uzbek", "vi" to "Vietnamese",
                  "cy" to "Welsh", "yo" to "Yoruba", "zu" to "Zulu"
              )
              val isoCodes = map.keys.toList()
              val displayNames = isoCodes.map { "${map[it]} ($it)" }
          }
          """)

          # ── VhLogger.kt ──────────────────────────────────────────────────────
          w("app/src/main/java/com/omni/tts/VhLogger.kt", """package com.omni.tts
          import android.content.Context
          import android.util.Log
          import java.io.BufferedWriter
          import java.io.File
          import java.io.FileWriter
          import java.io.IOException
          import java.text.SimpleDateFormat
          import java.util.Date
          import java.util.LinkedList
          import java.util.Locale
          import java.util.concurrent.ConcurrentHashMap
          import java.util.concurrent.atomic.AtomicLong
          object VhLogger {
              private const val TAG = "OMNI-NATIVE"
              private const val MAX_LINES = 5000
              private val buffer = LinkedList<String>()
              private val sdf = SimpleDateFormat("MM-dd HH:mm:ss.SSS", Locale.US)
              private var appContext: Context? = null
              private val lastSynthStart = AtomicLong(0)
              private val firstAudioPerChunk = ConcurrentHashMap<Int, Long>()
              fun init(ctx: Context) { appContext = ctx.applicationContext }
              @Synchronized private fun write(level: String, msg: String) {
                  val line = "${sdf.format(Date())} $level/$TAG: $msg"
                  Log.d(TAG, msg); buffer.addLast(line); if (buffer.size > MAX_LINES) buffer.removeFirst()
              }
              fun d(msg: String) = write("D", msg)
              fun w(msg: String) = write("W", msg)
              fun e(msg: String) = write("E", msg)
              fun i(msg: String) = write("I", msg)
              fun markSynthStart(chunkText: String, lang: String, chunkIndex: Int): Long {
                  val t = System.currentTimeMillis()
                  lastSynthStart.set(t)
                  firstAudioPerChunk.remove(chunkIndex)
                  write("D", "[CHUNK-$chunkIndex] lang=$lang len=${chunkText.length} text=${chunkText.take(50)}")
                  write("D", "[CHUNK-$chunkIndex] synthesizeToFile START")
                  return t
              }
              fun markSynthEnd(chunkIndex: Int, startTime: Long) = write("D", "[CHUNK-$chunkIndex] synthesizeToFile DONE in ${System.currentTimeMillis()-startTime}ms")
