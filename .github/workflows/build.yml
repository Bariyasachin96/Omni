        cat > app/src/main/kotlin/com/omni/tts/LiveStreamProcessor.kt << 'EOF'
package com.omni.tts
import android.content.Context
import android.media.AudioFormat
import android.os.Bundle
import android.os.Process
import android.speech.tts.SynthesisCallback
import android.speech.tts.TextToSpeech
import android.speech.tts.UtteranceProgressListener
import java.io.File
import java.io.FileInputStream
import java.util.concurrent.CountDownLatch
import java.util.concurrent.atomic.AtomicBoolean

object LiveStreamProcessor {

    // Smart Resampler: 16-bit PCM linear interpolation — no pitch change
    private fun resample16(src: ByteArray, srcLen: Int, srcRate: Int, dstRate: Int): ByteArray? {
        if (srcRate == dstRate || srcLen < 2) return null
        val srcSamples = srcLen / 2
        val dstSamples = (srcSamples.toLong() * dstRate / srcRate).toInt()
        if (dstSamples <= 0) return null
        val dst = ByteArray(dstSamples * 2)
        val ratio = srcRate.toDouble() / dstRate
        for (i in 0 until dstSamples) {
            val pos = i * ratio
            val i0 = pos.toInt().coerceIn(0, srcSamples - 1)
            val i1 = (i0 + 1).coerceIn(0, srcSamples - 1)
            val s0 = (src[i0*2].toInt() and 0xFF) or (src[i0*2+1].toInt() shl 8)
            val s1 = (src[i1*2].toInt() and 0xFF) or (src[i1*2+1].toInt() shl 8)
            val frac = pos - i0
            val out = (s0 + frac * (s1 - s0)).toInt()
            dst[i*2] = (out and 0xFF).toByte()
            dst[i*2+1] = ((out shr 8) and 0xFF).toByte()
        }
        return dst
    }

    fun process(
        context: Context,
        tts: TextToSpeech,
        text: String,
        callback: SynthesisCallback,
        cbStarted: BooleanArray,
        targetSampleRate: IntArray, // [0] = master rate set by first chunk
        isStopped: AtomicBoolean,
        chunkIndex: Int = 0
    ): Boolean {
        Process.setThreadPriority(Process.THREAD_PRIORITY_URGENT_AUDIO)
        val tmp = File(context.cacheDir, "omni_${System.nanoTime()}.wav")
        var pipe: FileInputStream? = null

        try {
            val latch = CountDownLatch(1)
            var synthError = false
            tts.setOnUtteranceProgressListener(object : UtteranceProgressListener() {
                override fun onStart(id: String) {}
                override fun onDone(id: String) { latch.countDown() }
                override fun onError(id: String) { synthError = true; latch.countDown() }
                override fun onError(id: String, errorCode: Int) { synthError = true; latch.countDown() }
            })

            val params = Bundle()
            if (tts.synthesizeToFile(text, params, tmp, "omni_$chunkIndex") != TextToSpeech.SUCCESS)
                return isStopped.get()

            if (synthError) return isStopped.get()

            var headerParsed = false
            var bytesRead = 0L
            var wavInfo: WavUtils.WavInfo? = null
            var chunkRate = 0

            while (!isStopped.get() && (latch.count > 0 || tmp.length() > bytesRead)) {
                if (isStopped.get()) { tts.stop(); break }

                if (!headerParsed) {
                    if (tmp.exists() && tmp.length() >= 44) {
                        try {
                            pipe = FileInputStream(tmp)
                            val info = WavUtils.parse(pipe)
                            bytesRead = info.dataOffset.toLong()
                            pipe.channel.position(bytesRead)
                            wavInfo = info
                            chunkRate = info.sampleRate
                            if (!cbStarted[0]) {
                                targetSampleRate[0] = info.sampleRate
                                val enc = if (info.bitsPerSample == 8)
                                    AudioFormat.ENCODING_PCM_8BIT
                                else AudioFormat.ENCODING_PCM_16BIT
                                callback.start(targetSampleRate[0], enc, info.channels)
                                cbStarted[0] = true
                            }
                            headerParsed = true
                        } catch (_: Exception) { pipe?.close(); pipe = null; Thread.sleep(1); continue }
                    } else { Thread.sleep(0); continue }
                }

                if (headerParsed) {
                    val avail = tmp.length() - bytesRead
                    if (avail > 0 && pipe != null) {
                        val buf = ByteArray(minOf(2048L, avail).toInt())
                        val r = pipe.read(buf)
                        if (r > 0) {
                            // Resample if engine sample rate != master rate
                            if (wavInfo?.bitsPerSample == 16
                                    && chunkRate != targetSampleRate[0]
                                    && targetSampleRate[0] > 0) {
                                val rs = resample16(buf, r, chunkRate, targetSampleRate[0])
                                if (rs != null) callback.audioAvailable(rs, 0, rs.size)
                                else callback.audioAvailable(buf, 0, r)
                            } else {
                                callback.audioAvailable(buf, 0, r)
                            }
                            bytesRead += r
                        } else Thread.sleep(1)
                    } else Thread.sleep(1)
                }
            }
        } finally {
            pipe?.close()
            if (tmp.exists()) tmp.delete()
        }
        return isStopped.get()
    }
}
EOF

        cat > app/src/main/kotlin/com/omni/tts/TextSplitter.kt << 'EOF'
package com.omni.tts

data class Chunk(val text: String, val iso: String)

// Golden Rule: split ONLY on script/language change — punctuation stays with chunk
object TextSplitter {

    private fun scriptOfCp(cp: Int): String? {
        if (cp <= 0x20) return null          // whitespace/control = neutral
        if (cp < 0x80) return if (cp in 0x21..0x7E && !Character.isLetter(cp) && !Character.isDigit(cp))
            null else "latin"                // ASCII punct = neutral, letters = latin
        if (cp <= 0x036F) return "latin"     // Latin Extended
        if (cp in 0x0900..0x097F) return "hi"
        if (cp in 0x0980..0x09FF) return "bn"
        if (cp in 0x0A00..0x0A7F) return "pa"
        if (cp in 0x0A80..0x0AFF) return "gu"
        if (cp in 0x0B00..0x0B7F) return "or"
        if (cp in 0x0B80..0x0BFF) return "ta"
        if (cp in 0x0C00..0x0C7F) return "te"
        if (cp in 0x0C80..0x0CFF) return "kn"
        if (cp in 0x0D00..0x0D7F) return "ml"
        if (cp in 0x0D80..0x0DFF) return "si"
        if (cp in 0x0E00..0x0E7F) return "th"
        if (cp in 0x0E80..0x0EFF) return "lo"
        if (cp in 0x0F00..0x0FFF) return "bo"
        if (cp in 0x1000..0x109F) return "my"
        if (cp in 0x10A0..0x10FF) return "ka"
        if (cp in 0x1100..0x11FF || cp in 0xAC00..0xD7AF) return "ko"
        if (cp in 0x1200..0x137F) return "am"
        if (cp in 0x0600..0x06FF || cp in 0xFB50..0xFEFF) return "ar"
        if (cp in 0x0590..0x05FF) return "he"
        if (cp in 0x0400..0x04FF) return "ru"
        if (cp in 0x0370..0x03FF) return "el"
        if (cp in 0x0530..0x058F) return "hy"
        if (cp in 0x1780..0x17FF) return "km"
        if (cp in 0x1800..0x18AF) return "mn"
        if (cp in 0x4E00..0x9FFF || cp in 0x3400..0x4DBF) return "zh"
        if (cp in 0x3040..0x30FF) return "ja"
        return "latin" // fallback
    }

    // ISO → language name (for engine lookup)
    fun isoToLang(iso: String): String? = when (iso) {
        "hi" -> "Hindi"; "bn" -> "Bengali"; "pa" -> "Punjabi"
        "gu" -> "Gujarati"; "or" -> "Oriya"; "ta" -> "Tamil"
        "te" -> "Telugu"; "kn" -> "Kannada"; "ml" -> "Malayalam"
        "si" -> "Sinhalese"; "th" -> "Thai"; "lo" -> "Lao"
        "bo" -> "Tibetan"; "my" -> "Burmese"; "ka" -> "Georgian"
        "ko" -> "Korean"; "am" -> "Amharic"; "ar" -> "Arabic"
        "he" -> "Hebrew"; "ru" -> "Russian"; "el" -> "Greek"
        "hy" -> "Armenian"; "km" -> "Khmer"; "mn" -> "Mongolian"
        "zh" -> "Chinese"; "ja" -> "Japanese"; "en" -> "English"
        "fr" -> "French"; "de" -> "German"; "es" -> "Spanish"
        "pt" -> "Portuguese"; "it" -> "Italian"; "nl" -> "Dutch"
        else -> null
    }

    fun split(text: String, latinFallback: String, nonLatinFallback: String): List<Chunk> {
        if (text.isBlank()) return emptyList()
        val chunks = mutableListOf<Chunk>()
        val batch = StringBuilder()
        val neutral = StringBuilder()
        var curScript: String? = null

        var i = 0
        while (i < text.length) {
            val cp = text.codePointAt(i)
            val script = scriptOfCp(cp)
            if (script == null) {
                neutral.appendCodePoint(cp)
                i += Character.charCount(cp)
                continue
            }
            if (curScript == null) {
                curScript = script
                batch.append(neutral); neutral.clear()
                batch.appendCodePoint(cp)
            } else if (script == curScript) {
                batch.append(neutral); neutral.clear()
                batch.appendCodePoint(cp)
            } else {
                // Script boundary — flush with trailing neutral
                batch.append(neutral); neutral.clear()
                flushChunk(chunks, batch, curScript, latinFallback, nonLatinFallback)
                curScript = script
                batch.appendCodePoint(cp)
            }
            i += Character.charCount(cp)
        }
        batch.append(neutral)
        flushChunk(chunks, batch, curScript, latinFallback, nonLatinFallback)
        return chunks
    }

    private fun flushChunk(chunks: MutableList<Chunk>, batch: StringBuilder,
            script: String?, latinFb: String, nonLatinFb: String) {
        val t = batch.toString().trim(); batch.clear()
        if (t.isEmpty()) return
        val iso = if (script == null || script == "latin") latinFb
                  else isoToLang(script) ?: nonLatinFb
        chunks.add(Chunk(t, iso))
    }
}
