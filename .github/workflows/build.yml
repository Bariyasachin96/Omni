          "                                    if(status == android.speech.tts.TextToSpeech.SUCCESS) {\n"
          "                                        tempTts?.setSpeechRate(rate/100f); tempTts?.setPitch(pitch/100f)\n"
          "                                        val p = android.os.Bundle(); p.putFloat(android.speech.tts.TextToSpeech.Engine.KEY_PARAM_VOLUME, vol/100f)\n"
          "                                        tempTts?.speak(\"Testing audio settings\", android.speech.tts.TextToSpeech.QUEUE_FLUSH, p, \"test\")\n"
          "                                    }\n"
          "                                }, if(pkg == \"NOT_SET\") null else pkg)\n"
          "                            }, modifier = Modifier.fillMaxWidth()) { Text(\"TEST AUDIO\") }\n"
          "                            Spacer(modifier = Modifier.height(12.dp))\n"
          "                            Button(onClick = { prefs.setInt(\"rate_$currentKey\", rate); prefs.setInt(\"pitch_$currentKey\", pitch); prefs.setInt(\"vol_$currentKey\", vol); prefs.setReadingMode(targetMode); Toast.makeText(context, \"Settings Applied & Mode Activated!\", Toast.LENGTH_SHORT).show() }, modifier = Modifier.fillMaxWidth(), colors = ButtonDefaults.buttonColors(containerColor = MaterialTheme.colorScheme.secondary)) { Text(\"APPLY SETTINGS\") }\n"
          "                            Spacer(modifier = Modifier.height(12.dp))\n"
          "                            Button(onClick = { rate=100; pitch=100; vol=100 }, modifier = Modifier.fillMaxWidth(), colors = ButtonDefaults.buttonColors(containerColor = MaterialTheme.colorScheme.surfaceVariant, contentColor = MaterialTheme.colorScheme.onSurfaceVariant)) { Text(\"RESET TO DEFAULT\") }\n"
          "                        }\n"
          "                    }\n"
          "                }\n"
          "            }\n"
          "        }\n"
          "    }\n"
          "    override fun onDestroy() { tempTts?.shutdown(); tempTts2?.shutdown(); super.onDestroy() }\n"
          "}\n")

