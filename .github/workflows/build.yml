import kotlinx.coroutines.launch
import kotlinx.coroutines.withContext
import java.util.Locale
import java.util.concurrent.CountDownLatch
import java.util.concurrent.TimeUnit

class MainActivity : ComponentActivity() {

    private var tempTts: TextToSpeech? = null

    @OptIn(ExperimentalMaterial3Api::class)
    override fun onCreate(savedInstanceState: Bundle?) {
        super.onCreate(savedInstanceState)
        val prefs = SharedPrefsManager(this)
        setContent {
            MaterialTheme {
                Surface(modifier = Modifier.fillMaxSize()) {
                    OmniSetupScreen(prefs)
                }
            }
        }
    }

    override fun onDestroy() { tempTts?.shutdown(); super.onDestroy() }

    @OptIn(ExperimentalMaterial3Api::class)
    @Composable
    fun OmniSetupScreen(prefs: SharedPrefsManager) {
        val context = LocalContext.current
        val scope = rememberCoroutineScope()
        val engines = remember { EngineFinder.getEngines(context) }
        val langList = remember {
            OmniTtsService.LANGUAGES.map { "${it.key} (${it.value})" }.sorted()
        }

        var selLang by remember {
            mutableStateOf(langList.find { it.contains("(en)") } ?: langList[0])
        }
        val isoCode get() = selLang.substringAfter("(").substringBefore(")")

        var selEngPkg by remember { mutableStateOf(prefs.engineForLang(isoCode)) }
        val selEngName = engines.find { it.pkg == selEngPkg }?.name ?: "Not Set"

        // Rate/pitch stored as 0.1–5.0 multiplier (boost on top of TalkBack)
        // Seekbar: 1–500, default 100 = 1.0x (no boost)
        var rateProgress by remember {
            mutableIntStateOf((prefs.getFloat(prefs.rateKey(isoCode, selEngPkg), 1f) * 100).toInt())
        }
        var pitchProgress by remember {
            mutableIntStateOf((prefs.getFloat(prefs.pitchKey(isoCode, selEngPkg), 1f) * 100).toInt())
        }

        var availLocales by remember { mutableStateOf(listOf<Locale>()) }
        var selLocTag by remember { mutableStateOf(prefs.getString(prefs.locKey(isoCode, selEngPkg))) }

        var latinFb    by remember { mutableStateOf(prefs.getString("latin_fallback",    "en")) }
        var nonLatinFb by remember { mutableStateOf(prefs.getString("nonlatin_fallback", "hi")) }

        var langExp    by remember { mutableStateOf(false) }
        var engExp     by remember { mutableStateOf(false) }
        var locExp     by remember { mutableStateOf(false) }
        var latExp     by remember { mutableStateOf(false) }
        var nonLatExp  by remember { mutableStateOf(false) }

        // Load voices when engine/language changes
        LaunchedEffect(selEngPkg, isoCode) {
            if (selEngPkg != "NOT_SET") {
                withContext(Dispatchers.IO) {
                    val latch = CountDownLatch(1)
                    var voices: List<Locale>? = null
                    val t = TextToSpeech(context, { status ->
                        if (status == TextToSpeech.SUCCESS) {
                            voices = try {
                                tempTts?.voices
                                    ?.map { it.locale }
                                    ?.filter { it.language.equals(isoCode, true) }
                                    ?.distinctBy { it.toLanguageTag() }
                                    ?.sortedBy { it.displayName }
                            } catch (_: Exception) { null }
                        }
                        latch.countDown()
                    }, selEngPkg)
                    tempTts?.shutdown(); tempTts = t
                    latch.await(4, TimeUnit.SECONDS)
                    withContext(Dispatchers.Main) { availLocales = voices ?: listOf() }
                }
            } else { availLocales = listOf() }
        }

        Column(
            modifier = Modifier
                .padding(16.dp)
                .verticalScroll(rememberScrollState())
        ) {
            Text("Omni TTS Setup",
                style = MaterialTheme.typography.headlineMedium,
                modifier = Modifier.semantics { contentDescription = "Omni TTS Setup Screen" })
            Spacer(Modifier.height(24.dp))

            // ── Language dropdown ─────────────────────────────────────────
            ExposedDropdownMenuBox(
                expanded = langExp,
                onExpandedChange = { langExp = !langExp },
                modifier = Modifier.semantics { contentDescription = "Language selector" }
            ) {
                OutlinedTextField(
                    value = selLang, onValueChange = {}, readOnly = true,
                    label = { Text("Language") },
                    trailingIcon = { ExposedDropdownMenuDefaults.TrailingIcon(langExp) },
                    modifier = Modifier.fillMaxWidth().menuAnchor()
                        .semantics { contentDescription = "Selected language: $selLang" }
                )
                ExposedDropdownMenu(expanded = langExp, onDismissRequest = { langExp = false }) {
                    langList.forEach { lang ->
                        DropdownMenuItem(
                            text = { Text(lang) },
                            modifier = Modifier.semantics { contentDescription = lang },
                            onClick = {
                                selLang = lang
                                val iso = lang.substringAfter("(").substringBefore(")")
                                selEngPkg = prefs.engineForLang(iso)
                                rateProgress  = (prefs.getFloat(prefs.rateKey(iso, selEngPkg), 1f) * 100).toInt()
                                pitchProgress = (prefs.getFloat(prefs.pitchKey(iso, selEngPkg), 1f) * 100).toInt()
                                selLocTag = prefs.getString(prefs.locKey(iso, selEngPkg))
                                langExp = false
                            })
                    }
                }
            }
            Spacer(Modifier.height(12.dp))

            // ── Engine dropdown ───────────────────────────────────────────
            ExposedDropdownMenuBox(
                expanded = engExp,
                onExpandedChange = { engExp = !engExp },
                modifier = Modifier.semantics { contentDescription = "TTS Engine selector" }
            ) {
                OutlinedTextField(
                    value = selEngName, onValueChange = {}, readOnly = true,
                    label = { Text("TTS Engine") },
                    trailingIcon = { ExposedDropdownMenuDefaults.TrailingIcon(engExp) },
                    modifier = Modifier.fillMaxWidth().menuAnchor()
                        .semantics { contentDescription = "Selected engine: $selEngName" }
                )
                ExposedDropdownMenu(expanded = engExp, onDismissRequest = { engExp = false }) {
                    DropdownMenuItem(text = { Text("Not Set") },
                        modifier = Modifier.semantics { contentDescription = "Not Set, no engine" },
                        onClick = {
                            selEngPkg = "NOT_SET"
                            prefs.setEngineForLang(isoCode, "NOT_SET"); engExp = false
                        })
                    engines.forEach { e ->
                        DropdownMenuItem(
                            text = { Text(e.name) },
                            modifier = Modifier.semantics { contentDescription = "Engine: ${e.name}" },
                            onClick = {
                                selEngPkg = e.pkg
                                prefs.setEngineForLang(isoCode, e.pkg)
                                rateProgress  = (prefs.getFloat(prefs.rateKey(isoCode, e.pkg), 1f) * 100).toInt()
                                pitchProgress = (prefs.getFloat(prefs.pitchKey(isoCode, e.pkg), 1f) * 100).toInt()
                                selLocTag = prefs.getString(prefs.locKey(isoCode, e.pkg))
