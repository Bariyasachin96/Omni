        cat > app/src/main/java/com/omni/tts/CheckVoiceData.kt << 'EOF'
        package com.omni.tts
        import android.app.Activity
        import android.content.Intent
        import android.os.Bundle
        import android.speech.tts.TextToSpeech
        class CheckVoiceData : Activity() {
            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)
                val availableLocales = arrayListOf<String>()
                for (langName in LanguageDetector.getAllLanguages()) {
                    val loc = LanguageDetector.getLocale(langName)
                    var isoCode = loc.language
                    if (!loc.country.isNullOrEmpty()) isoCode += "-${loc.country}"
                    if (!availableLocales.contains(isoCode)) availableLocales.add(isoCode)
                }
                val data = Intent()
                data.putStringArrayListExtra(TextToSpeech.Engine.EXTRA_AVAILABLE_VOICES, availableLocales)
                data.putStringArrayListExtra(TextToSpeech.Engine.EXTRA_UNAVAILABLE_VOICES, ArrayList())
                setResult(TextToSpeech.Engine.CHECK_VOICE_DATA_PASS, data)
                finish()
            }
        }
