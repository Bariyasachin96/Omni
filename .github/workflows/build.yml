                )
                ExposedDropdownMenu(expanded = latExp, onDismissRequest = { latExp = false }) {
                    allIsos.forEach { lang ->
                        DropdownMenuItem(
                            text = { Text(lang) },
                            modifier = Modifier.semantics { contentDescription = lang },
                            onClick = {
