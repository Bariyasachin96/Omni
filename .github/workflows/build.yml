# ── VhLogger.kt ──────────────────────────────────────────────────────
# NOTE: synthesizeToFile log labels replaced with speak-based labels.
# markSynthStart/End labels updated; markHeaderFound/markFirstAudio removed
# since there is no WAV stream to parse in the new architecture.
w("app/src/main/java/com/omni/tts/VhLogger.kt", """package com.omni.tts
import android.content.Context
import android.util.Log
import java.io.BufferedWriter
import java.io.File
import java.io.FileWriter
import java.io.IOException
import java.text.SimpleDateFormat
import java.util.Date
import java.util.LinkedList
import java.util.Locale
import java.util.concurrent.ConcurrentHashMap
import java.util.concurrent.atomic.AtomicLong
object VhLogger {
    private const val TAG = "OMNI-NATIVE"
    private const val MAX_LINES = 5000
    private val buffer = LinkedList<String>()
    private val sdf = SimpleDateFormat("MM-dd HH:mm:ss.SSS", Locale.US)
    private var appContext: Context? = null
    private val lastSynthStart = AtomicLong(0)
    private val chunkStartTimes = ConcurrentHashMap<Int, Long>()
    fun init(ctx: Context) { appContext = ctx.applicationContext }
    @Synchronized private fun write(level: String, msg: String) {
        val line = "${sdf.format(Date())} $level/$TAG: $msg"
        Log.d(TAG, msg); buffer.addLast(line); if (buffer.size > MAX_LINES) buffer.removeFirst()
    }
    fun d(msg: String) = write("D", msg)
    fun w(msg: String) = write("W", msg)
    fun e(msg: String) = write("E", msg)
    fun i(msg: String) = write("I", msg)
    fun markSynthStart(chunkText: String, lang: String, chunkIndex: Int): Long {
        val t = System.currentTimeMillis()
        lastSynthStart.set(t)
        chunkStartTimes[chunkIndex] = t
        write("D", "[CHUNK-$chunkIndex] lang=$lang len=${chunkText.length} text=${chunkText.take(50)}")
        write("D", "[CHUNK-$chunkIndex] tts.speak START")
        return t
    }
    fun markSynthEnd(chunkIndex: Int, startTime: Long) =
        write("D", "[CHUNK-$chunkIndex] tts.speak DONE in ${System.currentTimeMillis()-startTime}ms")
    fun markSynthError(chunkIndex: Int, reason: String) = write("E", "[CHUNK-$chunkIndex] SYNTH ERROR: $reason")
    fun markEngineInit(lang: String, pkg: String, ms: Long) = write("D", "[ENGINE] init lang=$lang pkg=$pkg time=${ms}ms")
    fun markEngineReused(lang: String) = write("D", "[ENGINE] reused lang=$lang")
    fun markRequest(text: String, totalChunks: Int) = write("D", "[REQUEST] length=${text.length} chunks=$totalChunks text=${text.take(80)}")
    fun markStop() = write("D", "[STOP] onStop called")
    fun markFallback(det: String, fb: String) = write("W", "[FALLBACK] detected=$det -> using=$fb")
    fun markSkipped(reason: String) = write("W", "[SKIPPED] $reason")
    fun markMode(mode: String) = write("D", "[MODE] reading=$mode")
    @Synchronized @Throws(IOException::class) fun exportToFile(): File {
        val ctx = appContext ?: throw IOException("VhLogger not initialized")
        val f = File(ctx.cacheDir, "omni_tts_debug.txt")
        BufferedWriter(FileWriter(f, false)).use { bw ->
            bw.write("=== Omni Full Debug Log ===\\nTime: ${Date()}\\nDevice: ${android.os.Build.MODEL}\\nAndroid: ${android.os.Build.VERSION.RELEASE}\\nEntries: ${buffer.size}\\n============================\\n\\n")
            buffer.forEach { bw.write(it); bw.newLine() }
        }
        return f
    }
    @Synchronized fun clear() { buffer.clear() }
}
""")

