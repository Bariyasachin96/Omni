inline int utf8ToCodepoint(const unsigned char* p, int& len) {
    if (p[0] < 0x80)               { len=1; return p[0]; }
    if ((p[0]&0xE0)==0xC0)          { len=2; return ((p[0]&0x1F)<<6)|(p[1]&0x3F); }
    if ((p[0]&0xF0)==0xE0)          { len=3; return ((p[0]&0x0F)<<12)|((p[1]&0x3F)<<6)|(p[2]&0x3F); }
    if ((p[0]&0xF8)==0xF0)          { len=4; return ((p[0]&0x07)<<18)|((p[1]&0x3F)<<12)|((p[2]&0x3F)<<6)|(p[3]&0x3F); }
    len=1; return p[0];
}

inline void codepointToUtf8(int cp, std::string& out) {
    if (cp<=0x7F)     { out+=(char)cp; }
    else if(cp<=0x7FF){ out+=(char)((cp>>6)|0xC0); out+=(char)((cp&0x3F)|0x80); }
    else if(cp<=0xFFFF){ out+=(char)((cp>>12)|0xE0); out+=(char)(((cp>>6)&0x3F)|0x80); out+=(char)((cp&0x3F)|0x80); }
    else { out+=(char)((cp>>18)|0xF0); out+=(char)(((cp>>12)&0x3F)|0x80); out+=(char)(((cp>>6)&0x3F)|0x80); out+=(char)((cp&0x3F)|0x80); }
}

static const char* detectScriptBlock(int cp) {
    for (int i=0; SCRIPT_BLOCKS[i].lang!=nullptr; i++)
        if (cp>=SCRIPT_BLOCKS[i].start && cp<=SCRIPT_BLOCKS[i].end) return SCRIPT_BLOCKS[i].lang;
    return nullptr;
}

static bool isLatinLike(int cp) {
    return (cp>=0x0020&&cp<=0x007F)||(cp>=0x00A0&&cp<=0x024F)||(cp>=0x0250&&cp<=0x02AF)||(cp>=0x1E00&&cp<=0x1EFF);
}

static bool isIgnorable(int cp) {
    return (cp>=0x200B&&cp<=0x200F)||(cp>=0x2028&&cp<=0x202F)||(cp>=0xFE00&&cp<=0xFE0F)||(cp==0xFEFF);
}

struct LangChunk { std::string lang; std::string text; };

static std::string detectCLD2(const std::string& text) {
    bool reliable=false; int bytes=0;
    CLD2::Language lang=CLD2::DetectLanguage(text.c_str(),(int)text.size(),true,&reliable);
    if (lang==CLD2::UNKNOWN_LANGUAGE||!reliable) return "";
    const char* name=CLD2::LanguageCode(lang);
    return name?std::string(name):"";
}

static std::vector<LangChunk> buildAutoChunks(const std::vector<std::string>& sentences, const std::string& latFall, const std::string& nonLatFall) {
    std::vector<LangChunk> result;
    for (auto& s: sentences) {
        if (s.empty()) continue;
        std::string det=detectCLD2(s);
        std::string lang;
        if (!det.empty()) { lang=det; }
        else {
            bool hasNonLatin=false;
            const unsigned char* p=(const unsigned char*)s.c_str();
            size_t i=0;
            while(i<s.size()){
                int len=1; int cp=utf8ToCodepoint(p+i,len); i+=len;
                if(isIgnorable(cp)) continue;
                if(!isLatinLike(cp)&&cp>0x007F){ hasNonLatin=true; break; }
            }
            lang=hasNonLatin?nonLatFall:latFall;
        }
        if (!result.empty()&&result.back().lang==lang) { result.back().text+=" "+s; }
        else { result.push_back({lang,s}); }
    }
    return result;
}

static std::vector<LangChunk> buildMixChunks(const std::vector<std::string>& sentences, const std::string& latFall, const std::string& nonLatFall) {
    std::vector<LangChunk> result;
    for (auto& s: sentences) {
        if (s.empty()) continue;
        std::string cur; std::string curLang;
        const unsigned char* p=(const unsigned char*)s.c_str();
        size_t i=0;
        while(i<s.size()){
            int len=1; int cp=utf8ToCodepoint(p+i,len);
            std::string charStr; for(int j=0;j<len;j++) charStr+=(char)p[i+j];
            i+=len;
            if(isIgnorable(cp)){ cur+=charStr; continue; }
            std::string lang;
            const char* blk=detectScriptBlock(cp);
            if (blk) { lang=blk; }
            else if (isLatinLike(cp)) { lang=latFall; }
            else { lang=nonLatFall; }
            if (lang!=curLang&&!cur.empty()) {
                if (!result.empty()&&result.back().lang==curLang) result.back().text+=" "+cur;
                else result.push_back({curLang,cur});
                cur=""; curLang=lang;
            } else if (curLang.empty()) { curLang=lang; }
            cur+=charStr;
        }
        if (!cur.empty()) {
            if (!result.empty()&&result.back().lang==curLang) result.back().text+=" "+cur;
            else result.push_back({curLang,cur});
        }
    }
    return result;
}

static std::string applyDictionary(const std::string& text, const std::vector<std::string>& keys, const std::vector<std::string>& vals) {
    std::string out=text;
    for (size_t i=0;i<keys.size()&&i<vals.size();i++){
        size_t pos=0;
        while((pos=out.find(keys[i],pos))!=std::string::npos){ out.replace(pos,keys[i].size(),vals[i]); pos+=vals[i].size(); }
    }
    return out;
}

static bool isEmojiCP(int cp){
    return (cp>=0x1F600&&cp<=0x1F64F)||(cp>=0x1F300&&cp<=0x1F5FF)||(cp>=0x1F680&&cp<=0x1F6FF)||(cp>=0x1F700&&cp<=0x1F77F)||(cp>=0x1F780&&cp<=0x1F7FF)||(cp>=0x1F800&&cp<=0x1F8FF)||(cp>=0x1F900&&cp<=0x1F9FF)||(cp>=0x1FA00&&cp<=0x1FA6F)||(cp>=0x1FA70&&cp<=0x1FAFF)||(cp>=0x2600&&cp<=0x27BF)||(cp>=0xFE00&&cp<=0xFE0F)||(cp==0x200D);
}

static std::string normalizeText(const std::string& s, bool keepEmoji, bool countEmoji, bool countPunct) {
    std::string out; int lastEmoji=-1; int emojiCount=0; int lastPunct=-1; int punctCount=0;
    const unsigned char* p=(const unsigned char*)s.c_str();
    size_t i=0;
    while(i<s.size()){
        int len=1; int cp=utf8ToCodepoint(p+i,len);
        if (isEmojiCP(cp)) {
            if (!keepEmoji){ i+=len; continue; }
            if (cp==lastEmoji){ emojiCount++;
                if(countEmoji){ out+=" x"+std::to_string(emojiCount+1); }
            } else { lastEmoji=cp; emojiCount=0; std::string cs; for(int j=0;j<len;j++) cs+=(char)p[i+j]; out+=cs; }
            i+=len; continue;
        }
        lastEmoji=-1; emojiCount=0;
        bool isPunct=(cp=='!'||cp=='?'||cp=='.'||cp==','||cp==';'||cp==':'||cp=='-'||cp=='_'||cp=='*'||cp=='#'||cp=='@'||cp=='&'||cp=='%'||cp=='+'||cp=='='||cp=='/'||cp=='\\'||cp=='|'||cp=='~'||cp=='^'||cp=='`'||cp=='<'||cp=='>'||cp=='['||cp==']'||cp=='{'||cp=='}'||cp=='('||cp==')');
        if (isPunct) {
            if (cp==lastPunct){ punctCount++;
                if(countPunct){ out+=" x"+std::to_string(punctCount+1); }
            } else { lastPunct=cp; punctCount=0; std::string cs; cs+=(char)cp; out+=cs; }
            i+=len; continue;
        }
        lastPunct=-1; punctCount=0;
        for(int j=0;j<len;j++) out+=(char)p[i+j];
        i+=len;
    }
    return out;
}

extern "C" JNIEXPORT jstring JNICALL
Java_com_omni_tts_NativeEngine_processDirect(
        JNIEnv* env, jobject,
        jobject buffer, jint length,
        jobjectArray jKeys, jobjectArray jVals,
        jboolean keepEmoji, jboolean countEmoji, jboolean countPunct,
        jstring jLatFall, jstring jNonLatFall,
        jstring jMode)
{
    const char* raw=(const char*)env->GetDirectBufferAddress(buffer);
    std::string rawInput(raw, length);
    const char* latC=env->GetStringUTFChars(jLatFall,nullptr);
    std::string latFall(latC); env->ReleaseStringUTFChars(jLatFall,latC);
    const char* nonLatC=env->GetStringUTFChars(jNonLatFall,nullptr);
    std::string nonLatFall(nonLatC); env->ReleaseStringUTFChars(jNonLatFall,nonLatC);

    int kLen=env->GetArrayLength(jKeys);
    std::vector<std::string> keys,vals;
    for(int i=0;i<kLen;i++){
        jstring jk=(jstring)env->GetObjectArrayElement(jKeys,i);
        const char* kc=env->GetStringUTFChars(jk,nullptr);
        keys.push_back(kc); env->ReleaseStringUTFChars(jk,kc); env->DeleteLocalRef(jk);
        jstring jv=(jstring)env->GetObjectArrayElement(jVals,i);
        const char* vc=env->GetStringUTFChars(jv,nullptr);
        vals.push_back(vc); env->ReleaseStringUTFChars(jv,vc); env->DeleteLocalRef(jv);
    }

    std::vector<std::string> sentences;
    size_t start=0, end=rawInput.find('\0');
    while(end!=std::string::npos){ sentences.push_back(rawInput.substr(start,end-start)); start=end+1; end=rawInput.find('\0',start); }
    if(start<rawInput.size()) sentences.push_back(rawInput.substr(start));

    std::vector<std::string> processed;
    processed.reserve(sentences.size());
    for(auto& s: sentences){
        if(s.empty()){ processed.push_back(""); continue; }
        auto d=applyDictionary(s,keys,vals);
        d=normalizeText(d,keepEmoji,countEmoji,countPunct);
        processed.push_back(d);
    }

    const char* modeC=env->GetStringUTFChars(jMode,nullptr);
    std::string mode(modeC); env->ReleaseStringUTFChars(jMode,modeC);

    std::string result;
    if(mode=="single"){
        std::string combined;
        for(auto& p: processed){ if(!p.empty()){ if(!combined.empty()) combined+=' '; combined+=p; } }
        if(!combined.empty()) result=latFall+"|"+combined;
    } else if(mode=="mix"){
        auto chunks=buildMixChunks(processed,latFall,nonLatFall);
        for(size_t i=0;i<chunks.size();i++){
            result+=chunks[i].lang+"|"+chunks[i].text;
            if(i+1<chunks.size()) result+="||";
        }
    } else {
        auto chunks=buildAutoChunks(processed,latFall,nonLatFall);
        for(size_t i=0;i<chunks.size();i++){
            result+=chunks[i].lang+"|"+chunks[i].text;
            if(i+1<chunks.size()) result+="||";
        }
    }
    return env->NewStringUTF(result.c_str());
}
