          "import androidx.compose.ui.unit.dp\n"
          "class AdvancedSettingsActivity : ComponentActivity() {\n"
          "    @OptIn(ExperimentalMaterial3Api::class)\n"
          "    override fun onCreate(savedInstanceState: Bundle?) {\n"
          "        super.onCreate(savedInstanceState)\n"
          "        val prefs = SharedPrefsManager(this)\n"
          "        setContent {\n"
          "            MaterialTheme {\n"
          "                Surface(modifier = Modifier.fillMaxSize()) {\n"
          "                    val context = LocalContext.current\n"
          "                    val readingMode = prefs.getReadingMode()\n"
          "                    val isDualMode = readingMode == \"dual\"\n"
          "                    val isMixMode = readingMode == \"mix\"\n"
          "                    val isSplitMode = isDualMode || isMixMode\n"
          "                    // Override pref keys: dual uses dual_*, mix uses mix_*\n"
          "                    val puncKey = if (isDualMode) \"dual_punc_lang\" else \"mix_punc_lang\"\n"
          "                    val numKey  = if (isDualMode) \"dual_num_lang\"  else \"mix_num_lang\"\n"
          "                    val emojiKey = if (isDualMode) \"dual_emoji_lang\" else \"mix_emoji_lang\"\n"
          "                    var emojiReading by remember { mutableStateOf(prefs.getBoolean(\"emoji_reading\", true)) }\n"
          "                    var emojiCount by remember { mutableStateOf(prefs.getBoolean(\"emoji_count\", false)) }\n"
          "                    var punctCount by remember { mutableStateOf(prefs.getBoolean(\"punct_count\", false)) }\n"
          "                    var dictEnabled by remember { mutableStateOf(prefs.getBoolean(\"dict_enabled\", false)) }\n"
          "                    var latLangIso by remember { mutableStateOf(prefs.getString(\"mixed_mode_latin_language\", \"en\")) }\n"
          "                    var nonLatLangIso by remember { mutableStateOf(prefs.getString(\"mixed_mode_non_latin_language\", \"hi\")) }\n"
          "                    // Override options: \"auto\" means follow context (neutral chars go to current segment lang)\n"
          "                    val overrideOptions = listOf(\"Auto (Follow Context)\") + Languages.displayNames\n"
          "                    val overrideKeys   = listOf(\"auto\") + Languages.isoCodes\n"
          "                    var puncLang by remember { mutableStateOf(prefs.getString(puncKey, \"auto\")) }\n"
          "                    var numLang  by remember { mutableStateOf(prefs.getString(numKey,  \"auto\")) }\n"
          "                    var emojiLang by remember { mutableStateOf(prefs.getString(emojiKey, \"auto\")) }\n"
          "                    Column(modifier = Modifier.padding(16.dp).verticalScroll(rememberScrollState())) {\n"
          "                        Text(\"Advanced Settings\", style = MaterialTheme.typography.headlineSmall)\n"
          "                        Spacer(modifier = Modifier.height(8.dp))\n"
          "                        Text(\"Mode: ${when(readingMode){\"dual\"->\"Dual Language\";\"mix\"->\"Mix Language\";else->\"Auto\"}}\", style = MaterialTheme.typography.bodySmall)\n"
          "                        Spacer(modifier = Modifier.height(24.dp))\n"
          "                        // ── General toggles ─────────────────────────────────────────\n"
          "                        Row(verticalAlignment = Alignment.CenterVertically, modifier = Modifier.semantics{contentDescription=\"Toggle Emoji Reading\"}) { Checkbox(checked=emojiReading, onCheckedChange={emojiReading=it;prefs.setBoolean(\"emoji_reading\",it)}); Text(\"Emoji Reading\") }\n"
          "                        Row(verticalAlignment = Alignment.CenterVertically, modifier = Modifier.semantics{contentDescription=\"Toggle Repeated Emoji Count\"}) { Checkbox(checked=emojiCount, onCheckedChange={emojiCount=it;prefs.setBoolean(\"emoji_count\",it)}); Text(\"Repeated Emoji Count\") }\n"
          "                        Row(verticalAlignment = Alignment.CenterVertically, modifier = Modifier.semantics{contentDescription=\"Toggle Repeated Punctuation Count\"}) { Checkbox(checked=punctCount, onCheckedChange={punctCount=it;prefs.setBoolean(\"punct_count\",it)}); Text(\"Repeated Punctuation Count\") }\n"
          "                        Row(verticalAlignment = Alignment.CenterVertically, modifier = Modifier.semantics{contentDescription=\"Toggle Enable Dictionary\"}) { Checkbox(checked=dictEnabled, onCheckedChange={dictEnabled=it;prefs.setBoolean(\"dict_enabled\",it)}); Text(\"Enable Dictionary\") }\n"
          "                        Spacer(modifier = Modifier.height(16.dp))\n"
          "                        // ── Fallback languages (used in all split modes) ──────────────\n"
          "                        Divider()\n"
          "                        Spacer(modifier = Modifier.height(8.dp))\n"
          "                        Text(\"Fallback Languages\", style = MaterialTheme.typography.titleMedium)\n"
          "                        Spacer(modifier = Modifier.height(8.dp))\n"
          "                        AccessibleDropdown(\"Default Latin / Primary Language\", \"${Languages.map[latLangIso]} ($latLangIso)\", Languages.displayNames) { idx ->\n"
          "                            latLangIso=Languages.isoCodes[idx]; prefs.setString(\"mixed_mode_latin_language\",latLangIso)\n"
          "                        }\n"
          "                        AccessibleDropdown(\"Default Non-Latin / Secondary Language\", \"${Languages.map[nonLatLangIso]} ($nonLatLangIso)\", Languages.displayNames) { idx ->\n"
          "                            nonLatLangIso=Languages.isoCodes[idx]; prefs.setString(\"mixed_mode_non_latin_language\",nonLatLangIso)\n"
          "                        }\n"
          "                        // ── Character-type overrides (Dual mode & Mix mode only) ─────\n"
          "                        if (isSplitMode) {\n"
          "                            Spacer(modifier = Modifier.height(24.dp))\n"
          "                            Divider()\n"
          "                            Spacer(modifier = Modifier.height(8.dp))\n"
          "                            Text(\"Character-Type Language Overrides\", style = MaterialTheme.typography.titleMedium)\n"
          "                            Spacer(modifier = Modifier.height(4.dp))\n"
          "                            Text(\"Override which language engine reads punctuation, numbers, and emoji. \\\"Auto\\\" follows the surrounding segment's language.\", style = MaterialTheme.typography.bodySmall)\n"
          "                            Spacer(modifier = Modifier.height(12.dp))\n"
          "                            AccessibleDropdown(\"Punctuation Language\", overrideOptions[overrideKeys.indexOf(puncLang).coerceAtLeast(0)], overrideOptions) { idx ->\n"
          "                                puncLang = overrideKeys[idx]; prefs.setString(puncKey, puncLang)\n"
          "                            }\n"
          "                            AccessibleDropdown(\"Numbers Language\", overrideOptions[overrideKeys.indexOf(numLang).coerceAtLeast(0)], overrideOptions) { idx ->\n"
          "                                numLang = overrideKeys[idx]; prefs.setString(numKey, numLang)\n"
          "                            }\n"
          "                            AccessibleDropdown(\"Emoji Language\", overrideOptions[overrideKeys.indexOf(emojiLang).coerceAtLeast(0)], overrideOptions) { idx ->\n"
          "                                emojiLang = overrideKeys[idx]; prefs.setString(emojiKey, emojiLang)\n"
          "                            }\n"
          "                        }\n"
          "                        Spacer(modifier = Modifier.height(32.dp))\n"
          "                        Button(onClick={startActivity(Intent(context,DictionaryActivity::class.java))},modifier=Modifier.fillMaxWidth()){Text(\"MANAGE DICTIONARY\")}\n"
          "                    }\n"
          "                }\n"
          "            }\n"
          "        }\n"
          "    }\n"
          "}\n")

