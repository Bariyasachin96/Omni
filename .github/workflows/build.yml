                                prefs.setString("latin_fallback", latinFb); latExp = false
                            })
                    }
                }
            }
            Spacer(Modifier.height(8.dp))

            // ── Non-Latin fallback ────────────────────────────────────────
            ExposedDropdownMenuBox(
                expanded = nonLatExp,
                onExpandedChange = { nonLatExp = !nonLatExp },
                modifier = Modifier.semantics { contentDescription = "Preferred language for non-Latin text selector" }
            ) {
                val nlName = OmniTtsService.LANGUAGES.entries.find { it.value == nonLatinFb }?.key ?: nonLatinFb
                OutlinedTextField(
                    value = "Non-Latin text → $nlName", onValueChange = {}, readOnly = true,
                    label = { Text("Preferred language for non-Latin text") },
                    trailingIcon = { ExposedDropdownMenuDefaults.TrailingIcon(nonLatExp) },
                    modifier = Modifier.fillMaxWidth().menuAnchor()
                        .semantics { contentDescription = "Non-Latin text preferred language: $nlName" }
                )
                ExposedDropdownMenu(expanded = nonLatExp, onDismissRequest = { nonLatExp = false }) {
                    allIsos.forEach { lang ->
                        DropdownMenuItem(
                            text = { Text(lang) },
                            modifier = Modifier.semantics { contentDescription = lang },
                            onClick = {
                                nonLatinFb = lang.substringAfter("(").substringBefore(")")
                                prefs.setString("nonlatin_fallback", nonLatinFb); nonLatExp = false
                            })
                    }
                }
            }
            Spacer(Modifier.height(24.dp))

            // ── Buttons ───────────────────────────────────────────────────
            Button(
                onClick = {
                    scope.launch {
                        val rate  = rateProgress / 100f
                        val pitch = pitchProgress / 100f
                        tempTts?.setSpeechRate(rate)
                        tempTts?.setPitch(pitch)
                        if (selLocTag.isNotEmpty()) {
                            try { tempTts?.language = Locale.forLanguageTag(selLocTag) } catch (_: Exception) {}
                        }
                        tempTts?.speak("Testing Omni TTS audio setup", TextToSpeech.QUEUE_FLUSH, null, "test")
                    }
                },
                modifier = Modifier.fillMaxWidth()
                    .semantics { contentDescription = "Test Audio button" }
            ) { Text("TEST AUDIO") }
            Spacer(Modifier.height(8.dp))

            OutlinedButton(
                onClick = { startActivity(Intent("com.android.settings.TTS_SETTINGS")) },
                modifier = Modifier.fillMaxWidth()
                    .semantics { contentDescription = "Open System TTS Settings button" }
            ) { Text("OPEN SYSTEM TTS SETTINGS") }
        }
    }
}
EOF

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.5'
        cache-disabled: true

    - name: Build APK
      run: |
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        chmod +x gradlew 2>/dev/null || true
        gradle assembleDebug \
          -Pandroid.ndkVersion=25.1.8937393 \
          --no-daemon \
          --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Omni-TTS-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: error
