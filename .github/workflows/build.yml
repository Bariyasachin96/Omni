          "        enginePool.values.forEach {\n"
          "            try { if (it.isSpeaking) it.stop() } catch (_: Exception) {}\n"
          "        }\n"
          "        stopForegroundSafe()                    // drop FG notification when nothing's being spoken\n"
          "    }\n"
          "    // ─────────────────────────────────────────────────────────────────\n"
          "    // Auto TTS class t2/l.g(CharSequence):ArrayList<l>  — EXACT PORT\n"
          "    // SpannableString + LocaleSpan splitter (TalkBack passes locale hints!)\n"
          "    // ─────────────────────────────────────────────────────────────────\n"
          "    private fun splitByLocaleSpans(input: CharSequence): MutableList<TextChunk> {\n"
          "        val result = mutableListOf<TextChunk>()\n"
