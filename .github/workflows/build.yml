package com.omni.tts

import android.media.AudioFormat
import android.speech.tts.SynthesisCallback
import android.speech.tts.SynthesisRequest
import android.speech.tts.TextToSpeech
import android.speech.tts.TextToSpeechService
import java.util.Locale
import java.util.concurrent.ConcurrentHashMap
import java.util.concurrent.CountDownLatch
import java.util.concurrent.TimeUnit
import java.util.concurrent.atomic.AtomicBoolean
import java.util.concurrent.atomic.AtomicReference

class OmniTtsService : TextToSpeechService() {

    // Pool: engine package → TTS instance
    private val pool = ConcurrentHashMap<String, TextToSpeech>()
    private lateinit var prefs: SharedPrefsManager
    private val activeStop = AtomicReference(AtomicBoolean(true))

    // Cache: iso → last-set locale tag (avoid redundant setLanguage calls)
    private val localeCache = ConcurrentHashMap<String, String>()

    override fun onCreate() {
        super.onCreate()
        prefs = SharedPrefsManager(this)
        // Warmup: init all configured engines in background
        Thread {
            LANGUAGES.values.toSet().forEach { iso ->
                val pkg = prefs.engineForLang(iso)
                if (pkg != "NOT_SET") getOrInitEngine(pkg)
            }
        }.start()
    }

    override fun onGetLanguage(): Array<String> = arrayOf("eng", "USA", "")
    override fun onIsLanguageAvailable(l: String?, c: String?, v: String?) =
        TextToSpeech.LANG_AVAILABLE
    override fun onLoadLanguage(l: String?, c: String?, v: String?) =
        TextToSpeech.LANG_AVAILABLE

    override fun onStop() {
        activeStop.get().set(true)
        pool.values.forEach { try { it.stop() } catch (_: Exception) {} }
    }

    override fun onSynthesizeText(request: SynthesisRequest?, callback: SynthesisCallback?) {
        if (request == null || callback == null) return
        activeStop.get().set(true)
        val myStop = AtomicBoolean(false)
        activeStop.set(myStop)

        var rawText = request.charSequenceText?.toString() ?: return

        // ── Normalization ─────────────────────────────────────────────────
        rawText = normalizeFancyUnicode(rawText)
        rawText = rawText.replace('\u00A0', ' ')
            .replace('\u200B', ' ').replace('\u200C', ' ')
            .replace('\u200D', ' ').replace('\uFEFF', ' ')

        val trimmed = rawText.trim()
        if (trimmed.isEmpty() || isPunctuationOnly(trimmed)) {
            callback.start(16000, AudioFormat.ENCODING_PCM_16BIT, 1)
            callback.done(); return
        }

        // ── Split into language chunks ─────────────────────────────────────
        val chunks = TextSplitter.split(rawText, prefs)
        val cbStarted = BooleanArray(1) { false }

        for ((i, chunk) in chunks.withIndex()) {
            if (myStop.get()) break
            val text = chunk.text.trim()
            if (text.isEmpty() || isPunctuationOnly(text)) continue

            val iso = chunk.iso
            var pkg = prefs.engineForLang(iso)
            val effectiveIso: String
            if (pkg == "NOT_SET") {
                // Fallback: use latin_fallback or nonlatin_fallback
                val fbKey = if (LanguageDetector.isLatinText(text))
                    "latin_fallback" else "nonlatin_fallback"
                val fbIso = prefs.getString(fbKey)
                if (fbIso.isEmpty()) continue
                effectiveIso = fbIso
                pkg = prefs.engineForLang(fbIso)
                if (pkg == "NOT_SET") continue
            } else {
                effectiveIso = iso
            }

            val tts = getOrInitEngine(pkg) ?: continue

            // Rate / pitch
            val rate  = prefs.getFloat(prefs.rateKey(effectiveIso, pkg), 1f)
                .coerceIn(0.1f, 6f) * (request.speechRate / 100f).coerceAtLeast(0.1f)
            val pitch = prefs.getFloat(prefs.pitchKey(effectiveIso, pkg), 1f)
                .coerceIn(0.1f, 6f) * (request.pitch / 100f).coerceAtLeast(0.1f)
            tts.setSpeechRate(rate.coerceIn(0.1f, 6f))
            tts.setPitch(pitch.coerceIn(0.1f, 6f))

            // Locale
            val locTag = prefs.getString(prefs.locKey(effectiveIso, pkg))
            val cacheKey = "$effectiveIso|$pkg"
            if (locTag.isNotEmpty() && localeCache[cacheKey] != locTag) {
                try { tts.language = Locale.forLanguageTag(locTag) } catch (_: Exception) {}
                localeCache[cacheKey] = locTag
            }

            val stopped = LiveStreamProcessor.process(
                this, tts, text, callback, cbStarted, myStop, i + 1)
            if (stopped) break
        }

        if (!cbStarted[0] && !myStop.get())
            callback.start(16000, AudioFormat.ENCODING_PCM_16BIT, 1)
        callback.done()
    }

    override fun onDestroy() {
        activeStop.get().set(true)
        pool.values.forEach { try { it.shutdown() } catch (_: Exception) {} }
        pool.clear(); localeCache.clear()
        super.onDestroy()
    }

    // ── Helpers ───────────────────────────────────────────────────────────

    private fun getOrInitEngine(pkg: String): TextToSpeech? {
        pool[pkg]?.let { return it }
        return pool.getOrPut(pkg) {
            val latch = CountDownLatch(1)
            var ref: TextToSpeech? = null
            ref = TextToSpeech(this, { latch.countDown() }, pkg)
            latch.await(5, TimeUnit.SECONDS)
            ref!!
        }
    }

    private fun isPunctuationOnly(text: String): Boolean {
        for (cp in text.codePoints()) {
            if (Character.isLetter(cp) || Character.isDigit(cp)) return false
        }
        return true
    }

    /**
     * Converts Mathematical/Fancy Unicode → plain ASCII
     * Fixes "𝗕𝗢𝗢𝗦𝗧" → "BOOST" (Math Sans-Serif Bold)
     * Prevents garbled/robotic TTS output for styled text.
     */
    private fun normalizeFancyUnicode(text: String): String {
        if (text.isEmpty()) return text
        val sb = StringBuilder(text.length)
        var i = 0
        while (i < text.length) {
            val cp = text.codePointAt(i)
            val ascii = mathToAscii(cp)
            if (ascii != 0) sb.append(ascii) else sb.appendCodePoint(cp)
            i += Character.charCount(cp)
        }
        return sb.toString()
    }

    private fun mathToAscii(cp: Int): Char {
        // Uppercase blocks (each 26-long, starting at 'A')
        val uppers = intArrayOf(
            0x1D400, 0x1D434, 0x1D468, 0x1D4D0, 0x1D56C,
            0x1D5A0, 0x1D5D4, 0x1D608, 0x1D63C, 0x1D670
        )
        for (b in uppers) if (cp in b..(b + 25)) return ('A' + (cp - b))
        // Lowercase blocks
        val lowers = intArrayOf(
            0x1D41A, 0x1D44E, 0x1D482, 0x1D4EA, 0x1D586,
            0x1D5BA, 0x1D5EE, 0x1D622, 0x1D656, 0x1D68A
        )
        for (b in lowers) if (cp in b..(b + 25)) return ('a' + (cp - b))
        // Digit blocks
        val digits = intArrayOf(0x1D7CE, 0x1D7D8, 0x1D7E2, 0x1D7EC, 0x1D7F6)
        for (b in digits) if (cp in b..(b + 9)) return ('0' + (cp - b))
        // Fullwidth Latin
        if (cp in 0xFF21..0xFF3A) return ('A' + (cp - 0xFF21))
        if (cp in 0xFF41..0xFF5A) return ('a' + (cp - 0xFF41))
        if (cp in 0xFF10..0xFF19) return ('0' + (cp - 0xFF10))
        return 0.toChar()
    }

    companion object {
        // Complete language → ISO map used in UI
        val LANGUAGES: Map<String, String> = linkedMapOf(
            "Afrikaans" to "af", "Albanian" to "sq", "Amharic" to "am",
            "Arabic" to "ar", "Armenian" to "hy", "Azerbaijani" to "az",
            "Basque" to "eu", "Belarusian" to "be", "Bengali" to "bn",
            "Bosnian" to "bs", "Bulgarian" to "bg", "Catalan" to "ca",
            "Chinese" to "zh", "Croatian" to "hr", "Czech" to "cs",
            "Danish" to "da", "Dutch" to "nl", "English" to "en",
            "Estonian" to "et", "Finnish" to "fi", "French" to "fr",
            "Galician" to "gl", "Georgian" to "ka", "German" to "de",
            "Greek" to "el", "Gujarati" to "gu", "Hebrew" to "he",
            "Hindi" to "hi", "Hungarian" to "hu", "Icelandic" to "is",
            "Indonesian" to "id", "Irish" to "ga", "Italian" to "it",
            "Japanese" to "ja", "Javanese" to "jv", "Kannada" to "kn",
            "Kazakh" to "kk", "Khmer" to "km", "Korean" to "ko",
            "Lao" to "lo", "Latvian" to "lv", "Lithuanian" to "lt",
            "Macedonian" to "mk", "Malay" to "ms", "Malayalam" to "ml",
            "Maltese" to "mt", "Marathi" to "mr", "Mongolian" to "mn",
            "Nepali" to "ne", "Norwegian" to "no", "Oriya" to "or",
            "Pashto" to "ps", "Persian" to "fa", "Polish" to "pl",
            "Portuguese" to "pt", "Punjabi" to "pa", "Romanian" to "ro",
            "Russian" to "ru", "Serbian" to "sr", "Sinhalese" to "si",
            "Slovak" to "sk", "Slovenian" to "sl", "Somali" to "so",
            "Spanish" to "es", "Sundanese" to "su", "Swahili" to "sw",
            "Swedish" to "sv", "Tamil" to "ta", "Telugu" to "te",
            "Thai" to "th", "Turkish" to "tr", "Ukrainian" to "uk",
            "Urdu" to "ur", "Uzbek" to "uz", "Vietnamese" to "vi",
            "Welsh" to "cy", "Yoruba" to "yo", "Zulu" to "zu"
        )
    }
}
