          w("app/src/main/java/com/omni/tts/SharedPrefsManager.kt",
          "package com.omni.tts\n"
          "import android.content.Context\n"
          "import android.content.SharedPreferences\n"
          "class SharedPrefsManager(context: Context) {\n"
          "    private val prefs: SharedPreferences = context.getSharedPreferences(\"VH_PREFS\", Context.MODE_PRIVATE)\n"
          "    fun getEngineForLanguage(lang: String): String {\n"
          "        val sysLang = java.util.Locale.getDefault().language\n"
          "        val def = if (lang.equals(sysLang, ignoreCase = true)) \"com.google.android.tts\" else \"NOT_SET\"\n"
          "        return prefs.getString(\"engine_$lang\", def) ?: def\n"
          "    }\n"
          "    fun getLocaleForLangPkg(lang: String, pkg: String): String = prefs.getString(\"locale_${lang}_${pkg}\", \"\") ?: \"\"\n"
          "    fun setLocaleForLangPkg(lang: String, pkg: String, tag: String) = prefs.edit().putString(\"locale_${lang}_${pkg}\", tag).apply()\n"
          "    fun setString(key: String, v: String) = prefs.edit().putString(key, v).apply()\n"
          "    fun getString(key: String, def: String): String = prefs.getString(key, def) ?: def\n"
          "    fun setInt(key: String, v: Int) = prefs.edit().putInt(key, v).apply()\n"
          "    fun getInt(key: String, def: Int): Int = prefs.getInt(key, def)\n"
          "    fun setBoolean(key: String, v: Boolean) = prefs.edit().putBoolean(key, v).apply()\n"
          "    fun getBoolean(key: String, def: Boolean): Boolean = prefs.getBoolean(key, def)\n"
          "    fun getFloat(key: String, def: Float): Float = prefs.getFloat(key, def)\n"
          "    fun setFloat(key: String, v: Float) = prefs.edit().putFloat(key, v).apply()\n"
          "    fun getReadingMode(): String = prefs.getString(\"reading_mode\", \"auto\") ?: \"auto\"\n"
          "    fun setReadingMode(mode: String) = prefs.edit().putString(\"reading_mode\", mode).apply()\n"
          "    fun addDict(from: String, to: String) = prefs.edit().putString(\"word_$from\", to).apply()\n"
          "    fun removeDict(from: String) = prefs.edit().remove(\"word_$from\").apply()\n"
          "    fun clearDict() { val e=prefs.edit(); prefs.all.keys.filter{it.startsWith(\"word_\")}.forEach{e.remove(it)}; e.apply() }\n"
          "    fun getDict(): Map<String,String> = prefs.all.filterKeys{it.startsWith(\"word_\")}.mapKeys{it.key.substring(5)}.mapValues{it.value.toString()}\n"
          "}\n")

          # ── EngineFinder.kt ──────────────────────────────────────────────────
          w("app/src/main/java/com/omni/tts/EngineFinder.kt",
          "package com.omni.tts\n"
          "import android.content.Context\n"
          "import android.content.Intent\n"
          "import android.speech.tts.TextToSpeech\n"
          "object EngineFinder {\n"
          "    data class TTSInfo(val pkg: String, val name: String) { override fun toString() = name }\n"
          "    fun getEngines(ctx: Context): List<TTSInfo> {\n"
          "        val pm = ctx.packageManager\n"
          "        val list = pm.queryIntentServices(Intent(TextToSpeech.Engine.INTENT_ACTION_TTS_SERVICE), 0)\n"
          "            .map { TTSInfo(it.serviceInfo.packageName, it.serviceInfo.applicationInfo.loadLabel(pm).toString()) }\n"
          "            .toMutableList()\n"
          "        if (list.isEmpty()) list.add(TTSInfo(\"com.google.android.tts\", \"Google TTS\"))\n"
          "        return list\n"
          "    }\n"
          "}\n")

          # ── ComposeTtsService.kt — Zero-Latency Direct Speak Architecture ────
          w("app/src/main/java/com/omni/tts/ComposeTtsService.kt",
          "package com.omni.tts\n"
          "import android.speech.tts.SynthesisCallback\n"
          "import android.speech.tts.SynthesisRequest\n"
          "import android.speech.tts.TextToSpeech\n"
          "import android.speech.tts.TextToSpeechService\n"
          "import android.speech.tts.UtteranceProgressListener\n"
          "import java.nio.ByteBuffer\n"
          "import java.util.Locale\n"
          "import java.util.concurrent.ConcurrentHashMap\n"
          "import java.util.concurrent.CountDownLatch\n"
          "import java.util.concurrent.TimeUnit\n"
          "import java.util.concurrent.atomic.AtomicBoolean\n"
          "import java.util.concurrent.atomic.AtomicReference\n"
          "class ComposeTtsService : TextToSpeechService() {\n"
          "    private val enginePool = ConcurrentHashMap<String, TextToSpeech>()\n"
          "    private val engineLocks = ConcurrentHashMap<String, Any>()\n"
          "    private lateinit var prefs: SharedPrefsManager\n"
          "    private val activeStop = AtomicReference(AtomicBoolean(true))\n"
          "    class LangState { var localeTag = \"\"; var rate = -1f; var pitch = -1f }\n"
          "    private val langStates = ConcurrentHashMap<String, LangState>()\n"
          "    private fun getLocale(iso: String): Locale = try { Locale.forLanguageTag(iso) } catch (_: Exception) { Locale.US }\n"
          "    override fun onCreate() {\n"
          "        super.onCreate()\n"
          "        VhLogger.init(this)\n"
          "        VhLogger.i(\"[SERVICE] Omni v16 Booted\")\n"
          "        prefs = SharedPrefsManager(this)\n"
          "    }\n"
          "    private fun initEngineForLang(lang: String): TextToSpeech? {\n"
          "        val pkg = prefs.getEngineForLanguage(lang)\n"
          "        VhLogger.d(\"[ENGINE-INIT] initEngineForLang lang=$lang resolvedPkg=$pkg\")\n"
          "        if (pkg == \"NOT_SET\") { VhLogger.markEngineNull(lang); return null }\n"
          "        enginePool[lang]?.let { VhLogger.markEngineReused(lang); return it }\n"
          "        val lock = engineLocks.getOrPut(lang) { Any() }\n"
          "        synchronized(lock) {\n"
          "            enginePool[lang]?.let { VhLogger.markEngineReused(lang); return it }\n"
          "            VhLogger.d(\"[ENGINE-INIT] creating new TextToSpeech lang=$lang pkg=$pkg\")\n"
          "            val t0 = System.currentTimeMillis()\n"
          "            val latch = CountDownLatch(1)\n"
          "            val ref = arrayOfNulls<TextToSpeech>(1)\n"
          "            ref[0] = TextToSpeech(this, { status ->\n"
          "                VhLogger.d(\"[ENGINE-INIT] onInit status=$status lang=$lang pkg=$pkg elapsed=${System.currentTimeMillis()-t0}ms\")\n"
          "                if (status == TextToSpeech.SUCCESS) {\n"
          "                    val audioAttrs = android.media.AudioAttributes.Builder()\n"
          "                        .setUsage(11)\n"
          "                        .setContentType(1)\n"
          "                        .build()\n"
          "                    ref[0]?.setAudioAttributes(audioAttrs)\n"
          "                    val tag = prefs.getLocaleForLangPkg(lang, pkg).ifEmpty { getLocale(lang).toLanguageTag() }\n"
          "                    VhLogger.d(\"[ENGINE-INIT] setting language tag=$tag for lang=$lang\")\n"
          "                    try { ref[0]?.language = Locale.forLanguageTag(tag) } catch (_: Exception) { ref[0]?.language = getLocale(lang) }\n"
          "                } else {\n"
          "                    VhLogger.e(\"[ENGINE-INIT] FAILED status=$status lang=$lang pkg=$pkg\")\n"
          "                }\n"
          "                latch.countDown()\n"
          "            }, pkg)\n"
          "            val waited = latch.await(5, TimeUnit.SECONDS)\n"
          "            VhLogger.d(\"[ENGINE-INIT] latch done waited=$waited lang=$lang elapsed=${System.currentTimeMillis()-t0}ms\")\n"
          "            val tts = ref[0]\n"
          "            if (tts != null) { enginePool[lang] = tts; VhLogger.markEngineInit(lang, pkg, System.currentTimeMillis()-t0) }\n"
          "            else VhLogger.e(\"[ENGINE-INIT] TextToSpeech ref is null after init lang=$lang\")\n"
          "            VhLogger.markEnginePoolSize(enginePool.size)\n"
          "            return tts\n"
          "        }\n"
          "    }\n"
          "    override fun onGetLanguage(): Array<String> = arrayOf(\"eng\", \"USA\", \"\")\n"
          "    override fun onIsLanguageAvailable(l: String?, c: String?, v: String?) = TextToSpeech.LANG_AVAILABLE\n"
          "    override fun onLoadLanguage(l: String?, c: String?, v: String?) = TextToSpeech.LANG_AVAILABLE\n"
          "    override fun onStop() {\n"
          "        VhLogger.markStop()\n"
          "        activeStop.get().set(true)\n"
          "        enginePool.values.forEach { try { it.stop() } catch (_: Exception) {} }\n"
          "    }\n"
          "    override fun onSynthesizeText(request: SynthesisRequest?, callback: SynthesisCallback?) {\n"
          "        activeStop.get().set(true)\n"
          "        val myStop = AtomicBoolean(false)\n"
          "        activeStop.set(myStop)\n"
          "        val rawText = request?.charSequenceText?.toString() ?: \"\"\n"
          "        VhLogger.d(\"[SERVICE] onSynthesizeText received textLen=${rawText.length} speechRate=${request?.speechRate} pitch=${request?.pitch} lang=${request?.language}_${request?.country}\")\n"
          "        if (rawText.isEmpty() || myStop.get()) {\n"
          "            VhLogger.w(\"[SERVICE] rawText empty or stopped — calling done immediately\")\n"
          "            callback?.done(); return\n"
          "        }\n"
          "        val readingMode = prefs.getReadingMode()\n"
          "        VhLogger.markMode(readingMode)\n"
          "        val latFall = prefs.getString(\"mixed_mode_latin_language\", \"en\")\n"
          "        val nonLatFall = prefs.getString(\"mixed_mode_non_latin_language\", \"hi\")\n"
          "        VhLogger.d(\"[SERVICE] latFall=$latFall nonLatFall=$nonLatFall\")\n"
          "        val iterator = java.text.BreakIterator.getSentenceInstance()\n"
          "        iterator.setText(rawText)\n"
          "        val sentences = mutableListOf<String>()\n"
          "        var start = iterator.first(); var end = iterator.next()\n"
          "        while (end != java.text.BreakIterator.DONE) {\n"
          "            val s = rawText.substring(start, end).trim(); if (s.isNotEmpty()) sentences.add(s)\n"
          "            start = end; end = iterator.next()\n"
          "        }\n"
          "        VhLogger.d(\"[SERVICE] BreakIterator produced ${sentences.size} sentences\")\n"
          "        val joined = sentences.joinToString(\"\\u0000\")\n"
          "        val bytes = joined.toByteArray(Charsets.UTF_8)\n"
          "        VhLogger.markNativeInput(sentences.size, bytes.size)\n"
          "        val directBuffer = ByteBuffer.allocateDirect(bytes.size)\n"
          "        directBuffer.put(bytes); directBuffer.position(0)\n"
          "        val dictMap = if (prefs.getBoolean(\"dict_enabled\", false)) prefs.getDict() else emptyMap()\n"
          "        val dictEnabledVal = prefs.getBoolean(\"dict_enabled\", false)\n"
          "        VhLogger.d(\"[SERVICE] dictEnabled=$dictEnabledVal dictEntries=${dictMap.size}\")\n"
          "        val nativeOutput = NativeEngine.processDirect(\n"
          "            directBuffer, bytes.size,\n"
          "            dictMap.keys.toTypedArray(), dictMap.values.toTypedArray(),\n"
          "            prefs.getBoolean(\"emoji_reading\", true),\n"
          "            prefs.getBoolean(\"emoji_count\", false),\n"
          "            prefs.getBoolean(\"punct_count\", false),\n"
          "            latFall, nonLatFall, readingMode\n"
          "        )\n"
          "        val chunkStrings = nativeOutput.split(\"||\").filter { it.isNotBlank() }\n"
          "        VhLogger.markNativeOutput(nativeOutput, chunkStrings.size)\n"
          "        VhLogger.markRequest(rawText, chunkStrings.size)\n"
          "        val sysRate = maxOf(0.1f, (request?.speechRate ?: 100) / 100.0f)\n"
          "        val sysPitch = maxOf(0.1f, (request?.pitch ?: 100) / 100.0f)\n"
          "        VhLogger.d(\"[SERVICE] sysRate=$sysRate sysPitch=$sysPitch\")\n"
          "        val totalChunks = chunkStrings.size\n"
          "        if (totalChunks == 0) { callback?.done(); return }\n"
          "        callback?.start(16000, android.media.AudioFormat.ENCODING_PCM_16BIT, 1)\n"
          "        var chunkIndex = 0\n"
          "        for (chunkStr in chunkStrings) {\n"
          "            val parts = chunkStr.split(\"|\", limit = 2)\n"
          "            if (parts.size < 2 || parts[1].trim().isEmpty()) {\n"
          "                VhLogger.w(\"[SERVICE] malformed or empty chunk='$chunkStr' — skipping\")\n"
          "                continue\n"
          "            }\n"
          "            chunkIndex++\n"
          "            val currentChunk = chunkIndex\n"
          "            var effectiveLang = parts[0]; val chunkText = parts[1]\n"
          "            VhLogger.d(\"[CHUNK-$currentChunk] detected lang=$effectiveLang textLen=${chunkText.length}\")\n"
          "            var pkg = prefs.getEngineForLanguage(effectiveLang)\n"
          "            if (pkg == \"NOT_SET\") { VhLogger.markFallback(effectiveLang, latFall); effectiveLang = latFall; pkg = prefs.getEngineForLanguage(effectiveLang) }\n"
          "            if (pkg == \"NOT_SET\") { VhLogger.markSkipped(\"no engine for lang=$effectiveLang after fallback\"); if (currentChunk == totalChunks) callback?.done(); continue }\n"
          "            val key = \"${effectiveLang}_${pkg}\"\n"
          "            val appRate = maxOf(0.1f, prefs.getInt(\"rate_$key\", 100) / 100.0f)\n"
          "            val appPitch = maxOf(0.1f, prefs.getInt(\"pitch_$key\", 100) / 100.0f)\n"
          "            val appVolume = prefs.getInt(\"vol_$key\", 100) / 100.0f\n"
          "            val finalRate = maxOf(0.1f, minOf(6.0f, sysRate * appRate))\n"
          "            val finalPitch = maxOf(0.1f, minOf(6.0f, sysPitch * appPitch))\n"
          "            val locTag = prefs.getLocaleForLangPkg(effectiveLang, pkg).ifEmpty { Locale.forLanguageTag(effectiveLang).toLanguageTag() }\n"
          "            VhLogger.markChunkStart(currentChunk, totalChunks, effectiveLang, pkg, locTag, chunkText, finalRate, finalPitch, appVolume, sysRate, sysPitch, appRate, appPitch)\n"
          "            val tts = initEngineForLang(effectiveLang)\n"
          "            if (tts == null) { VhLogger.markEngineNull(effectiveLang); if (currentChunk == totalChunks) callback?.done(); continue }\n"
          "            val state = langStates.getOrPut(effectiveLang) { LangState() }\n"
          "            val rateChanged = Math.abs(state.rate - finalRate) > 0.01f\n"
          "            if (rateChanged) { tts.setSpeechRate(finalRate); state.rate = finalRate }\n"
          "            VhLogger.markRateApplied(currentChunk, finalRate, rateChanged)\n"
          "            val pitchChanged = Math.abs(state.pitch - finalPitch) > 0.01f\n"
          "            if (pitchChanged) { tts.setPitch(finalPitch); state.pitch = finalPitch }\n"
          "            VhLogger.markPitchApplied(currentChunk, finalPitch, pitchChanged)\n"
          "            val localeChanged = state.localeTag != locTag\n"
          "            if (localeChanged) {\n"
          "                try { tts.language = Locale.forLanguageTag(locTag) } catch (_: Exception) { tts.language = Locale.forLanguageTag(effectiveLang) }\n"
          "                state.localeTag = locTag\n"
          "            }\n"
          "            VhLogger.markLocaleApplied(currentChunk, locTag, localeChanged)\n"
          "            val utteranceId = \"omni_${effectiveLang}_$currentChunk\"\n"
          "            val queueMode = if (currentChunk == 1) TextToSpeech.QUEUE_FLUSH else TextToSpeech.QUEUE_ADD\n"
          "            tts.setOnUtteranceProgressListener(object : UtteranceProgressListener() {\n"
          "                override fun onStart(id: String) {\n"
          "                    VhLogger.markSynthStart(chunkText, effectiveLang, currentChunk)\n"
          "                }\n"
          "                override fun onDone(id: String) {\n"
          "                    VhLogger.markSynthEnd(currentChunk, System.currentTimeMillis())\n"
          "                    if (currentChunk == totalChunks) {\n"
          "                        VhLogger.markCallbackDone(currentChunk)\n"
          "                        callback?.done()\n"
          "                    }\n"
          "                }\n"
          "                override fun onError(id: String) {\n"
          "                    VhLogger.markSynthError(currentChunk, \"onError id=$id\")\n"
          "                    if (currentChunk == totalChunks) {\n"
          "                        VhLogger.markCallbackDone(currentChunk)\n"
          "                        callback?.done()\n"
          "                    }\n"
          "                }\n"
          "                override fun onError(id: String, errorCode: Int) {\n"
          "                    VhLogger.markSynthErrorCode(currentChunk, errorCode)\n"
          "                    if (currentChunk == totalChunks) {\n"
          "                        VhLogger.markCallbackDone(currentChunk)\n"
          "                        callback?.done()\n"
          "                    }\n"
          "                }\n"
          "            })\n"
          "            val params = android.os.Bundle().apply {\n"
          "                putFloat(TextToSpeech.Engine.KEY_PARAM_VOLUME, appVolume)\n"
          "                putString(TextToSpeech.Engine.KEY_PARAM_UTTERANCE_ID, utteranceId)\n"
          "            }\n"
          "            tts.speak(chunkText, queueMode, params, utteranceId)\n"
          "            VhLogger.d(\"[CHUNK-$currentChunk] speak() queued queueMode=$queueMode\")\n"
          "        }\n"
          "    }\n"
          "    override fun onDestroy() {\n"
          "        VhLogger.i(\"[SERVICE] onDestroy — shutting down ${enginePool.size} engines\")\n"
          "        activeStop.get().set(true)\n"
          "        enginePool.values.forEach { try { it.shutdown() } catch (_: Exception) {} }\n"
          "        enginePool.clear(); langStates.clear(); super.onDestroy()\n"
          "    }\n"
          "}\n")

