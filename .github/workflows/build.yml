          "import java.util.Locale\n"
          "import java.util.concurrent.ConcurrentHashMap\n"
          "import java.util.concurrent.CountDownLatch\n"
          "import java.util.concurrent.TimeUnit\n"
          "import java.util.concurrent.atomic.AtomicBoolean\n"
          "import java.util.concurrent.atomic.AtomicReference\n"
          "class ComposeTtsService : TextToSpeechService() {\n"
          "    private val enginePool = ConcurrentHashMap<String, TextToSpeech>()\n"
          "    private val engineLocks = ConcurrentHashMap<String, Any>()\n"
          "    private lateinit var prefs: SharedPrefsManager\n"
          "    private val activeStop = AtomicReference(AtomicBoolean(true))\n"
          "    @Volatile private var currentChunkLatch: CountDownLatch? = null\n"
          "    private fun getLocale(iso: String): Locale = try { Locale.forLanguageTag(iso) } catch (_: Exception) { Locale.US }\n"
          "    override fun onCreate() {\n"
          "        super.onCreate()\n"
          "        VhLogger.init(this)\n"
          "        VhLogger.i(\"[SERVICE] Omni v16 Booted - ULTRA MAX LOGGING Queue Architecture\")\n"
          "        prefs = SharedPrefsManager(this)\n"
          "        val latFall = prefs.getString(\"mixed_mode_latin_language\", \"en\")\n"
          "        val nonLatFall = prefs.getString(\"mixed_mode_non_latin_language\", \"hi\")\n"
          "        Thread {\n"
          "            initEngineForLang(latFall)\n"
          "            if (nonLatFall != latFall) initEngineForLang(nonLatFall)\n"
          "        }.start()\n"
          "    }\n"
          "    private fun initEngineForLang(lang: String): TextToSpeech? {\n"
          "        val pkg = prefs.getEngineForLanguage(lang)\n"
          "        if (pkg == \"NOT_SET\") return null\n"
          "        enginePool[lang]?.let { return it }\n"
          "        val lock = engineLocks.getOrPut(lang) { Any() }\n"
          "        synchronized(lock) {\n"
          "            enginePool[lang]?.let { return it }\n"
          "            val latch = CountDownLatch(1)\n"
          "            val ref = arrayOfNulls<TextToSpeech>(1)\n"
          "            ref[0] = TextToSpeech(this, { status ->\n"
          "                if (status == TextToSpeech.SUCCESS) {\n"
          "                    ref[0]?.setAudioAttributes(android.media.AudioAttributes.Builder().setUsage(11).setContentType(1).build())\n"
          "                    val tag = prefs.getLocaleForLangPkg(lang, pkg).ifEmpty { getLocale(lang).toLanguageTag() }\n"
          "                    try { ref[0]?.language = Locale.forLanguageTag(tag) } catch (_: Exception) { ref[0]?.language = getLocale(lang) }\n"
          "                }\n"
          "                latch.countDown()\n"
          "            }, pkg)\n"
          "            latch.await(5, TimeUnit.SECONDS)\n"
          "            val tts = ref[0]\n"
          "            if (tts != null) { enginePool[lang] = tts }\n"
          "            return tts\n"
          "        }\n"
          "    }\n"
          "    override fun onGetLanguage(): Array<String> = arrayOf(\"eng\", \"USA\", \"\")\n"
          "    override fun onIsLanguageAvailable(l: String?, c: String?, v: String?) = TextToSpeech.LANG_AVAILABLE\n"
          "    override fun onLoadLanguage(l: String?, c: String?, v: String?) = TextToSpeech.LANG_AVAILABLE\n"
          "    override fun onStop() {\n"
          "        VhLogger.w(\"\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\")\n"
          "        VhLogger.w(\"[SYSTEM] Android/TalkBack forcefully called onStop() on our service!\")\n"
          "        VhLogger.w(\"/////////////////////////////////////////\")\n"
          "        activeStop.get().set(true)\n"
          "        enginePool.values.forEach { try { it.stop() } catch (_: Exception) {} }\n"
          "        currentChunkLatch?.countDown()\n"
          "    }\n"
          "    override fun onSynthesizeText(request: SynthesisRequest?, callback: SynthesisCallback?) {\n"
          "        VhLogger.d(\"[REQUEST] >>>>> NEW SYNTHESIS REQUEST STARTED <<<<<\")\n"
          "        activeStop.get().set(true)\n"
          "        val myStop = AtomicBoolean(false)\n"
          "        activeStop.set(myStop)\n"
          "        val rawText = request?.charSequenceText?.toString() ?: \"\"\n"
          "        if (rawText.isEmpty() || myStop.get()) {\n"
          "            VhLogger.d(\"[REQUEST] Text is empty or stopped immediately. Exiting.\")\n"
          "            callback?.start(16000, android.media.AudioFormat.ENCODING_PCM_16BIT, 1)\n"
          "            callback?.done(); return\n"
          "        }\n"
          "        val readingMode = prefs.getReadingMode()\n"
          "        val latFall = prefs.getString(\"mixed_mode_latin_language\", \"en\")\n"
          "        val nonLatFall = prefs.getString(\"mixed_mode_non_latin_language\", \"hi\")\n"
          "        val iterator = java.text.BreakIterator.getSentenceInstance()\n"
          "        iterator.setText(rawText)\n"
          "        val sentences = mutableListOf<String>()\n"
          "        var start = iterator.first(); var end = iterator.next()\n"
          "        while (end != java.text.BreakIterator.DONE) {\n"
          "            val s = rawText.substring(start, end).trim(); if (s.isNotEmpty()) sentences.add(s)\n"
          "            start = end; end = iterator.next()\n"
          "        }\n"
          "        val joined = sentences.joinToString(\"\\u0000\")\n"
          "        val bytes = joined.toByteArray(Charsets.UTF_8)\n"
          "        val directBuffer = ByteBuffer.allocateDirect(bytes.size)\n"
          "        directBuffer.put(bytes); directBuffer.position(0)\n"
          "        val dictMap = if (prefs.getBoolean(\"dict_enabled\", false)) prefs.getDict() else emptyMap()\n"
          "        val nativeOutput = NativeEngine.processDirect(\n"
          "            directBuffer, bytes.size,\n"
          "            dictMap.keys.toTypedArray(), dictMap.values.toTypedArray(),\n"
          "            prefs.getBoolean(\"emoji_reading\", true),\n"
          "            prefs.getBoolean(\"emoji_count\", false),\n"
          "            prefs.getBoolean(\"punct_count\", false),\n"
          "            latFall, nonLatFall, readingMode,\n"
          "            if (readingMode == \"dual\") prefs.getString(\"dual_punc_lang\", \"auto\") else prefs.getString(\"mix_punc_lang\", \"auto\"),\n"
          "            if (readingMode == \"dual\") prefs.getString(\"dual_num_lang\",  \"auto\") else prefs.getString(\"mix_num_lang\",  \"auto\"),\n"
          "            if (readingMode == \"dual\") prefs.getString(\"dual_emoji_lang\", \"auto\") else prefs.getString(\"mix_emoji_lang\", \"auto\")\n"
          "        )\n"
          "        \n"
          "        val chunksQueue = ArrayDeque<Pair<String,String>>()\n"
          "        for (chunkStr in nativeOutput.split(\"||\")) {\n"
          "            val parts = chunkStr.split(\"|\", limit = 2)\n"
          "            if (parts.size == 2 && parts[0].isNotBlank() && parts[1].isNotBlank()) {\n"
          "                chunksQueue.addLast(Pair(parts[0], parts[1]))\n"
          "            }\n"
          "        }\n"
          "        VhLogger.d(\"[QUEUE] Native engine split text into \${chunksQueue.size} chunks.\")\n"
          "        if (chunksQueue.isEmpty()) {\n"
          "            VhLogger.d(\"[QUEUE] Queue is empty. Finishing callback.\")\n"
          "            callback?.start(16000, android.media.AudioFormat.ENCODING_PCM_16BIT, 1)\n"
          "            callback?.done(); return\n"
          "        }\n"
          "        \n"
          "        val sysRate = maxOf(0.1f, (request?.speechRate ?: 100) / 100.0f)\n"
          "        val sysPitch = maxOf(0.1f, (request?.pitch ?: 100) / 100.0f)\n"
          "        val chunkLatch = CountDownLatch(1)\n"
          "        currentChunkLatch = chunkLatch\n"
          "        var chunkCounter = 0\n"
          "        \n"
          "        fun processNextChunk() {\n"
          "            VhLogger.d(\"[PROCESS] processNextChunk() called. Queue size: \${chunksQueue.size}\")\n"
          "            if (myStop.get()) {\n"
          "                VhLogger.w(\"[PROCESS] myStop is TRUE. Aborting processNextChunk(). Unblocking latch.\")\n"
          "                chunkLatch.countDown()\n"
          "                return\n"
          "            }\n"
          "            var currentChunk: Pair<String, String>? = null\n"
          "            synchronized(chunksQueue) {\n"
          "                if (chunksQueue.isEmpty()) {\n"
          "                    VhLogger.i(\"[PROCESS] Queue is empty! All chunks completed. Unblocking latch.\")\n"
          "                    chunkLatch.countDown()\n"
          "                    return\n"
          "                }\n"
          "                currentChunk = chunksQueue.removeFirst()\n"
          "            }\n"
          "            if (currentChunk == null) {\n"
          "                VhLogger.e(\"[PROCESS] CRITICAL: Popped chunk is null. Aborting.\")\n"
          "                return\n"
          "            }\n"
          "            chunkCounter++\n"
          "            val lang = currentChunk!!.first\n"
          "            val text = currentChunk!!.second\n"
          "            VhLogger.d(\"[PROCESS] Chunk #\$chunkCounter | Lang: \$lang | Text: [\${text.take(30)}...]\")\n"
          "            \n"
          "            val pkg = prefs.getEngineForLanguage(lang)\n"
          "            if (pkg == \"NOT_SET\") {\n"
          "                VhLogger.w(\"[PROCESS] Engine for lang '\$lang' is NOT_SET. Skipping this chunk.\")\n"
          "                processNextChunk(); return\n"
          "            }\n"
          "            val tts = initEngineForLang(lang)\n"
          "            if (tts == null) {\n"
          "                VhLogger.e(\"[PROCESS] Engine initialization returned NULL for lang '\$lang'. Skipping.\")\n"
          "                processNextChunk(); return\n"
          "            }\n"
          "            \n"
          "            val key = \"\${lang}_\${pkg}\"\n"
          "            val appRate = maxOf(0.1f, prefs.getInt(\"rate_\$key\", 100) / 100.0f)\n"
          "            val appPitch = maxOf(0.1f, prefs.getInt(\"pitch_\$key\", 100) / 100.0f)\n"
          "            val appVolume = prefs.getInt(\"vol_\$key\", 100) / 100.0f\n"
          "            val finalRate = maxOf(0.1f, minOf(6.0f, sysRate * appRate))\n"
          "            val finalPitch = maxOf(0.1f, minOf(6.0f, sysPitch * appPitch))\n"
          "            val locTag = prefs.getLocaleForLangPkg(lang, pkg).ifEmpty { Locale.forLanguageTag(lang).toLanguageTag() }\n"
          "            \n"
          "            tts.setSpeechRate(finalRate)\n"
          "            tts.setPitch(finalPitch)\n"
          "            try { tts.language = Locale.forLanguageTag(locTag) } catch (_: Exception) { tts.language = Locale.forLanguageTag(lang) }\n"
          "            \n"
          "            tts.setOnUtteranceProgressListener(object : UtteranceProgressListener() {\n"
          "                override fun onStart(id: String) {\n"
          "                    VhLogger.d(\"[LISTENER] onStart fired for chunk #\$chunkCounter (id=\$id)\")\n"
          "                }\n"
          "                override fun onDone(id: String) {\n"
          "                    VhLogger.d(\"[LISTENER] onDone fired for chunk #\$chunkCounter (id=\$id)\")\n"
          "                    if (myStop.get()) {\n"
          "                        VhLogger.w(\"[LISTENER] myStop is TRUE inside onDone. Unblocking latch.\")\n"
          "                        chunkLatch.countDown()\n"
          "                        return\n"
          "                    }\n"
          "                    VhLogger.d(\"[LISTENER] Triggering processNextChunk() recursively...\")\n"
          "                    processNextChunk()\n"
          "                }\n"
          "                override fun onError(id: String) {\n"
          "                    VhLogger.e(\"[LISTENER] onError fired for chunk #\$chunkCounter (id=\$id)\")\n"
          "                    chunkLatch.countDown()\n"
          "                }\n"
          "            })\n"
          "            \n"
          "            val params = android.os.Bundle(request?.params ?: android.os.Bundle())\n"
          "            params.remove(\"pitch\"); params.remove(\"rate\"); params.remove(\"language\"); params.remove(\"utteranceId\")\n"
          "            params.putFloat(TextToSpeech.Engine.KEY_PARAM_VOLUME, appVolume)\n"
          "            val utteranceId = \"omni_\${lang}_\${chunkCounter}\"\n"
          "            \n"
          "            VhLogger.d(\"[ENGINE] Calling tts.speak() for chunk #\$chunkCounter (id=\$utteranceId) using engine=\$pkg\")\n"
          "            val speakResult = tts.speak(text, TextToSpeech.QUEUE_FLUSH, params, utteranceId)\n"
          "            VhLogger.d(\"[ENGINE] speakResult for chunk #\$chunkCounter = \$speakResult (SUCCESS=0, ERROR=-1)\")\n"
          "            \n"
          "            if (speakResult == TextToSpeech.ERROR) {\n"
          "                VhLogger.e(\"[ENGINE] tts.speak() failed! Forcing manual skip to next chunk.\")\n"
          "                processNextChunk()\n"
          "            }\n"
          "        }\n"
          "        \n"
          "        VhLogger.d(\"[MAIN] Initiating recursive chunk processing...\")\n"
          "        processNextChunk()\n"
          "        \n"
          "        VhLogger.d(\"[MAIN] Latch await() started. Main thread is sleeping...\")\n"
          "        chunkLatch.await()\n"
          "        VhLogger.d(\"[MAIN] Latch await() finished. Main thread woke up!\")\n"
          "        \n"
          "        if (!myStop.get()) {\n"
          "            VhLogger.d(\"[MAIN] Synthesis completed successfully. Triggering callback.start() and callback.done()\")\n"
          "            if (callback != null && !callback.hasStarted()) {\n"
          "                callback.start(16000, android.media.AudioFormat.ENCODING_PCM_16BIT, 1)\n"
          "            }\n"
          "            callback?.done()\n"
          "        } else {\n"
          "            VhLogger.w(\"[MAIN] Synthesis aborted due to myStop == true.\")\n"
          "        }\n"
          "    }\n"
          "    override fun onDestroy() {\n"
          "        activeStop.get().set(true)\n"
          "        enginePool.values.forEach { try { it.shutdown() } catch (_: Exception) {} }\n"
          "        enginePool.clear(); super.onDestroy()\n"
          "    }\n"
          "}\n")

