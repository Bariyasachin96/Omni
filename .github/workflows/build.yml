          # ── VhLogger.kt ──────────────────────────────────────────────────────
          w("app/src/main/java/com/omni/tts/VhLogger.kt",
          "package com.omni.tts\n"
          "import android.content.Context\n"
          "import android.util.Log\n"
          "import java.io.BufferedWriter\n"
          "import java.io.File\n"
          "import java.io.FileWriter\n"
          "import java.io.IOException\n"
          "import java.text.SimpleDateFormat\n"
          "import java.util.Date\n"
          "import java.util.LinkedList\n"
          "import java.util.Locale\n"
          "import java.util.concurrent.ConcurrentHashMap\n"
          "import java.util.concurrent.atomic.AtomicLong\n"
          "object VhLogger {\n"
          "    private const val TAG = \"OMNI-NATIVE\"\n"
          "    private const val MAX_LINES = 8000\n"
          "    private val buffer = LinkedList<String>()\n"
          "    private val sdf = SimpleDateFormat(\"MM-dd HH:mm:ss.SSS\", Locale.US)\n"
          "    private var appContext: Context? = null\n"
          "    private val lastSynthStart = AtomicLong(0)\n"
          "    private val firstAudioPerChunk = ConcurrentHashMap<Int, Long>()\n"
          "    private val sleepCountPerChunk = ConcurrentHashMap<Int, Int>()\n"
          "    private val totalBytesPerChunk = ConcurrentHashMap<Int, Long>()\n"
          "    private val audioCallbackCount = ConcurrentHashMap<Int, Int>()\n"
          "    fun init(ctx: Context) {\n"
          "        appContext = ctx.applicationContext\n"
          "        write(\"I\", \"[LOGGER] VhLogger initialized — device=${android.os.Build.MODEL} sdk=${android.os.Build.VERSION.SDK_INT} android=${android.os.Build.VERSION.RELEASE}\")\n"
          "    }\n"
          "    @Synchronized private fun write(level: String, msg: String) {\n"
          "        val line = \"${sdf.format(Date())} $level/$TAG: $msg\"\n"
          "        when (level) { \"E\" -> Log.e(TAG, msg); \"W\" -> Log.w(TAG, msg); else -> Log.d(TAG, msg) }\n"
          "        buffer.addLast(line); if (buffer.size > MAX_LINES) buffer.removeFirst()\n"
          "    }\n"
          "    fun d(msg: String) = write(\"D\", msg)\n"
          "    fun w(msg: String) = write(\"W\", msg)\n"
          "    fun e(msg: String) = write(\"E\", msg)\n"
          "    fun i(msg: String) = write(\"I\", msg)\n"
          "    fun markRequest(text: String, totalChunks: Int) {\n"
          "        write(\"I\", \"[REQUEST] ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\")\n"
          "        write(\"I\", \"[REQUEST] textLength=${text.length} totalChunks=$totalChunks\")\n"
          "        write(\"I\", \"[REQUEST] preview=${text.take(120)}\")\n"
          "    }\n"
          "    fun markMode(mode: String) = write(\"D\", \"[MODE] readingMode=$mode\")\n"
          "    fun markNativeInput(sentenceCount: Int, byteLen: Int) = write(\"D\", \"[NATIVE-IN] sentences=$sentenceCount inputBytes=$byteLen\")\n"
          "    fun markNativeOutput(raw: String, chunkCount: Int) {\n"
          "        write(\"D\", \"[NATIVE-OUT] chunkCount=$chunkCount rawLen=${raw.length} preview=${raw.take(200)}\")\n"
          "    }\n"
          "    fun markEngineInit(lang: String, pkg: String, ms: Long) = write(\"D\", \"[ENGINE-INIT] lang=$lang pkg=$pkg initTime=${ms}ms\")\n"
          "    fun markEngineReused(lang: String) = write(\"D\", \"[ENGINE-REUSE] lang=$lang (already in pool)\")\n"
          "    fun markEngineNull(lang: String) = write(\"E\", \"[ENGINE-NULL] initEngineForLang returned null for lang=$lang — chunk will be skipped\")\n"
          "    fun markRateApplied(chunkIndex: Int, finalRate: Float, changed: Boolean) = write(\"D\", \"[CHUNK-$chunkIndex] setSpeechRate finalRate=$finalRate changed=$changed\")\n"
          "    fun markPitchApplied(chunkIndex: Int, finalPitch: Float, changed: Boolean) = write(\"D\", \"[CHUNK-$chunkIndex] setPitch finalPitch=$finalPitch changed=$changed\")\n"
          "    fun markLocaleApplied(chunkIndex: Int, locTag: String, changed: Boolean) = write(\"D\", \"[CHUNK-$chunkIndex] setLanguage locale=$locTag changed=$changed\")\n"
          "    fun markEnginePoolSize(size: Int) = write(\"D\", \"[ENGINE-POOL] activeEngines=$size\")\n"
          "    fun markChunkStart(chunkIndex: Int, total: Int, lang: String, pkg: String, locTag: String, text: String, finalRate: Float, finalPitch: Float, appVolume: Float, sysRate: Float, sysPitch: Float, appRate: Float, appPitch: Float) {\n"
          "        sleepCountPerChunk[chunkIndex] = 0\n"
          "        totalBytesPerChunk[chunkIndex] = 0L\n"
          "        audioCallbackCount[chunkIndex] = 0\n"
          "        write(\"I\", \"[CHUNK-$chunkIndex/$total] ──────────────────────────────────\")\n"
          "        write(\"I\", \"[CHUNK-$chunkIndex/$total] lang=$lang pkg=$pkg locale=$locTag\")\n"
          "        write(\"I\", \"[CHUNK-$chunkIndex/$total] textLen=${text.length} text=${text.take(80)}\")\n"
          "        write(\"I\", \"[CHUNK-$chunkIndex/$total] finalRate=$finalRate (sys=$sysRate x app=$appRate) finalPitch=$finalPitch (sys=$sysPitch x app=$appPitch) vol=$appVolume\")\n"
          "    }\n"
          "    fun markSynthStart(chunkText: String, lang: String, chunkIndex: Int): Long {\n"
          "        val t = System.currentTimeMillis()\n"
          "        lastSynthStart.set(t)\n"
          "        firstAudioPerChunk.remove(chunkIndex)\n"
          "        write(\"D\", \"[CHUNK-$chunkIndex] speak CALLED lang=$lang textLen=${chunkText.length}\")\n"
          "        return t\n"
          "    }\n"
          "    fun markSynthEnd(chunkIndex: Int, startTime: Long) = write(\"D\", \"[CHUNK-$chunkIndex] onDone received — speak elapsed=${System.currentTimeMillis()-startTime}ms\")\n"
          "    fun markSynthError(chunkIndex: Int, reason: String) = write(\"E\", \"[CHUNK-$chunkIndex] SYNTH ERROR: $reason\")\n"
          "    fun markSynthErrorCode(chunkIndex: Int, errorCode: Int) = write(\"E\", \"[CHUNK-$chunkIndex] onError errorCode=$errorCode\")\n"
          "    fun markFirstAudio(chunkIndex: Int) {\n"
          "        val t = System.currentTimeMillis()\n"
          "        if (firstAudioPerChunk.putIfAbsent(chunkIndex, t) == null)\n"
          "            write(\"I\", \"[CHUNK-$chunkIndex] FIRST AUDIO BYTE sent latency=${t - lastSynthStart.get()}ms\")\n"
          "    }\n"
          "    fun markCallbackDone(chunkIndex: Int) = write(\"D\", \"[CHUNK-$chunkIndex] callback.done called\")\n"
          "    fun markFallbackCallbackStart(sampleRate: Int) = write(\"W\", \"[FALLBACK-START] no audio produced — calling callback.start with sampleRate=$sampleRate encoding=PCM_16BIT channels=1\")\n"
          "    fun markStopped(chunkIndex: Int) = write(\"W\", \"[CHUNK-$chunkIndex] isStopped=true detected inside loop — aborting\")\n"
          "    fun markLoopExit(chunkIndex: Int, reason: String) = write(\"D\", \"[CHUNK-$chunkIndex] main loop exited reason=$reason\")\n"
          "    fun markChunkDone(chunkIndex: Int, startTime: Long, totalBytes: Long) {\n"
          "        val sleeps = sleepCountPerChunk[chunkIndex] ?: 0\n"
          "        val calls = audioCallbackCount[chunkIndex] ?: 0\n"
          "        write(\"I\", \"[CHUNK-$chunkIndex] DONE totalBytes=$totalBytes audioCallbacks=$calls totalSleeps=$sleeps totalTime=${System.currentTimeMillis()-startTime}ms\")\n"
          "    }\n"
          "    fun markStop() = write(\"W\", \"[STOP] onStop called — cancelling active synthesis\")\n"
          "    fun markFallback(det: String, fb: String) = write(\"W\", \"[LANG-FALLBACK] detected=$det engine NOT_SET -> fallback lang=$fb\")\n"
          "    fun markSkipped(reason: String) = write(\"W\", \"[SKIPPED] $reason\")\n"
          "    @Synchronized @Throws(IOException::class) fun exportToFile(): File {\n"
          "        val ctx = appContext ?: throw IOException(\"VhLogger not initialized\")\n"
          "        val f = File(ctx.cacheDir, \"omni_tts_debug.txt\")\n"
          "        BufferedWriter(FileWriter(f, false)).use { bw ->\n"
          "            bw.write(\"=== Omni Full Debug Log ===\\nTime: ${Date()}\\nDevice: ${android.os.Build.MODEL}\\nAndroid: ${android.os.Build.VERSION.RELEASE}\\nEntries: ${buffer.size}\\n============================\\n\\n\")\n"
          "            buffer.forEach { bw.write(it); bw.newLine() }\n"
          "        }\n"
          "        return f\n"
          "    }\n"
          "    @Synchronized fun clear() { buffer.clear() }\n"
          "}\n")

