package com.omni.tts
import android.content.Context
import android.content.SharedPreferences

class SharedPrefsManager(context: Context) {
    private val p: SharedPreferences =
        context.getSharedPreferences("OMNI_PREFS", Context.MODE_PRIVATE)

    fun getString(key: String, def: String = ""): String = p.getString(key, def) ?: def
    fun setString(key: String, value: String) = p.edit().putString(key, value).apply()
    fun getFloat(key: String, def: Float = 1f): Float = p.getFloat(key, def)
    fun setFloat(key: String, v: Float) = p.edit().putFloat(key, v).apply()
    fun getBoolean(key: String, def: Boolean = false): Boolean = p.getBoolean(key, def)
    fun setBoolean(key: String, v: Boolean) = p.edit().putBoolean(key, v).apply()
    fun engineForLang(iso: String): String = p.getString("engine_$iso", "NOT_SET") ?: "NOT_SET"
    fun setEngineForLang(iso: String, pkg: String) = p.edit().putString("engine_$iso", pkg).apply()
    fun rateKey(iso: String, pkg: String) = "rate_${iso}_$pkg"
    fun pitchKey(iso: String, pkg: String) = "pitch_${iso}_$pkg"
    fun locKey(iso: String, pkg: String) = "loc_${iso}_$pkg"
}
