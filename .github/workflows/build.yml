package com.omni.tts
import android.accessibilityservice.AccessibilityService
import android.accessibilityservice.AccessibilityServiceInfo
import android.content.Intent
import android.os.Handler
import android.os.Looper
import android.speech.tts.TextToSpeech
import android.speech.tts.UtteranceProgressListener
import android.view.accessibility.AccessibilityEvent
import android.view.accessibility.AccessibilityNodeInfo
import java.util.Locale
import java.util.concurrent.atomic.AtomicBoolean

class OmniAutoReaderService : AccessibilityService() {

    private var tts: TextToSpeech? = null
    private var isTtsReady = AtomicBoolean(false)
    private val handler = Handler(Looper.getMainLooper())
    private var lastSpokenText = ""
    private var pendingRunnable: Runnable? = null
    private lateinit var prefs: SharedPrefsManager

    override fun onServiceConnected() {
        super.onServiceConnected()
        prefs = SharedPrefsManager(this)
        val info = AccessibilityServiceInfo()
        info.eventTypes = AccessibilityEvent.TYPE_VIEW_ACCESSIBILITY_FOCUSED or
                AccessibilityEvent.TYPE_VIEW_FOCUSED or
                AccessibilityEvent.TYPE_WINDOW_CONTENT_CHANGED or
                AccessibilityEvent.TYPE_VIEW_SCROLLED
        info.feedbackType = AccessibilityServiceInfo.FEEDBACK_SPOKEN
        info.notificationTimeout = 100
        info.flags = AccessibilityServiceInfo.FLAG_REPORT_VIEW_IDS or
                AccessibilityServiceInfo.FLAG_RETRIEVE_INTERACTIVE_WINDOWS
        serviceInfo = info
        initTts()
    }

    private fun initTts() {
        val pkg = prefs.getEngineForLanguage(prefs.getString("pref_lang", "en"))
        val enginePkg = if (pkg == "NOT_SET") null else pkg
        tts = TextToSpeech(this, { status ->
            if (status == TextToSpeech.SUCCESS) {
                isTtsReady.set(true)
                val lang = prefs.getString("pref_lang", "en")
                val locTag = prefs.getLocaleForLangPkg(lang, pkg)
                try {
                    tts?.language = if (locTag.isNotEmpty()) Locale.forLanguageTag(locTag) else Locale.forLanguageTag(lang)
                } catch (e: Exception) {
                    tts?.language = Locale.getDefault()
                }
                val key = "${lang}_${pkg}"
                tts?.setSpeechRate(maxOf(0.1f, prefs.getInt("rate_$key", 100) / 100.0f))
                tts?.setPitch(maxOf(0.1f, prefs.getInt("pitch_$key", 100) / 100.0f))
                tts?.setOnUtteranceProgressListener(object : UtteranceProgressListener() {
                    override fun onStart(id: String?) {}
                    override fun onDone(id: String?) {}
                    override fun onError(id: String?) {}
                })
            }
        }, enginePkg)
    }

    override fun onAccessibilityEvent(event: AccessibilityEvent?) {
        if (event == null || !isTtsReady.get()) return
        val type = event.eventType
        if (type != AccessibilityEvent.TYPE_VIEW_ACCESSIBILITY_FOCUSED &&
            type != AccessibilityEvent.TYPE_VIEW_FOCUSED) return

        val node = event.source ?: return
        val text = extractText(node)
        node.recycle()

        if (text.isBlank() || text == lastSpokenText) return
        lastSpokenText = text

        pendingRunnable?.let { handler.removeCallbacks(it) }
        val r = Runnable { speakText(text) }
        pendingRunnable = r
        handler.postDelayed(r, 50)
    }

    private fun extractText(node: AccessibilityNodeInfo): String {
        val parts = mutableListOf<String>()
        node.contentDescription?.toString()?.trim()?.takeIf { it.isNotEmpty() }?.let { parts.add(it) }
        if (parts.isEmpty()) {
            node.text?.toString()?.trim()?.takeIf { it.isNotEmpty() }?.let { parts.add(it) }
        }
        if (parts.isEmpty() && node.childCount == 0) {
            node.hintText?.toString()?.trim()?.takeIf { it.isNotEmpty() }?.let { parts.add(it) }
        }
        return parts.joinToString(". ")
    }

    private fun speakText(text: String) {
        if (!isTtsReady.get()) return
        tts?.stop()
        tts?.speak(text, TextToSpeech.QUEUE_FLUSH, null, "auto_${System.currentTimeMillis()}")
    }

    override fun onInterrupt() {
        tts?.stop()
    }

    override fun onUnbind(intent: Intent?): Boolean {
        tts?.stop()
        tts?.shutdown()
        tts = null
        isTtsReady.set(false)
        return super.onUnbind(intent)
    }
}
