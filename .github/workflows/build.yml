        cat > app/src/main/kotlin/com/omni/tts/WavUtils.kt << 'EOF'
package com.omni.tts
import java.io.EOFException
import java.io.InputStream

object WavUtils {
    data class WavInfo(val sampleRate: Int=16000, val channels: Int=1,
                       val bitsPerSample: Int=16, val dataOffset: Int=44)

    fun parse(input: InputStream): WavInfo {
        readFully(input, ByteArray(4)); readInt(input); readFully(input, ByteArray(4))
        var offset = 12; var sampleRate = 16000; var channels = 1; var bitsPerSample = 16
        while (true) {
            val id = ByteArray(4).also { readFully(input, it) }
            val size = readIntLE(input); offset += 8
            when (String(id)) {
                "fmt " -> {
                    readShortLE(input); channels = readShortLE(input).toInt()
                    sampleRate = readIntLE(input); readIntLE(input); readShortLE(input)
                    bitsPerSample = readShortLE(input).toInt()
                    val rem = size - 16; if (rem > 0) skipFully(input, rem); offset += size
                }
                "data" -> return WavInfo(sampleRate, channels, bitsPerSample, offset)
                else -> { skipFully(input, size); offset += size }
            }
        }
    }

    private fun readFully(i: InputStream, b: ByteArray) {
        var n = 0; while (n < b.size) { val c = i.read(b,n,b.size-n); if (c<0) throw EOFException(); n+=c }
    }
    private fun readInt(i: InputStream) = readIntLE(i)
    private fun readIntLE(i: InputStream): Int {
        val b = ByteArray(4).also { readFully(i,it) }
        return (b[0].toInt()and 0xFF) or ((b[1].toInt()and 0xFF)shl 8) or
               ((b[2].toInt()and 0xFF)shl 16) or ((b[3].toInt()and 0xFF)shl 24)
    }
    private fun readShortLE(i: InputStream): Short {
        val b = ByteArray(2).also { readFully(i,it) }
        return ((b[0].toInt()and 0xFF) or ((b[1].toInt()and 0xFF)shl 8)).toShort()
    }
    private fun skipFully(i: InputStream, n: Int) {
        var t = 0; while (t < n) { var s = i.skip((n-t).toLong()); if (s==0L){if(i.read()<0) throw EOFException(); s=1}; t+=s.toInt() }
    }
}
