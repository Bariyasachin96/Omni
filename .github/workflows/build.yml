package com.omni.tts
import android.os.Bundle
import androidx.activity.ComponentActivity
import androidx.activity.compose.setContent
import androidx.compose.foundation.layout.*
import androidx.compose.material3.*
import androidx.compose.runtime.*
import androidx.compose.ui.Alignment
import androidx.compose.ui.Modifier
import androidx.compose.ui.platform.LocalContext
import androidx.compose.ui.semantics.contentDescription
import androidx.compose.ui.semantics.semantics
import androidx.compose.ui.unit.dp
class LanguageSettingsActivity : ComponentActivity() {
    private var testTts: android.speech.tts.TextToSpeech? = null
    override fun onCreate(savedInstanceState: Bundle?) {
        super.onCreate(savedInstanceState)
        val currentKey = intent.getStringExtra("key") ?: "en_NOT_SET"
        val prefs = SharedPrefsManager(this)
        setContent {
            MaterialTheme {
                Surface(modifier = Modifier.fillMaxSize()) {
                    val context = LocalContext.current
                    var rate by remember { mutableIntStateOf(prefs.getInt("rate_$currentKey", 100)) }
                    var pitch by remember { mutableIntStateOf(prefs.getInt("pitch_$currentKey", 100)) }
                    var vol by remember { mutableIntStateOf(prefs.getInt("vol_$currentKey", 100)) }
                    Column(modifier = Modifier.padding(16.dp)) {
                        Text("Language Settings", style = MaterialTheme.typography.headlineSmall)
                        Spacer(modifier = Modifier.height(24.dp))
                        Text("Speech Rate: ${if (rate == 100) "System Default" else String.format(java.util.Locale.US, "%.2fx", rate / 100f)}")
                        Row(verticalAlignment = Alignment.CenterVertically) {
                            Button(onClick = { rate = maxOf(0, rate - 5) }, modifier = Modifier.semantics { contentDescription = "Decrease Speech Rate" }) { Text("-") }
                            Slider(value = rate.toFloat(), onValueChange = { rate = it.toInt() }, valueRange = 0f..500f, modifier = Modifier.weight(1f).padding(horizontal = 8.dp).semantics { contentDescription = "Speech Rate Slider" })
                            Button(onClick = { rate = minOf(500, rate + 5) }, modifier = Modifier.semantics { contentDescription = "Increase Speech Rate" }) { Text("+") }
                        }
                        Spacer(modifier = Modifier.height(16.dp))
                        Text("Pitch: ${if (pitch == 100) "System Default" else String.format(java.util.Locale.US, "%.2fx", pitch / 100f)}")
                        Row(verticalAlignment = Alignment.CenterVertically) {
                            Button(onClick = { pitch = maxOf(0, pitch - 5) }, modifier = Modifier.semantics { contentDescription = "Decrease Pitch" }) { Text("-") }
                            Slider(value = pitch.toFloat(), onValueChange = { pitch = it.toInt() }, valueRange = 0f..500f, modifier = Modifier.weight(1f).padding(horizontal = 8.dp).semantics { contentDescription = "Pitch Slider" })
                            Button(onClick = { pitch = minOf(500, pitch + 5) }, modifier = Modifier.semantics { contentDescription = "Increase Pitch" }) { Text("+") }
                        }
                        Spacer(modifier = Modifier.height(16.dp))
                        Text("Volume: ${if (vol == 100) "System Default" else "$vol%"}")
                        Row(verticalAlignment = Alignment.CenterVertically) {
                            Button(onClick = { vol = maxOf(0, vol - 5) }, modifier = Modifier.semantics { contentDescription = "Decrease Volume" }) { Text("-") }
                            Slider(value = vol.toFloat(), onValueChange = { vol = it.toInt() }, valueRange = 0f..100f, modifier = Modifier.weight(1f).padding(horizontal = 8.dp).semantics { contentDescription = "Volume Slider" })
                            Button(onClick = { vol = minOf(100, vol + 5) }, modifier = Modifier.semantics { contentDescription = "Increase Volume" }) { Text("+") }
                        }
                        Spacer(modifier = Modifier.height(32.dp))
                        Button(onClick = {
                            val pkg = if (currentKey.contains("_")) currentKey.substring(currentKey.indexOf('_') + 1) else "com.google.android.tts"
                            testTts?.shutdown()
                            testTts = android.speech.tts.TextToSpeech(context, { status ->
                                if (status == android.speech.tts.TextToSpeech.SUCCESS) {
                                    testTts?.setSpeechRate(rate / 100f)
                                    testTts?.setPitch(pitch / 100f)
                                    val params = android.os.Bundle()
                                    params.putFloat(android.speech.tts.TextToSpeech.Engine.KEY_PARAM_VOLUME, vol / 100f)
                                    testTts?.speak("Testing audio settings", android.speech.tts.TextToSpeech.QUEUE_FLUSH, params, "test")
                                }
                            }, if (pkg == "NOT_SET") null else pkg)
                        }, modifier = Modifier.fillMaxWidth()) { Text("TEST AUDIO") }
                        Spacer(modifier = Modifier.height(12.dp))
                        Button(onClick = { prefs.setInt("rate_$currentKey", rate); prefs.setInt("pitch_$currentKey", pitch); prefs.setInt("vol_$currentKey", vol); finish() }, modifier = Modifier.fillMaxWidth(), colors = ButtonDefaults.buttonColors(containerColor = MaterialTheme.colorScheme.secondary)) { Text("APPLY SETTINGS") }
                        Spacer(modifier = Modifier.height(12.dp))
                        Button(onClick = { rate = 100; pitch = 100; vol = 100 }, modifier = Modifier.fillMaxWidth(), colors = ButtonDefaults.buttonColors(containerColor = MaterialTheme.colorScheme.surfaceVariant, contentColor = MaterialTheme.colorScheme.onSurfaceVariant)) { Text("RESET TO DEFAULT") }
                    }
                }
            }
        }
    }
    override fun onDestroy() { testTts?.shutdown(); super.onDestroy() }
}
