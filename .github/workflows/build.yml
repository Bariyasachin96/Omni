                            Button(onClick = { prefs.clearDict(); dict = prefs.getDict() }, colors = ButtonDefaults.buttonColors(containerColor = MaterialTheme.colorScheme.error), modifier = Modifier.semantics { contentDescription = "Clear All Dictionary Words" }) { Text("CLEAR ALL") }
