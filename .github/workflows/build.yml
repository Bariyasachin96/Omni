      - name: Generate Complete Project
        run: python3 generate_project.py

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'
          cache-disabled: true

      - name: Build APK
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
