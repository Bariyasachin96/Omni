package com.omni.tts

import android.content.Context
import android.content.Intent
import android.speech.tts.TextToSpeech

object EngineFinder {
    data class TTSEngine(val pkg: String, val name: String)

    fun getEngines(context: Context): List<TTSEngine> {
        val pm = context.packageManager
        val intent = Intent(TextToSpeech.Engine.INTENT_ACTION_TTS_SERVICE)
        val found = pm.queryIntentServices(intent, 0).map {
            TTSEngine(
                it.serviceInfo.packageName,
                it.serviceInfo.applicationInfo.loadLabel(pm).toString()
            )
        }
        return found.ifEmpty { listOf(TTSEngine("com.google.android.tts", "Google TTS")) }
    }
}
