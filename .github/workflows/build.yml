name: Build Omni TTS
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install NDK and CMake
      run: |
        echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
          "ndk;25.1.8937393" "cmake;3.22.1" --sdk_root=$ANDROID_HOME

    - name: Clone CLD2
      run: |
        mkdir -p app/src/main/cpp
        git clone --depth 1 https://github.com/CLD2Owners/cld2.git \
          app/src/main/cpp/cld2_src

    - name: Generate Project Files
      run: |
        # ── directory structure ────────────────────────────────────────────
        mkdir -p app/src/main/kotlin/com/omni/tts
        mkdir -p app/src/main/res/xml
        mkdir -p app/src/main/res/values

        # ── gradle.properties ──────────────────────────────────────────────
        cat > gradle.properties << 'EOF'
android.useAndroidX=true
android.enableJetifier=true
org.gradle.jvmargs=-Xmx3096m -Dfile.encoding=UTF-8
EOF

        # ── settings.gradle.kts ───────────────────────────────────────────
        cat > settings.gradle.kts << 'EOF'
pluginManagement {
    repositories { google(); mavenCentral(); gradlePluginPortal() }
}
dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
    repositories { google(); mavenCentral() }
}
rootProject.name = "Omni"
include(":app")
EOF

