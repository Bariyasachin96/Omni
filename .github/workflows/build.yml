          "        if (name != null && name.startsWith(\"omni_\")) TextToSpeech.SUCCESS else TextToSpeech.ERROR\n"
          "    override fun onLoadVoice(name: String?): Int =\n"
          "        if (name != null && name.startsWith(\"omni_\")) TextToSpeech.SUCCESS else TextToSpeech.ERROR\n"
          "    // build-41 multi-level kill switch\n"
