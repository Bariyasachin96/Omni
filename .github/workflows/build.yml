            }
            Spacer(Modifier.height(24.dp))

            // ── Speech Rate ───────────────────────────────────────────────
            val rateDisplay = "%.2f".format(rateProgress / 100f)
            val rateLabel = if (rateProgress == 100) "Speech Rate: System Default" else "Speech Rate: ${rateDisplay}x"
            Text(rateLabel, modifier = Modifier.semantics { contentDescription = rateLabel })
            Spacer(Modifier.height(4.dp))
            Row(verticalAlignment = Alignment.CenterVertically) {
                Button(
                    onClick = {
                        rateProgress = (rateProgress - 10).coerceAtLeast(10)
                        prefs.setFloat(prefs.rateKey(isoCode, selEngPkg), rateProgress / 100f)
                    },
                    modifier = Modifier.semantics { contentDescription = "Decrease Speech Rate" }
                ) { Text("-") }
                Slider(
                    value = rateProgress.toFloat(),
                    valueRange = 10f..500f,
