          "package com.omni.tts\n"
          "import android.content.Context\n"
          "import android.content.Intent\n"
          "import android.speech.tts.TextToSpeech\n"
          "object EngineFinder {\n"
          "    data class TTSInfo(val pkg: String, val name: String) { override fun toString() = name }\n"
          "    fun getEngines(ctx: Context): List<TTSInfo> {\n"
          "        val pm = ctx.packageManager\n"
          "        val intent = Intent(TextToSpeech.Engine.INTENT_ACTION_TTS_SERVICE)\n"
          "        // Triple query: some OEMs (Samsung especially) cloak TTS services from default flags.\n"
          "        // Combining the three flag variants surfaces engines that any one query alone misses.\n"
          "        //   131072 = MATCH_DISABLED_COMPONENTS, 128 = GET_META_DATA, 0 = default.\n"
          "        val list1 = try { pm.queryIntentServices(intent, 131072) } catch (_: Exception) { emptyList() }\n"
          "        val list2 = try { pm.queryIntentServices(intent, 128) }    catch (_: Exception) { emptyList() }\n"
          "        val list3 = try { pm.queryIntentServices(intent, 0) }      catch (_: Exception) { emptyList() }\n"
          "        val seen = HashSet<String>()\n"
          "        val list = mutableListOf<TTSInfo>()\n"
          "        for (ri in (list1 + list2 + list3)) {\n"
          "            val pkg = ri.serviceInfo.packageName\n"
          "            if (pkg.contains(\"autotts\", ignoreCase = true)) continue   // skip our own / similar wrappers\n"
          "            if (!seen.add(pkg)) continue                                // dedupe\n"
          "            val label = try { ri.serviceInfo.applicationInfo.loadLabel(pm).toString() } catch (_: Exception) { pkg }\n"
          "            list.add(TTSInfo(pkg, label))\n"
          "        }\n"
          "        if (list.isEmpty()) list.add(TTSInfo(\"com.google.android.tts\", \"Google TTS\"))\n"
          "        return list\n"
          "    }\n"
          "}\n")

