          inline int utf8ToCodepoint(const unsigned char* p, int& len) {
              if (p[0] < 0x80)               { len=1; return p[0]; }
              if ((p[0]&0xE0)==0xC0)         { len=2; return ((p[0]&0x1F)<<6)|(p[1]&0x3F); }
              if ((p[0]&0xF0)==0xE0)         { len=3; return ((p[0]&0x0F)<<12)|((p[1]&0x3F)<<6)|(p[2]&0x3F); }
              if ((p[0]&0xF8)==0xF0)         { len=4; return ((p[0]&0x07)<<18)|((p[1]&0x3F)<<12)|((p[2]&0x3F)<<6)|(p[3]&0x3F); }
              len=1; return p[0];
          }

          inline void codepointToUtf8(int cp, std::string& out) {
              if (cp<=0x7F)      { out+=(char)cp; }
              else if(cp<=0x7FF) { out+=(char)((cp>>6)|0xC0); out+=(char)((cp&0x3F)|0x80); }
              else if(cp<=0xFFFF){ out+=(char)((cp>>12)|0xE0); out+=(char)(((cp>>6)&0x3F)|0x80); out+=(char)((cp&0x3F)|0x80); }
              else               { out+=(char)((cp>>18)|0xF0); out+=(char)(((cp>>12)&0x3F)|0x80); out+=(char)(((cp>>6)&0x3F)|0x80); out+=(char)((cp&0x3F)|0x80); }
          }

          inline char mathUnicodeToAscii(int cp) {
              if(cp>=0x1D400&&cp<=0x1D419) return 'A'+(cp-0x1D400);
              if(cp>=0x1D434&&cp<=0x1D44D) return 'A'+(cp-0x1D434);
              if(cp>=0x1D468&&cp<=0x1D481) return 'A'+(cp-0x1D468);
              if(cp>=0x1D5A0&&cp<=0x1D5B9) return 'A'+(cp-0x1D5A0);
              if(cp>=0x1D670&&cp<=0x1D689) return 'A'+(cp-0x1D670);
              if(cp>=0x1D41A&&cp<=0x1D433) return 'a'+(cp-0x1D41A);
              if(cp>=0x1D44E&&cp<=0x1D467) return 'a'+(cp-0x1D44E);
              if(cp>=0x1D482&&cp<=0x1D49B) return 'a'+(cp-0x1D482);
              if(cp>=0x1D5BA&&cp<=0x1D5D3) return 'a'+(cp-0x1D5BA);
              if(cp>=0x1D68A&&cp<=0x1D6A3) return 'a'+(cp-0x1D68A);
              if(cp>=0xFF21&&cp<=0xFF3A)   return 'A'+(cp-0xFF21);
              if(cp>=0xFF41&&cp<=0xFF5A)   return 'a'+(cp-0xFF41);
              if(cp>=0x1D7CE&&cp<=0x1D7D7) return '0'+(cp-0x1D7CE);
              if(cp>=0xFF10&&cp<=0xFF19)   return '0'+(cp-0xFF10);
              return 0;
          }

          inline bool isEmoji(int cp) {
              return (cp>=0x1F300&&cp<=0x1F9FF)||(cp>=0x2600&&cp<=0x27BF)||
                     (cp>=0x2300&&cp<=0x23FF)||(cp>=0x2B50&&cp<=0x2B55)||
                     (cp>=0xFE00&&cp<=0xFE0F)||(cp>=0x1FA00&&cp<=0x1FAFF)||
                     (cp>=0x1F1E0&&cp<=0x1F1FF)||cp==0x200D||cp==0xFE0F;
          }

          inline bool isPunct(int cp) {
              return cp=='.'||cp=='!'||cp=='?'||cp==','||cp==';'||cp==':'||cp=='-'||cp=='*'||cp=='_';
          }

          static std::string normalizeText(const std::string& input, bool keepEmoji, bool countEmoji, bool countPunct) {
              std::string result;
              result.reserve(input.size());
              int i=0, len=(int)input.size();
              while(i<len) {
                  int clen=0;
                  int cp=utf8ToCodepoint((const unsigned char*)&input[i], clen);
                  char ascii=mathUnicodeToAscii(cp);
                  if(ascii){ result+=ascii; i+=clen; continue; }
                  if(isEmoji(cp)) {
                      if(!keepEmoji){ i+=clen; continue; }
                      int eCount=1, j=i+clen;
                      while(j<len){ int nl=0; int nc=utf8ToCodepoint((const unsigned char*)&input[j],nl); if(nc==cp){eCount++;j+=nl;}else break; }
                      if(countEmoji&&eCount>1) result+=std::to_string(eCount)+" ";
                      for(int k=0;k<eCount;k++) codepointToUtf8(cp,result);
                      i=j; continue;
                  }
                  if(isPunct(cp)&&countPunct) {
                      int pCount=1, j=i+clen;
                      while(j<len){ int nl=0; int nc=utf8ToCodepoint((const unsigned char*)&input[j],nl); if(nc==cp){pCount++;j+=nl;}else break; }
                      if(pCount>1) result+=std::to_string(pCount)+" ";
                      codepointToUtf8(cp,result);
                      i=j; continue;
                  }
                  codepointToUtf8(cp,result);
                  i+=clen;
              }
              return result;
          }

          static std::string applyDictionary(std::string text, const std::vector<std::string>& keys, const std::vector<std::string>& vals) {
              for(size_t i=0;i<keys.size();i++){
                  if(keys[i].empty()) continue;
                  size_t pos=0;
                  while((pos=text.find(keys[i],pos))!=std::string::npos){
                      text.replace(pos,keys[i].size(),vals[i]);
                      pos+=vals[i].size();
                  }
              }
              return text;
          }

          // ─────────────────────────────────────────────────────────────────
          // BUNDLE-Y ITEM 14: Strip Markdown / HTML formatting tokens.
          // TalkBack reads markdown literally — "**bold**" becomes "star star bold
          // star star". Same for HTML tags. We strip these BEFORE language detection
          // and chunking so the engine receives clean text.
          // Conservative: only obvious patterns, leave doubtful text untouched.
          // ─────────────────────────────────────────────────────────────────
          static std::string stripMarkdownHtml(const std::string& input) {
              std::string out;
              out.reserve(input.size());
              const char* s = input.c_str();
              int len = (int)input.size();
              int i = 0;
              while (i < len) {
                  char c = s[i];
                  // HTML tag: <...> with letter immediately after '<' (so we don't strip "5 < 10")
                  if (c == '<' && i + 1 < len) {
                      char n = s[i+1];
                      bool isTagStart = (n == '/' || (n >= 'a' && n <= 'z') || (n >= 'A' && n <= 'Z'));
                      if (isTagStart) {
                          int j = i + 1;
                          while (j < len && s[j] != '>') j++;
                          if (j < len) { i = j + 1; continue; }
                      }
                  }
                  // Markdown link [text](url) → text
                  if (c == '[' && i + 1 < len) {
                      int closeBracket = -1;
                      int j = i + 1;
                      while (j < len && s[j] != ']' && s[j] != '\n') j++;
                      if (j < len && s[j] == ']' && j + 1 < len && s[j+1] == '(') {
                          closeBracket = j;
                          // find matching ')'
                          int k = j + 2;
                          while (k < len && s[k] != ')' && s[k] != '\n') k++;
                          if (k < len && s[k] == ')') {
                              // emit text between [ and ], skip (...) entirely
                              out.append(s + i + 1, closeBracket - i - 1);
                              i = k + 1;
                              continue;
                          }
                      }
                  }
                  // Markdown emphasis tokens: **bold**, __bold__, *ital*, _ital_, `code`, ~~strike~~
                  // We strip just the marker characters, leaving content. To avoid breaking real
                  // text that uses asterisks/underscores naturally, only strip when token is at
                  // a word boundary (preceded/followed by space, start/end of text, or punctuation).
                  if (c == '*' || c == '_' || c == '`' || c == '~') {
                      // Detect token: `**`, `__`, `~~` (length 2) or single `*`, `_`, `` ` `` (length 1)
                      int tokLen = 1;
                      if (i + 1 < len && s[i+1] == c) tokLen = 2;
                      // Check boundary on the side facing the consumed prefix
                      char before = (i == 0) ? ' ' : s[i-1];
                      char after  = (i + tokLen >= len) ? ' ' : s[i + tokLen];
                      bool boundaryOk = ((before == ' ' || before == '\n' || before == '\t' ||
                                          before == '.' || before == ',' || before == '!' ||
                                          before == '?' || before == '(' || before == '[' ||
                                          before == '"' || before == '\'' || i == 0) ||
                                         (after == ' ' || after == '\n' || after == '\t' ||
                                          after == '.' || after == ',' || after == '!' ||
                                          after == '?' || after == ')' || after == ']' ||
                                          after == '"' || after == '\'' || i + tokLen == len));
                      if (boundaryOk) { i += tokLen; continue; }
                  }
                  out += c;
                  i++;
              }
              return out;
          }

          // ─────────────────────────────────────────────────────────────────
          // BUNDLE-Y ITEM 13: Expand short all-caps acronyms with spaces.
          // "USA" → "U S A", "IPL" → "I P L", "FBI" → "F B I".
          // Without this TalkBack pronounces "USA" as one phantom word.
          // Rules (conservative — minimise false positives):
          //   - Token is exactly 2–3 ASCII uppercase letters (4+ like NASA / RADAR are
          //     usually pronounced as words; leave them so TTS handles pronunciation)
          //   - Bordered by whitespace, start/end of string, or punctuation
          //   - Skipped if right-bordered by '.' (already in "U.S.A." dotted form)
          // ─────────────────────────────────────────────────────────────────
          static std::string expandAcronyms(const std::string& input) {
              std::string out;
              out.reserve(input.size() + input.size() / 4);  // up to ~25% expansion
              const char* s = input.c_str();
              int len = (int)input.size();
              int i = 0;
              while (i < len) {
                  // Find run of uppercase ASCII letters
                  if (s[i] >= 'A' && s[i] <= 'Z') {
                      int j = i;
                      while (j < len && s[j] >= 'A' && s[j] <= 'Z') j++;
                      int runLen = j - i;
                      // Check boundaries
                      char before = (i == 0) ? ' ' : s[i-1];
                      char after  = (j >= len) ? ' ' : s[j];
                      bool leftOk  = (i == 0 || before == ' ' || before == '\n' || before == '\t' ||
                                      before == '.' || before == ',' || before == '!' || before == '?' ||
                                      before == ';' || before == ':' || before == '(' || before == '[' ||
                                      before == '"' || before == '\'' || before == '-');
                      bool rightOk = (j >= len || after == ' ' || after == '\n' || after == '\t' ||
                                      after == ',' || after == '!' || after == '?' || after == ';' ||
                                      after == ':' || after == ')' || after == ']' || after == '"' ||
                                      after == '\'' || after == '-');
                      // Skip if right-bordered by '.' (already dotted like U.S.A.)
                      if (after == '.') rightOk = false;
                      bool isShortAcronym = (runLen >= 2 && runLen <= 3) && leftOk && rightOk;
                      if (isShortAcronym) {
                          // Emit with spaces between letters: USA → U S A
                          for (int k = i; k < j; k++) {
                              if (k > i) out += ' ';
                              out += s[k];
                          }
                          i = j;
                          continue;
                      }
                      // Not an acronym — pass through verbatim
                      out.append(s + i, runLen);
                      i = j;
                      continue;
                  }
                  out += s[i];
                  i++;
              }
              return out;
          }

          static const char* scriptLookup(int cp) {
              for(int i=0; SCRIPT_BLOCKS[i].lang; i++)
                  if(cp>=SCRIPT_BLOCKS[i].start && cp<=SCRIPT_BLOCKS[i].end)
                      return SCRIPT_BLOCKS[i].lang;
              return nullptr;
          }

          inline bool isUnknownChar(int cp) {
              if(cp>='0'&&cp<='9') return true;
              if(cp==' '||cp=='\t'||cp=='\n'||cp=='\r') return true;
              if(cp=='.'||cp==','||cp=='!'||cp=='?'||cp==';'||cp==':'||cp=='-'||
                 cp=='('||cp==')'||cp=='['||cp==']'||cp=='{'||cp=='}'||cp=='"'||
                 cp=='\''||cp=='/'||cp=='\\'||cp=='@'||cp=='#'||cp=='$'||cp=='%'||
                 cp=='&'||cp=='*'||cp=='+'||cp=='='||cp=='<'||cp=='>'||cp=='~'||
                 cp=='`'||cp=='^'||cp=='|'||cp=='_') return true;
              if(isEmoji(cp)) return true;
              if(cp>=0x2000&&cp<=0x206F) return true;
              if(cp>=0x2E00&&cp<=0x2E7F) return true;
              if(cp>=0xFE50&&cp<=0xFE6F) return true;
              if(cp>=0xFF00&&cp<=0xFF0F) return true;
              if(cp>=0xFF1A&&cp<=0xFF20) return true;
              if(cp>=0xFF3B&&cp<=0xFF40) return true;
              if(cp>=0xFF5B&&cp<=0xFF65) return true;
              return false;
          }

          static const char* scriptLookupChar(int cp) {
              if(cp<=0x007F) return "en";
              if(cp>=0x0080&&cp<=0x00FF) return "en";
              if(cp>=0x0100&&cp<=0x024F) return "en";
              return scriptLookup(cp);
          }

          inline bool isLatinChar(int cp) {
              return (cp>=0x0020&&cp<=0x007F)||
                     (cp>=0x0080&&cp<=0x024F)||
                     isUnknownChar(cp);
          }

          // detectLang: Prioritize SCRIPT_BLOCKS array lookup; CLD2 only if everything is Neutral
          static std::string detectLang(const std::string& text, const std::string& latFall, const std::string& nonLatFall) {
              int len = (int)text.size();
              // PRIORITY 0: Micro-codepoint language hack — single-character markers that
              // unambiguously distinguish Marathi from Hindi (within Devanagari) and Assamese
              // from Bengali (within Bengali block). Run BEFORE the broad SCRIPT_BLOCKS scan
              // so e.g. "ळ" (U+0933) tags the whole phrase as "mr" rather than the default "hi".
              {
                  int i = 0;
                  while(i < len) {
                      int clen = 0;
                      int cp = utf8ToCodepoint((const unsigned char*)&text[i], clen);
                      if (cp == 0x0933) return "mr";                         // ळ — Marathi-only
                      if (cp == 0x09F0 || cp == 0x09F1) return "as";         // ৰ ৱ — Assamese-only
                      i += clen;
                  }
              }
              // PRIORITY 0.5: Latin/Cyrillic/Arabic micro-language detection via per-codepoint
              // accent table — ported from original AutoTTS's a.java::b(int). Distinguishes
              // fr/es/de/no/pl/cs/vi from accented Latin chars, uk/sr/bg/kk from Cyrillic
              // letters, and fa/ur/ps/sd/ku from Arabic letters. First match wins so e.g.
              // "café niño" → fr (because "é" comes before "ñ" — first match priority).
              {
                  int i = 0;
                  while(i < len) {
                      int clen = 0;
                      int cp = utf8ToCodepoint((const unsigned char*)&text[i], clen);
                      // ── Latin diacritics (Latin-1 Supplement + Latin Extended-A) ──
                      if (cp == 192 || cp == 194 || cp == 199 || cp == 200 || cp == 201 || cp == 202 || cp == 203
                          || cp == 206 || cp == 207 || cp == 212 || cp == 217 || cp == 219
                          || cp == 224 || cp == 226 || cp == 231 || cp == 232 || cp == 233 || cp == 234 || cp == 235
                          || cp == 238 || cp == 239 || cp == 244 || cp == 249 || cp == 251 || cp == 338 || cp == 339)
                          return "fr";
                      if (cp == 193 || cp == 205 || cp == 209 || cp == 211 || cp == 218
                          || cp == 225 || cp == 237 || cp == 241 || cp == 243 || cp == 250)
                          return "es";
                      if (cp == 196 || cp == 214 || cp == 220 || cp == 228 || cp == 246 || cp == 252 || cp == 223)
                          return "de";
                      if (cp == 197 || cp == 198 || cp == 216 || cp == 229 || cp == 230 || cp == 248)
                          return "no";
                      if (cp == 260 || cp == 261 || cp == 262 || cp == 263 || cp == 280 || cp == 281
                          || cp == 321 || cp == 322 || cp == 323 || cp == 324 || cp == 346 || cp == 347
                          || cp == 377 || cp == 378 || cp == 379 || cp == 380)
                          return "pl";
                      if (cp == 268 || cp == 269 || cp == 270 || cp == 271 || cp == 282 || cp == 283
                          || cp == 327 || cp == 328 || cp == 344 || cp == 345 || cp == 352 || cp == 353
                          || cp == 356 || cp == 357 || cp == 366 || cp == 367 || cp == 381 || cp == 382)
                          return "cs";
                      if ((cp >= 7840 && cp <= 7929) || cp == 272 || cp == 273
                          || cp == 416 || cp == 417 || cp == 431 || cp == 432)
                          return "vi";
                      // ── Cyrillic micro-language splits ──
                      if (cp == 1028 || cp == 1108 || cp == 1030 || cp == 1110 || cp == 1031 || cp == 1111
                          || cp == 1168 || cp == 1169)
                          return "uk";
                      if (cp == 1026 || cp == 1106 || cp == 1032 || cp == 1112 || cp == 1033 || cp == 1113
                          || cp == 1034 || cp == 1114 || cp == 1035 || cp == 1115 || cp == 1039 || cp == 1119)
                          return "sr";
                      if (cp == 1066 || cp == 1098)
                          return "bg";
                      if (cp == 1186 || cp == 1187 || cp == 1170 || cp == 1171 || cp == 1200 || cp == 1201
                          || cp == 1198 || cp == 1199 || cp == 1240 || cp == 1241)
                          return "kk";
                      // ── Arabic micro-language splits ──
                      if (cp == 1662 || cp == 1670 || cp == 1688 || cp == 1711)
                          return "fa";
                      if (cp == 1657 || cp == 1672 || cp == 1681 || cp == 1722 || cp == 1726 || cp == 1729 || cp == 1746)
                          return "ur";
                      if (cp == 1665 || cp == 1669 || cp == 1673 || cp == 1683 || cp == 1686 || cp == 1690
                          || cp == 1724 || cp == 1744)
                          return "ps";
                      if (cp >= 1658 && cp <= 1661)
                          return "sd";
                      if (cp == 1742 || cp == 1685 || cp == 1717 || cp == 1734 || cp == 1738 || cp == 1739)
                          return "ku";
                      i += clen;
                  }
              }
              // BUNDLE-Y ITEM 10: Common-word language refinement.
              // Before SCRIPT_BLOCKS resolves to a generic "ru"/"hi"/etc, scan for
              // language-distinctive function words (high-frequency particles, conjunctions,
              // pronouns) that disambiguate sibling languages within the same script.
              // Only triggers on TEXT WITH SPACES so we get word boundaries cheaply.
              // Single-word/no-space text falls through to SCRIPT_BLOCKS (current behaviour).
              // Conservative: needs ≥2 hits of the same language's marker to commit; otherwise
              // skipped so this never overrides correct script-based detection on its own.
              if (text.find(' ') != std::string::npos) {
                  // Build a lowercase ASCII-folded copy for fast scanning. Non-ASCII codepoints
                  // are passed through verbatim — Cyrillic/Devanagari markers below will match.
                  std::string lower;
                  lower.reserve(text.size());
                  for (size_t k = 0; k < text.size(); k++) {
                      unsigned char ch = (unsigned char)text[k];
                      if (ch >= 'A' && ch <= 'Z') lower += (char)(ch + 32);
                      else lower += (char)ch;
                  }
                  // helper: count occurrences of " word " in " lower " (with leading/trailing space
                  // so boundaries work). Returns count of distinct positions.
                  auto countWord = [&](const char* w) -> int {
                      std::string needle = " ";
                      needle += w;
                      needle += " ";
                      std::string hay = " ";
                      hay += lower;
                      hay += " ";
                      int c = 0;
                      size_t pos = 0;
                      while ((pos = hay.find(needle, pos)) != std::string::npos) {
                          c++;
                          pos += needle.size() - 1;  // -1 so overlapping " a b " can still trigger
                      }
                      return c;
                  };
                  // Marathi-distinctive vs Hindi: "ahe" (आहे), "tya" (त्या), "ka" (का), "ani" (आणि)
                  // — but those won't appear in Latin form. We need Devanagari markers.
                  // Top distinctive Marathi function words in native script:
                  int mr = countWord("आहे") + countWord("होते") + countWord("त्या") + countWord("आणि");
                  int hi = countWord("है") + countWord("था") + countWord("और") + countWord("नहीं");
                  if (mr >= 2 && mr > hi) return "mr";
                  if (hi >= 2 && hi > mr) return "hi";
                  // Ukrainian-distinctive vs Russian: "що" (that), "це" (this), "не" appears in both,
                  // but "є" (is) and "та" (and) are Ukrainian-leaning, "и" (and) is Russian.
                  int uk = countWord("що") + countWord("це") + countWord("та");
                  int ru = countWord("что") + countWord("это") + countWord("как");
                  if (uk >= 2 && uk > ru) return "uk";
                  if (ru >= 2 && ru > uk) return "ru";
                  // Spanish-distinctive vs Italian (when neither has triggered the diacritic
                  // detection above — usually means no accents present, so disambiguation needed).
                  // Spanish: "que", "los", "las", "para"; Italian: "che", "gli", "del", "una"
                  int es = countWord("que") + countWord("los") + countWord("para");
                  int it = countWord("che") + countWord("gli") + countWord("del");
                  if (es >= 2 && es > it) return "es";
                  if (it >= 2 && it > es) return "it";
              }
              // PRIORITY 1: Scan codepoints and return the first non-Neutral language from SCRIPT_BLOCKS
              int i = 0;
              while(i < len) {
                  int clen = 0;
                  int cp = utf8ToCodepoint((const unsigned char*)&text[i], clen);
                  if(!isUnknownChar(cp)) {
                      const char* sl = scriptLookup(cp);
                      if (sl && strcmp(sl, "Neutral") != 0) {
                          return std::string(sl);
                      }
                  }
                  i += clen;
              }
              // PRIORITY 2: Everything was Neutral / unknown — try CLD2 as a last resort
              const int WINDOW = 64;
              i = 0;
              while(i < len) {
                  int byteStart = i;
                  int charCount = 0;
                  int j = i;
                  while(j < len && charCount < WINDOW) {
                      int clen = 0;
                      utf8ToCodepoint((const unsigned char*)&text[j], clen);
                      j += clen;
                      charCount++;
                  }
                  bool is_rel = false;
                  CLD2::Language lang = CLD2::DetectLanguage(text.c_str() + byteStart, j - byteStart, true, &is_rel);
                  const char* code = CLD2::LanguageCode(lang);
                  if(code && strlen(code) >= 2 && strcmp(code, "un") != 0 && strcmp(code, "xx") != 0 && strcmp(code, "Unknown") != 0) {
                      return std::string(code);
                  }
                  i = j;
              }
              // PRIORITY 3: Final fallback by Latin/Non-Latin classification
              i = 0;
              while(i < len) {
                  int clen = 0;
                  int cp = utf8ToCodepoint((const unsigned char*)&text[i], clen);
                  if(!isUnknownChar(cp)) {
                      if (isLatinChar(cp)) return latFall;
                      return nonLatFall;
                  }
                  i += clen;
              }
              return nonLatFall;
          }

          struct ChunkResult { std::string lang; std::string text; };

          // Auto mode: WHOLE TEXT DETECTION. No length limits. Return as ONE single chunk.
          static std::vector<ChunkResult> buildAutoChunks(const std::vector<std::string>& sentences, const std::string& latFall, const std::string& nonLatFall) {
              std::vector<ChunkResult> chunks;
              std::string fullText = "";
              for(auto& s: sentences) {
                  if(!s.empty()) {
                      if(!fullText.empty()) fullText += " ";
                      fullText += s;
                  }
              }
              if(fullText.empty()) return chunks;
              std::string dominantLang = detectLang(fullText, latFall, nonLatFall);
              chunks.push_back({dominantLang, fullText});
              return chunks;
          }

          // TRUE HYBRID MIX MODE: Native C++ Port of Auto TTS (Exact Script Splitting + CLD2 Verification)
          static std::vector<ChunkResult> buildMixChunks(const std::vector<std::string>& sentences, const std::string& latFall, const std::string& nonLatFall, const std::string& puncFall, const std::string& numFall, const std::string& emojiFall) {
              std::vector<ChunkResult> result;

              std::string fullText = "";
              for(auto& s: sentences) {
                  if(!s.empty()) fullText += s + " ";
              }
              if(fullText.empty()) return result;

              struct ScriptBlock { std::string text; std::string scriptType; };
              std::vector<ScriptBlock> blocks;

              std::string curBuf = "";
              std::string curScript = "";

              int i = 0;
              int len = (int)fullText.size();

              // LAYER 1: Exact Script Boundary Splitting (Translating original a.java logic)
              while(i < len) {
                  int clen = 0;
                  int cp = utf8ToCodepoint((const unsigned char*)&fullText[i], clen);
                  std::string ch = fullText.substr(i, clen);

                  // Check punc/num/emoji overrides first (same as dual mode)
                  bool isNum = (cp >= '0' && cp <= '9') || (cp >= 0xFF10 && cp <= 0xFF19);
                  std::string forcedLang;
                  if (isEmoji(cp) && emojiFall != "auto" && !emojiFall.empty()) {
                      forcedLang = emojiFall;
                  } else if (isPunct(cp) && puncFall != "auto" && !puncFall.empty()) {
                      forcedLang = puncFall;
                  } else if (isNum && numFall != "auto" && !numFall.empty()) {
                      forcedLang = numFall;
                  }

                  if (!forcedLang.empty()) {
                      // Flush current buffer, emit forced-lang char as its own segment
                      if (!curBuf.empty()) { blocks.push_back({curBuf, curScript}); curBuf = ""; curScript = ""; }
                      blocks.push_back({ch, forcedLang});
                      i += clen;
                      continue;
                  }

                  std::string charScript;
                  if (isUnknownChar(cp)) {
                      charScript = "Neutral";
                  } else {
                      // UNIVERSAL CHARACTER SPLITTER: scriptLookup returns the ISO code from
                      // SCRIPT_BLOCKS (e.g. "en" for Basic Latin, "hi" for Devanagari, "Neutral"
                      // for symbols/math/numbers). Any difference between charScript and
                      // curScript triggers a new chunk immediately.
                      const char* sl = scriptLookup(cp);
                      charScript = sl ? std::string(sl) : "Neutral";
                  }

                  if (curScript.empty() || curScript == "Neutral") {
                      curScript = (charScript == "Neutral") ? "" : charScript;
                      curBuf += ch;
                  } else if (charScript == "Neutral" || charScript == curScript) {
                      // Neutral chars stick to the active language flow
                      curBuf += ch;
                  } else {
                      // Script boundary detected — split into a new chunk immediately
                      blocks.push_back({curBuf, curScript});
                      curBuf = ch;
                      curScript = charScript;
                  }
                  i += clen;
              }
              if (!curBuf.empty()) {
                  blocks.push_back({curBuf, curScript});
              }

              // LAYER 2 & 3: CLD2 Verification and Zero-Latency Merge
              for (auto& block : blocks) {
                  if(block.text.find_first_not_of(" \t\n\r") == std::string::npos) {
                      if(!result.empty()) result.back().text += block.text;
                      continue;
                  }

                  std::string detected = detectLang(block.text, latFall, nonLatFall);

                  if (!result.empty() && result.back().lang == detected) {
                      result.back().text += block.text;
                  } else {
                      result.push_back({detected, block.text});
                  }
              }

              if (!result.empty()) {
                  while(!result.back().text.empty() && (result.back().text.back() == ' ' || result.back().text.back() == '\n' || result.back().text.back() == '\r')) {
                      result.back().text.pop_back();
                  }
              }

              return result;
          }

          // TRUE DUAL MODE: Strict Binary Routing + Punc/Num/Emoji Overrides (Zero Latency)
          // ─────────────────────────────────────────────────────────────────
          // LEGACY AUTO TTS DUAL MODE — Character-by-character binary slicer.
          // No CLD2, no dictionaries, no Unicode block tables. Just two buckets:
          //   Latin     : A-Z a-z 0-9 + basic ASCII punctuation/space (codepoint <= 127)
          //   Non-Latin : everything else (Hindi, Arabic, Russian, emojis, symbols)
          // Spaces/basic punctuation are neutral — they stick to whichever bucket
          // is currently active so we don't emit unnecessary chunk boundaries.
          // ─────────────────────────────────────────────────────────────────
          static std::vector<ChunkResult> buildDualChunks(const std::vector<std::string>& sentences, const std::string& latFall, const std::string& nonLatFall, const std::string& puncFall, const std::string& numFall, const std::string& emojiFall) {
              std::vector<ChunkResult> result;
              std::string fullText = "";
              for(auto& s: sentences) {
                  if(!s.empty()) fullText += s + " ";
              }
              if(fullText.empty()) return result;

              std::string latinBuf = "";
              std::string nonLatinBuf = "";
              int active = 0; // 0 = none, 1 = Latin, 2 = Non-Latin

              int i = 0;
              int len = (int)fullText.size();
              while(i < len) {
                  int clen = 0;
                  int cp = utf8ToCodepoint((const unsigned char*)&fullText[i], clen);
                  std::string ch = fullText.substr(i, clen);

                  int kind;
                  if (cp == ' ' || cp == '\t' || cp == '\n' || cp == '\r') {
                      kind = 0;
                  } else if ((cp >= 'A' && cp <= 'Z') || (cp >= 'a' && cp <= 'z') || (cp >= '0' && cp <= '9')) {
                      kind = 1;
                  } else if (cp <= 0x7F) {
                      kind = 0;
                  } else {
                      kind = 2;
                  }

                  if (kind == 1) {
                      if (active == 2 && !nonLatinBuf.empty()) {
                          result.push_back({nonLatFall, nonLatinBuf});
                          nonLatinBuf.clear();
                      }
                      latinBuf += ch;
                      active = 1;
                  } else if (kind == 2) {
                      if (active == 1 && !latinBuf.empty()) {
                          result.push_back({latFall, latinBuf});
                          latinBuf.clear();
                      }
                      nonLatinBuf += ch;
                      active = 2;
                  } else {
                      if (active == 2) {
                          nonLatinBuf += ch;
                      } else {
                          latinBuf += ch;
                          if (active == 0) active = 1;
                      }
                  }
                  i += clen;
              }
              if (!latinBuf.empty()) result.push_back({latFall, latinBuf});
              if (!nonLatinBuf.empty()) result.push_back({nonLatFall, nonLatinBuf});

              if (!result.empty()) {
                  while(!result.back().text.empty() && (result.back().text.back() == ' ' || result.back().text.back() == '\n' || result.back().text.back() == '\r')) {
                      result.back().text.pop_back();
                  }
              }
              return result;
          }

          extern "C" JNIEXPORT jstring JNICALL
          Java_com_omni_tts_NativeEngine_processDirect(
              JNIEnv* env, jobject, jobject directBuffer, jint length,
              jobjectArray jKeys, jobjectArray jVals,
              jboolean keepEmoji, jboolean countEmoji, jboolean countPunct,
              jstring jLat, jstring jNonLat, jstring jMode,
              jstring jPunc, jstring jNum, jstring jEmoji)
          {
              if(!directBuffer||length<=0) return env->NewStringUTF("");
              void* buf=env->GetDirectBufferAddress(directBuffer);
              if(!buf) return env->NewStringUTF("");
              std::string rawInput((const char*)buf,(size_t)length);

              const char* latC=env->GetStringUTFChars(jLat,nullptr); std::string latFall(latC); env->ReleaseStringUTFChars(jLat,latC);
              const char* nonLatC=env->GetStringUTFChars(jNonLat,nullptr); std::string nonLatFall(nonLatC); env->ReleaseStringUTFChars(jNonLat,nonLatC);
              const char* modeC=env->GetStringUTFChars(jMode,nullptr); std::string mode(modeC); env->ReleaseStringUTFChars(jMode,modeC);
              const char* puncC=env->GetStringUTFChars(jPunc,nullptr); std::string puncFall(puncC); env->ReleaseStringUTFChars(jPunc,puncC);
              const char* numC=env->GetStringUTFChars(jNum,nullptr); std::string numFall(numC); env->ReleaseStringUTFChars(jNum,numC);
              const char* emojiC=env->GetStringUTFChars(jEmoji,nullptr); std::string emojiFall(emojiC); env->ReleaseStringUTFChars(jEmoji,emojiC);

              std::vector<std::string> keys,vals;
              int dictSize=env->GetArrayLength(jKeys);
              for(int i=0;i<dictSize;i++){
                  jstring jk=(jstring)env->GetObjectArrayElement(jKeys,i); const char* kc=env->GetStringUTFChars(jk,nullptr); keys.push_back(kc); env->ReleaseStringUTFChars(jk,kc); env->DeleteLocalRef(jk);
                  jstring jv=(jstring)env->GetObjectArrayElement(jVals,i); const char* vc=env->GetStringUTFChars(jv,nullptr); vals.push_back(vc); env->ReleaseStringUTFChars(jv,vc); env->DeleteLocalRef(jv);
              }

              std::vector<std::string> sentences;
              size_t start=0, end=rawInput.find('\0');
              while(end!=std::string::npos){ sentences.push_back(rawInput.substr(start,end-start)); start=end+1; end=rawInput.find('\0',start); }
              if(start<rawInput.size()) sentences.push_back(rawInput.substr(start));

              std::vector<std::string> processed; processed.reserve(sentences.size());
              for(auto& s: sentences){
                  if(s.empty()){ processed.push_back(""); continue; }
                  // Processing pipeline order (BUNDLE-Y additions in CAPS):
                  //   1. applyDictionary    — user-defined word replacements
                  //   2. STRIPMARKDOWNHTML  — drop markdown / HTML formatting tokens
                  //   3. EXPANDACRONYMS     — "USA" → "U S A" so TalkBack spells out
                  //   4. normalizeText      — emoji / punct / math-unicode normalisation
                  auto d = applyDictionary(s, keys, vals);
                  d = stripMarkdownHtml(d);
                  d = expandAcronyms(d);
                  d = normalizeText(d, keepEmoji, countEmoji, countPunct);
                  processed.push_back(d);
              }

              std::string result;
              if (mode == "dual") {
                  auto chunks = buildDualChunks(processed, latFall, nonLatFall, puncFall, numFall, emojiFall);
                  for(size_t i=0; i<chunks.size(); i++){ result += chunks[i].lang + "|" + chunks[i].text; if(i+1 < chunks.size()) result += "||"; }
              } else if (mode == "mix") {
                  auto chunks = buildMixChunks(processed, latFall, nonLatFall, puncFall, numFall, emojiFall);
                  for(size_t i=0; i<chunks.size(); i++){ result += chunks[i].lang + "|" + chunks[i].text; if(i+1 < chunks.size()) result += "||"; }
              } else {
                  auto chunks = buildAutoChunks(processed, latFall, nonLatFall);
                  for(size_t i=0; i<chunks.size(); i++){ result += chunks[i].lang + "|" + chunks[i].text; if(i+1 < chunks.size()) result += "||"; }
              }
              return env->NewStringUTF(result.c_str());
          }
          """)

