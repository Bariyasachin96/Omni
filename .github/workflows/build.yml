          w("app/src/main/java/com/omni/tts/LanguageSettingsActivity.kt",
          "package com.omni.tts\n"
          "import android.os.Bundle\n"
          "import android.widget.Toast\n"
          "import androidx.activity.ComponentActivity\n"
          "import androidx.activity.compose.setContent\n"
          "import androidx.compose.foundation.layout.*\n"
          "import androidx.compose.foundation.rememberScrollState\n"
          "import androidx.compose.foundation.verticalScroll\n"
          "import androidx.compose.material3.*\n"
          "import androidx.compose.runtime.*\n"
          "import androidx.compose.ui.Alignment\n"
          "import androidx.compose.ui.Modifier\n"
          "import androidx.compose.ui.platform.LocalContext\n"
          "import androidx.compose.ui.semantics.contentDescription\n"
          "import androidx.compose.ui.semantics.semantics\n"
          "import androidx.compose.ui.unit.dp\n"
          "import java.util.Locale\n"
          "class LanguageSettingsActivity : ComponentActivity() {\n"
          "    private var tempTts: android.speech.tts.TextToSpeech? = null\n"
          "    private var tempTts2: android.speech.tts.TextToSpeech? = null\n"
          "    @OptIn(ExperimentalMaterial3Api::class)\n"
          "    override fun onCreate(savedInstanceState: Bundle?) {\n"
          "        super.onCreate(savedInstanceState)\n"
          "        val prefs = SharedPrefsManager(this)\n"
          "        setContent {\n"
          "            MaterialTheme {\n"
          "                Surface(modifier = Modifier.fillMaxSize()) {\n"
          "                    val context = LocalContext.current\n"
          "                    val targetMode = intent?.getStringExtra(\"TARGET_MODE\") ?: prefs.getReadingMode()\n"
          "                    val readingMode = targetMode\n"
          "                    val isDualMode = readingMode == \"dual\"\n"
          "                    val isMixMode = readingMode == \"mix\"\n"
          "                    val isSplitMode = isDualMode\n"
          "                    val modeLabel = when(readingMode) { \"dual\" -> \"Dual Language\" ; \"mix\" -> \"Mix Language\" ; else -> \"Auto\" }\n"
          "                    val screenTitle = when(readingMode) { \"dual\" -> \"Configuring Dual Mode\" ; \"mix\" -> \"Configuring Mix Mode\" ; else -> \"Configuring Auto Mode\" }\n"
          "                    val engines = EngineFinder.getEngines(context).toMutableList().apply { add(0, EngineFinder.TTSInfo(\"NOT_SET\", \"--- Not Set ---\")) }\n"
          "                    val overrideOptions = listOf(\"Auto (Follow Context)\") + Languages.displayNames\n"
          "                    val overrideKeys = listOf(\"auto\") + Languages.isoCodes\n"
          "                    if (isSplitMode) {\n"
          "                        var primLangIso by remember { mutableStateOf(prefs.getString(\"mixed_mode_latin_language\", \"en\")) }\n"
